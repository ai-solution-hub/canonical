# deploy/onprem/docker-compose.yml
#
# ID-66.8: Co-location compose — cocoindex + pullmd + Playwright + Trafilatura
#           on one Coolify-managed compose network.
#
# Spec:    docs/specs/ID-66-onprem-pivot/TECH.md §"1. Co-location docker-compose.yml"
# Subtask: docs/reference/task-list.json task 66, subtask 8
#
# Satisfies invariants 1, 2, 3, 4, 11 from PRODUCT.md:
#   1 — All four services on a single host / one compose network.
#   2 — cocoindex reaches pullmd over the host-local compose alias (http://pullmd:3000).
#   3 — The {62.1} reachability defect is dissolved: no VPC/NAT/ingress:internal hop.
#   4 — pullmd→Playwright/Trafilatura wiring preserved verbatim from the Cloud Run
#       manifest (cloudrun/services/staging-pullmd.yaml).
#  11 — PULLMD_SERVICE_URL is a non-secret host-local value; no longer in Secret Manager.
#
# Secrets discipline (invariant 10 / {66.10}):
#   ALL secret env values (API keys, DSN, tokens, admin creds) are injected by
#   Coolify's per-app encrypted env at deploy time ({66.10}).  This file contains
#   NO literal secret values.  Secret vars are either bare keys (Coolify injects
#   them automatically when the key name matches a Coolify env var) or ${VAR} refs.
#   PULLMD_SERVICE_URL is the one plaintext non-secret — it is the host-local alias.
#
# Volume discipline ({66.9}):
#   The LMDB engine store and corpus mount are owned by subtask {66.9}.  A minimal
#   named-volume stub is declared below so the compose file is syntactically valid;
#   the full volume/backup design (bind-mount path, backup integration) belongs to
#   {66.9} and {66.14}.
#
# Image-tag discipline:
#   cocoindex — NEVER :latest.  Tag is a required variable (${COCOINDEX_IMAGE_TAG:?})
#     that must be set to the pinned sha- tag produced by the {66.7} onprem-deploy.yml
#     GH Action (e.g. sha-abc1234).  The build will refuse to start if the var is unset.
#   pullmd    — aeternalabshq/pullmd:2.0.0  (concrete version, NOT :latest)
#   playwright / trafilatura — :2 major tag; resolve to a digest before first deploy
#     per docs/runbooks/pullmd-deploy.md §4 (see TODO comments on those services).

name: kh-onprem

services:
  # ----------------------------------------------------------------------------
  # cocoindex — KH ingestion pipeline sidecar.
  #
  # Image is built and pushed to ghcr.io by {66.7} (onprem-deploy.yml GH Action).
  # The tag MUST be a pinned sha- tag from that workflow — never :latest.
  # COCOINDEX_IMAGE_TAG is a required variable: compose will refuse to start if
  # it is not set (the :? syntax triggers an error with the message shown).
  # ----------------------------------------------------------------------------
  cocoindex:
    image: "ghcr.io/${GHCR_OWNER:-ai-solution-hub}/kh-cocoindex-pipeline:${COCOINDEX_IMAGE_TAG:?set to a pinned sha- tag from {66.7}}"
    restart: unless-stopped
    environment:
      # --- Compose-alias repoint (OQ-66-2): env-only, NO source change to adapters.py ---
      # http://pullmd:3000 is the host-local compose service alias.  This is the
      # non-secret value that replaces the Cloud Run *.run.app Secret Manager entry.
      PULLMD_SERVICE_URL: "http://pullmd:3000"

      # --- Defence-in-depth Bearer auth ---
      # Retained even on host-local network per TECH §1.  Value injected by Coolify ({66.10}).
      PULLMD_API_TOKEN: ${PULLMD_API_TOKEN}

      # --- Boot-required vars (must be present before /health serves) ---
      # Carry-over from cloudrun/services/staging-example-client-cocoindex.yaml:45-71.
      # COCOINDEX_DB_DSN is the asyncpg Supabase pooler string (NOT the LMDB path).
      # It is boot-required: flow.py:_build_dsn() needs it during @coco.lifespan
      # asyncpg pool creation, before /health can serve (ID-49.8 precedent).
      # Value injected by Coolify ({66.10}).
      COCOINDEX_DB_DSN: ${COCOINDEX_DB_DSN}

      # COCOINDEX_DB is the cocoindex ENGINE's internal LMDB state-store path.
      # Boot-required: environment.start_sync() raises ValueError when unset.
      # Volume {66.9} mounts persistent disk at the parent directory.
      COCOINDEX_DB: /cocoindex-state/lmdb

      # COCOINDEX_SOURCE_PATH: corpus directory for ingest (empty = idle mode, matching
      # the Cloud Run manifest).  Set to a real path when the pipeline is activated.
      COCOINDEX_SOURCE_PATH: ""

      # LMDB virtual map size.  On NVMe disk, free space is cheap; a generous
      # reservation avoids MDB_MAP_FULL once the pipeline runs at volume.
      # LMDB map size is a sparse virtual reservation, not a pre-allocation.
      # Was 256 MiB on Cloud Run (tmpfs-bounded); can be set larger on disk.
      # {66.9}: default bumped to 4 GiB for the disk-backed volume (TECH §2 sizing);
      # operator may override via Coolify env. Sparse virtual reservation, not pre-alloc.
      COCOINDEX_LMDB_MAP_SIZE: ${COCOINDEX_LMDB_MAP_SIZE:-4294967296}

      # --- Pipeline webhook (zero app change — env-only per TECH §7) ---
      # Best-effort POST; flow.py:_emit_pipeline_run_webhook reads from os.environ.
      # Value injected by Coolify ({66.10}).
      PIPELINE_RUN_WEBHOOK_URL: ${PIPELINE_RUN_WEBHOOK_URL}
      CRON_SECRET: ${CRON_SECRET}

      # --- Supabase / API secrets (base set from cloud-run-deploy.yml:347-358) ---
      # Values injected by Coolify ({66.10}).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}

    volumes:
      # {66.9} owns the full volume/bind-mount definition and backup wiring.
      # The named volume stub below keeps this compose file syntactically valid.
      - cocoindex-state:/cocoindex-state

    # /health healthcheck — kept for container-restart purposes ONLY.
    # This is explicitly NOT the datapath signal (that is {66.15}, which watches
    # pipeline_runs row arrival in Supabase — not container liveness).
    # Green /health means the container is alive, NOT that the pipeline is ingesting.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    depends_on:
      - pullmd

  # ----------------------------------------------------------------------------
  # pullmd — HTML→Markdown extractor (AGPL; kept as a separate service for licence
  # boundary — the AGPL binary never lands inside the MIT+proprietary cocoindex image).
  #
  # Carried over verbatim from cloudrun/services/staging-pullmd.yaml.
  # Port 3000 is the compose-internal alias; no external port exposure needed
  # (cocoindex reaches pullmd via the http://pullmd:3000 alias on the compose network).
  # ----------------------------------------------------------------------------
  pullmd:
    image: "aeternalabshq/pullmd:2.0.0"
    restart: unless-stopped
    environment:
      # Bearer-gated; single-admin bootstrap (pullmd exits at boot without these).
      PULLMD_AUTH_MODE: "single-admin"
      # Values injected by Coolify ({66.10}).
      PULLMD_ADMIN_EMAIL: ${PULLMD_ADMIN_EMAIL}
      PULLMD_ADMIN_PASSWORD: ${PULLMD_ADMIN_PASSWORD}
      PULLMD_API_TOKEN: ${PULLMD_API_TOKEN}

      # Sidecar wiring — compose-alias form of the in-pod localhost wiring from
      # the Cloud Run manifest (cloudrun/services/staging-pullmd.yaml:105-108).
      # Ports + paths are the upstream docker-compose contract (README).
      PLAYWRIGHT_URL: "http://playwright:8002/render"
      TRAFILATURA_URL: "http://trafilatura:8001/extract"

      # Ephemeral SQLite cache.  /tmp is writable on startup; better-sqlite3 will
      # not mkdir the parent so the path must exist.  Cache is non-critical:
      # lost on container restart, rebuilt from live fetches.
      CACHE_DB: "/tmp/pullmd-cache.db"

    depends_on:
      - playwright
      - trafilatura

  # ----------------------------------------------------------------------------
  # playwright — JS-render sidecar for pullmd (~3.7 GB image).
  # Listens on :8002 (/render).
  #
  # Pinned to the :2 manifest-list digest (resolved 2026-05-31 via the Docker Hub
  # registry API; pullmd-deploy.md §4). Multi-arch index digest — Docker resolves the
  # host arch from the list. Re-pin when the upstream :2 tag is bumped.
  # ----------------------------------------------------------------------------
  playwright:
    image: "aeternalabshq/pullmd-playwright@sha256:af1993dfbbb7d41f0587b4087c7287d4b872706c139427316202157bf5bb0523" # :2
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # trafilatura — fallback HTML extractor sidecar for pullmd.
  # Listens on :8001 (/extract).
  #
  # Pinned to the :2 manifest-list digest (resolved 2026-05-31 via the Docker Hub
  # registry API; pullmd-deploy.md §4). Multi-arch index digest — Docker resolves the
  # host arch from the list. Re-pin when the upstream :2 tag is bumped.
  # ----------------------------------------------------------------------------
  trafilatura:
    image: "aeternalabshq/pullmd-trafilatura@sha256:1e8b2f77ace91041cb4bae7f248e2f5af67f587b7cb719cdd19c4bb39c640800" # :2
    restart: unless-stopped

# ------------------------------------------------------------------------------
# Volumes
#
# {66.9}: cocoindex engine LMDB state store (+ the corpus directory once the pipeline
# is activated). A plain `local`-driver named volume is disk-backed on the host NVMe —
# Docker stores named volumes under /var/lib/docker/volumes, which sits on the 480 GB
# `/` NVMe — satisfying inv 5 (disk-backed, NOT the Cloud Run in-RAM tmpfs/emptyDir)
# and inv 6 (survives a `cocoindex` container restart without destroying the volume).
# Coolify persists named volumes across redeploys but does NOT back them up natively
# (OQ-66-4); the mdb_copy→S3 backup is {66.14}. LMDB loss costs a memo-rebuild only,
# never KH data (inv 7 — Supabase is canonical).
#
# Mounted at /cocoindex-state (see the cocoindex service): the engine store lands at
# /cocoindex-state/lmdb (COCOINDEX_DB); the corpus, once activated, goes in a subdir
# set via COCOINDEX_SOURCE_PATH (TECH §2 — "the same volume can host the corpus
# directory"), so no separate corpus volume is needed for B1.
# ------------------------------------------------------------------------------
volumes:
  cocoindex-state:
    driver: local
