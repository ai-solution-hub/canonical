# deploy/coolify/docker-compose.production.yaml
#
# ID-66.8: Co-location compose — cocoindex on one Coolify-managed compose network.
#           (ID-129.1: the HTML→Markdown extractor stack was decommissioned and
#           removed; cocoindex no longer depends on it.)
#
# Spec:    docs/specs/ID-66-onprem-pivot/TECH.md §"1. Co-location docker-compose.yaml"
# Subtask: docs/reference/task-list.json task 66, subtask 8
#
# Secrets discipline (invariant 10 / {66.10}):
#   ALL secret env values (API keys, DSN, tokens) are injected by Coolify's per-app
#   encrypted env at deploy time ({66.10}).  This file contains NO literal secret
#   values.  Secret vars are either bare keys (Coolify injects them automatically
#   when the key name matches a Coolify env var) or ${VAR} refs.
#
# Volume discipline ({66.9}):
#   The LMDB engine store and corpus mount are owned by subtask {66.9}.  A minimal
#   named-volume stub is declared below so the compose file is syntactically valid;
#   the full volume/backup design (bind-mount path, backup integration) belongs to
#   {66.9} and {66.14}.
#
# Image-tag discipline:
#   cocoindex — NEVER :latest.  Tag is a required variable (${COCOINDEX_IMAGE_TAG:?})
#     that must be set to the pinned sha- tag produced by the {66.7} onprem-deploy.yml
#     GH Action (e.g. sha-abc1234).  The build will refuse to start if the var is unset.

name: kh-onprem

services:
  # ----------------------------------------------------------------------------
  # cocoindex — KH ingestion pipeline sidecar.
  #
  # Image is built and pushed to ghcr.io by {66.7} (onprem-deploy.yml GH Action).
  # The tag MUST be a pinned sha- tag from that workflow — never :latest.
  # COCOINDEX_IMAGE_TAG is a required variable: compose will refuse to start if
  # it is not set (the :? syntax triggers an error with the message shown).
  # ----------------------------------------------------------------------------
  cocoindex:
    image: "ghcr.io/${GHCR_OWNER:-ai-solution-hub}/kh-cocoindex-pipeline:${COCOINDEX_IMAGE_TAG:?set to a pinned sha- tag from {66.7}}"
    restart: unless-stopped
    # Resource caps (drift §3 fix — the old box ran with NONE). Protective limits so a
    # runaway walk cannot take down the 4 vCPU / 4 GB Server A host (which runs BOTH the
    # prod + staging client apps). Honoured by `docker compose up` (Coolify, non-swarm).
    # Final sizing is the deferred ID-127.14 metrics task; walks are one-at-a-time
    # (scheduled tasks disabled / supervised) so a simultaneous prod+staging peak is not
    # expected, and the 1.5 GB cap per container keeps total < host RAM.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M
        reservations:
          memory: 256M
    # Run as root: buildpack images run as uid 1000 (cnb), but a fresh Docker named-volume
    # mount is root-owned, so the non-root user hits "Permission denied (os error 13)"
    # initialising the LMDB engine store at /cocoindex-state/lmdb ({66.9}). root resolves
    # it durably for this single-tenant backend pipeline sidecar (no untrusted code exec).
    # (Verified on first deploy: uid 1000 could not write the root-owned volume mount.)
    user: "0:0"

    # --------------------------------------------------------------------------
    # HTTPS ingress (ID-88.1) — Traefik path-scoped routing via the coolify-proxy.
    #
    # Inv-13: /stage is deliberately NOT routed — it stays compose-internal only.
    # This path scope (exactly /walk + /health + /extract) IS the public-exposure
    # guard now that an FQDN exists: /walk is bearer-gated by the app itself (the
    # route validates `Authorization: Bearer ${CRON_SECRET}`), /extract is
    # bearer-gated on its OWN dedicated `Authorization: Bearer ${EXTRACT_API_TOKEN}`
    # ({112.6}, a different blast radius from CRON_SECRET) and self-enforces a
    # 20 MB per-route body cap, and /health is intentionally public-readable
    # (liveness only — no data). Any other path (incl. /stage) gets no router and
    # Traefik 404s it at the edge.
    #
    # The coolify-proxy (Traefik) is already attached to this app's compose
    # network, so labels alone route — NO compose `networks:` change is needed.
    # Labels-only routing: the Coolify app FQDN ("Domains") field stays UNSET —
    # see docs/runbooks/onprem-b1-deploy.md §"Pipeline HTTPS ingress (ID-88.1)".
    # The distinct router/service name (kh-cocoindex-prod-walk) avoids collision
    # with Coolify-generated router labels if an FQDN is ever set; the explicit
    # router→service binding keeps this router unambiguous in that merged-labels
    # scenario. certresolver `letsencrypt` is the Coolify v4 default ACME
    # resolver name in the coolify-proxy Traefik config.
    # --------------------------------------------------------------------------
    labels:
      - traefik.enable=true
      - traefik.http.routers.kh-cocoindex-prod-walk.rule=Host(`kh-pipeline.aisolutionhub.co.uk`) && (PathPrefix(`/walk`) || PathPrefix(`/health`) || PathPrefix(`/extract`))
      - traefik.http.routers.kh-cocoindex-prod-walk.entrypoints=https
      - traefik.http.routers.kh-cocoindex-prod-walk.tls=true
      - traefik.http.routers.kh-cocoindex-prod-walk.tls.certresolver=letsencrypt
      - traefik.http.routers.kh-cocoindex-prod-walk.service=kh-cocoindex-prod-walk
      - traefik.http.services.kh-cocoindex-prod-walk.loadbalancer.server.port=8080

    environment:
      # --- Boot-required vars (must be present before /health serves) ---
      # Carry-over from the retired Cloud Run staging cocoindex service config.
      # COCOINDEX_DB_DSN is the asyncpg Supabase pooler string (NOT the LMDB path).
      # It is boot-required: flow.py:_build_dsn() needs it during @coco.lifespan
      # asyncpg pool creation, before /health can serve (ID-49.8 precedent).
      # Value injected by Coolify ({66.10}).
      COCOINDEX_DB_DSN: ${COCOINDEX_DB_DSN}

      # COCOINDEX_DB is the cocoindex ENGINE's internal LMDB state-store path.
      # Boot-required: environment.start_sync() raises ValueError when unset.
      # Volume {66.9} mounts persistent disk at the parent directory.
      COCOINDEX_DB: /cocoindex-state/lmdb

      # COCOINDEX_SOURCE_PATH: corpus directory for ingest.
      # ID-83 / bl-221: this MAY now stay set permanently to the corpus path
      # (e.g. /cocoindex-state/corpus). Boot NO LONGER walks the corpus — the
      # worker enters the cocoindex lifespan via coco.start_blocking() at boot
      # (NO walk) and the corpus walk fires ONLY via the on-demand POST /walk
      # trigger (run by a Coolify scheduled task or a supervised operator curl).
      # A deploy/restart is therefore burn-safe by construction regardless of
      # this value — the SOURCE_PATH-blanking burn-valve is RETIRED. Leaving it
      # unset still works (the :- default resolves to empty): /walk then returns
      # a named 400 ("nothing to walk") rather than walking.
      # {66.16}: Coolify-env-settable (was a hardcoded "" literal the compose
      # value won over). Stand up the per-env Coolify scheduled task that POSTs
      # to /walk per docs/runbooks/onprem-b1-deploy.md §B2.
      COCOINDEX_SOURCE_PATH: ${COCOINDEX_SOURCE_PATH:-}

      # LMDB virtual map size.  On NVMe disk, free space is cheap; a generous
      # reservation avoids MDB_MAP_FULL once the pipeline runs at volume.
      # LMDB map size is a sparse virtual reservation, not a pre-allocation.
      # Was 256 MiB on Cloud Run (tmpfs-bounded); can be set larger on disk.
      # {66.9}: default bumped to 4 GiB for the disk-backed volume (TECH §2 sizing);
      # operator may override via Coolify env. Sparse virtual reservation, not pre-alloc.
      COCOINDEX_LMDB_MAP_SIZE: ${COCOINDEX_LMDB_MAP_SIZE:-4294967296}

      # --- Pipeline webhook (zero app change — env-only per TECH §7) ---
      # Best-effort POST; flow.py:_emit_pipeline_run_webhook reads from os.environ.
      # Value injected by Coolify ({66.10}).
      PIPELINE_RUN_WEBHOOK_URL: ${PIPELINE_RUN_WEBHOOK_URL}
      CRON_SECRET: ${CRON_SECRET}

      # --- /extract pure-cleaner bearer ({112.6}) ---
      # DEDICATED bearer for the Traefik-reachable POST /extract route — a
      # SEPARATE secret from CRON_SECRET (different blast radius: CRON_SECRET
      # gates the corpus-walk trigger; EXTRACT_API_TOKEN gates only the
      # stateless HTML cleaner). The route fails CLOSED (401) when this is unset.
      # Value injected by Coolify ({66.10}); never a literal here.
      EXTRACT_API_TOKEN: ${EXTRACT_API_TOKEN}

      # --- Image forensic-correlation key (bl-271) ---
      # flow.py:2923 reads os.environ["IMAGE_SHA"] -> threaded to the webhook ->
      # stamped onto pipeline_runs.result.extractor_version. IMAGE_SHA died at the
      # Cloud Run -> Coolify cutover (S298) because no compose env supplied it.
      # Reuse the already-required sha-pinned image tag so every run records the
      # exact image it ran on, matching the `image:` line above.
      IMAGE_SHA: ${COCOINDEX_IMAGE_TAG}

      # --- Supabase / API secrets (base set from cloud-run-deploy.yml:347-358) ---
      # Values injected by Coolify ({66.10}).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}

    volumes:
      # {66.9} owns the full volume/bind-mount definition and backup wiring.
      # The named volume stub below keeps this compose file syntactically valid.
      - cocoindex-state:/cocoindex-state

    # Liveness healthcheck — container-restart purposes ONLY; explicitly NOT the datapath
    # signal ({66.15} watches pipeline_runs row arrival in Supabase, not container liveness).
    # The buildpack image ships NO curl/wget and python is not on the exec PATH, so we probe
    # the HTTP wrapper's port via bash /dev/tcp (path-independent, no external deps). {66.8}
    # — the original curl test produced a false "unhealthy" on the buildpack image.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ------------------------------------------------------------------------------
# Volumes
#
# {66.9}: cocoindex engine LMDB state store (+ the corpus directory once the pipeline
# is activated). A plain `local`-driver named volume is disk-backed on the host NVMe —
# Docker stores named volumes under /var/lib/docker/volumes, which sits on the 480 GB
# `/` NVMe — satisfying inv 5 (disk-backed, NOT the Cloud Run in-RAM tmpfs/emptyDir)
# and inv 6 (survives a `cocoindex` container restart without destroying the volume).
# Coolify persists named volumes across redeploys but does NOT back them up natively
# (OQ-66-4); the mdb_copy→S3 backup is {66.14}. LMDB loss costs a memo-rebuild only,
# never KH data (inv 7 — Supabase is canonical).
#
# Mounted at /cocoindex-state (see the cocoindex service): the engine store lands at
# /cocoindex-state/lmdb (COCOINDEX_DB); the corpus, once activated, goes in a subdir
# set via COCOINDEX_SOURCE_PATH (TECH §2 — "the same volume can host the corpus
# directory"), so no separate corpus volume is needed for B1.
# ------------------------------------------------------------------------------
volumes:
  cocoindex-state:
    driver: local
