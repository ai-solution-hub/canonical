# Cloud Run Job manifest — prod / kpf tenant.
# Clone of staging-kpf.yaml with project=kh-prod-494815 substituted everywhere.
# See staging-example-client.yaml for full annotations + spec/plan references.
#
# region: europe-west2 (D-RUN-20 deferred — re-evaluate at first-client-data-handling task)
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: kh-pipeline-kpf
  labels:
    tenant: kpf
    env: prod
spec:
  template:
    spec:
      template:
        spec:
          serviceAccountName: kpf-pipeline-sa@kh-prod-494815.iam.gserviceaccount.com
          containers:
            - name: kh-pipeline
              image: europe-west2-docker.pkg.dev/kh-prod-494815/pipeline/kh-pipeline:latest
              env:
                - name: NEXT_PUBLIC_CLIENT_ID
                  value: kpf
                - name: KH_REQUEST_ID
                  value: ""
              resources:
                limits:
                  cpu: "2"
                  memory: 2Gi
              # Secret Manager mounts wired declaratively at deploy time —
              # see `.github/workflows/cloud-run-deploy.yml` `--set-secrets`
              # step + staging-example-client.yaml header note.
          maxRetries: 1
          timeoutSeconds: 14400
      parallelism: 1
      taskCount: 1
