# Cloud Run Job manifest — prod / example-client tenant.
# Clone of staging-example-client.yaml with project=kh-prod substituted everywhere.
# See staging-example-client.yaml for full annotations + spec/plan references.
#
# region: europe-west4 (D-RUN-20 deferred — re-evaluate at first-client-data-handling task)
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: kh-pipeline-example-client
  labels:
    tenant: example-client
    env: prod
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    spec:
      template:
        spec:
          serviceAccountName: example-client-pipeline-sa@kh-prod.iam.gserviceaccount.com
          containers:
            - name: kh-pipeline-slim
              image: europe-west4-docker.pkg.dev/kh-prod/pipeline/kh-pipeline-slim:latest
              env:
                - name: NEXT_PUBLIC_CLIENT_ID
                  value: example-client
                - name: KH_REQUEST_ID
                  value: ""
              resources:
                limits:
                  cpu: "2"
                  memory: 2Gi
              # TODO Phase 2 / T2.2 — Secret Manager mounts (see staging-example-client.yaml).
          maxRetries: 1
          timeoutSeconds: 14400
      parallelism: 1
      taskCount: 1
