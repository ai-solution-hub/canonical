# Cloud Run Job manifest — staging / example-client tenant.
#
# Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-run-cloud-run-provisioning-spec.md §2.6, §2.7, §2.8, §2.11
# Plan: docs/audits/kh-production-readiness-phase-1/plans/wp-run-cloud-run-provisioning-plan.md T1b.3 step 3
#
# Per-tenant Job-in-shared-project model (§2.7 / D-RUN-12). NEXT_PUBLIC_CLIENT_ID
# is baked at deploy time per D-RUN-12.1 + spec §2.6 — NOT mounted as a Secret
# (Liam ratified S17 admin amendment F-P1).
#
# Resource bounds per spec §2.8:
#   cpu=2, memory=2Gi, taskTimeout=14400s (4h), parallelism=1, taskCount=1, maxRetries=1.
#
# region: europe-west2 (D-RUN-20 deferred — re-evaluate at first-client-data-handling task)
#
# Phase 2 / T2.2 Secret Manager mounts are injected at deploy time via the
# `--set-secrets` step in `.github/workflows/cloud-run-deploy.yml`
# (declarative — secret refs not tracked in this manifest). 11 always-
# required secrets per spec §2.5; optional SUPABASE_AUTH_{EMAIL,PASSWORD}
# pair is added only if `batch-reclassify.ts` invocation gets wired into a
# Cloud Run Job. Runtime view:
#   gcloud run jobs describe kh-pipeline-example-client --region=europe-west2 --project=<id>
# Runtime SA needs roles/secretmanager.secretAccessor (granted at project
# scope per docs/runbooks/cloud-run-phase-1-handover.md §3).
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: kh-pipeline-example-client
  labels:
    tenant: example-client
    env: staging
spec:
  template:
    spec:
      template:
        spec:
          serviceAccountName: example-client-pipeline-sa@kh-staging-494815.iam.gserviceaccount.com
          containers:
            - name: kh-pipeline-slim
              image: europe-west2-docker.pkg.dev/kh-staging-494815/pipeline/kh-pipeline-slim:latest
              env:
                # NEXT_PUBLIC_CLIENT_ID baked at deploy time per D-RUN-12.1 +
                # feedback_branding_client_id_env. Wrong slug → loadBranding()
                # corrupts holder metadata on destructive runs. Deploy script
                # asserts via [[ "$NEXT_PUBLIC_CLIENT_ID" =~ ^(example-client|kpf)$ ]].
                - name: NEXT_PUBLIC_CLIENT_ID
                  value: example-client
                # KH_REQUEST_ID flows in from Cloud Scheduler invocation per
                # structured-logging-spec §4.6. Phase 2 wires the read in
                # scripts/kb_pipeline/config.py.
                - name: KH_REQUEST_ID
                  value: ""
              resources:
                limits:
                  cpu: "2"
                  memory: 2Gi
              # Secret Manager mounts wired declaratively at deploy time —
              # see `.github/workflows/cloud-run-deploy.yml` `--set-secrets`
              # step + the manifest header note above.
          maxRetries: 1
          timeoutSeconds: 14400
      parallelism: 1
      taskCount: 1
