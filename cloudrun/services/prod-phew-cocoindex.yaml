# Cloud Run Service manifest — prod / example-client tenant — cocoindex sidecar.
#
# ID-28.6: Cloud Run sidecar Service deploy infra.
# Spec: docs/specs/t8-cocoindex/TECH.md §Service-vs-Job split + §S14-topology
# Plan: docs/reference/task-list.json task 28, subtask 6
#
# Architectural rationale: see cloudrun/services/README.md (Service vs Job split,
# per-tenant SA mapping, Docling pre-warm, IMAGE_SHA forensic correlation).
#
# SA: reuses existing example-client-pipeline-sa — same project, same Secret Manager
#   secretAccessor grant (see docs/runbooks/cloud-run-phase-1-handover.md §3).
# region: europe-west2 (D-RUN-20 deferred)

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: kh-cocoindex-pipeline-example-client
  labels:
    tenant: example-client
    env: prod
    component: cocoindex-sidecar
  annotations:
    run.googleapis.com/ingress: internal
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: example-client-pipeline-sa@kh-prod-494815.iam.gserviceaccount.com
      containerConcurrency: 10
      timeoutSeconds: 900
      containers:
        - name: kh-cocoindex-pipeline
          image: europe-west2-docker.pkg.dev/kh-prod-494815/pipeline/kh-cocoindex-pipeline:latest
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
          env:
            - name: NEXT_PUBLIC_CLIENT_ID
              value: example-client
            - name: COCOINDEX_SOURCE_PATH
              value: ""
            # IMAGE_SHA: injected post-deploy by workflow (FX-2: Inject IMAGE_SHA step).
            # Correlates pipeline_runs.result->'extractor_version' to deployed image (Inv-8).
            - name: IMAGE_SHA
              value: ""
            # COCOINDEX_DB_DSN is mounted HERE (not via the workflow --set-secrets
            # step like the other secrets) because flow.py:_build_dsn() needs it at
            # BOOT — the @coco.lifespan asyncpg pool is created before /health can
            # serve, so a post-replace mount races the health-gated deploy (ID-49.8).
            - name: COCOINDEX_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: COCOINDEX_DB_DSN
                  key: latest
            # COCOINDEX_DB is the cocoindex ENGINE's internal LMDB state-store
            # path — NOT a Postgres DSN (that is COCOINDEX_DB_DSN above, the app's
            # asyncpg pool). environment.start_sync() raises ValueError("...must
            # provide Settings.db_path (or set COCOINDEX_DB ...)") when unset,
            # crashing the worker at boot AFTER the DSN pool. So it lives in the
            # applied manifest (same boot-gated discipline as COCOINDEX_DB_DSN /
            # prod-pullmd.yaml), pointing at the in-memory volume below (ID-49.9).
            # True cross-cold-start persistence is deferred — see
            # docs/runbooks/cocoindex-deploy.md (idle mode = no memo state to lose
            # yet; GCS FUSE is LMDB-incompatible; Filestore is the costed option).
            - name: COCOINDEX_DB
              value: /cocoindex-state/lmdb
            # Bound the LMDB map below the volume sizeLimit (engine default is
            # 4 GiB, which over-reserves the tmpfs). Idle-mode footprint is tiny;
            # revisit when the pipeline is activated (ID-42 T7).
            - name: COCOINDEX_LMDB_MAP_SIZE
              value: "268435456"  # 256 MiB
          volumeMounts:
            - name: cocoindex-state
              mountPath: /cocoindex-state
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
      # In-memory (tmpfs) volume backing the cocoindex LMDB state store. gen2
      # supports emptyDir medium: Memory; tmpfs is a real local FS so LMDB's
      # mmap + file locking work (GCS FUSE does NOT support these — that is why
      # this is an emptyDir, not a Cloud Storage volume). RAM-backed, so it
      # counts against the 4Gi container memory — 512Mi is safe idle-mode
      # headroom and bounds COCOINDEX_LMDB_MAP_SIZE above (ID-49.9).
      volumes:
        - name: cocoindex-state
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
