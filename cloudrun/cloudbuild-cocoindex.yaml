# Cloud Build pipeline — cocoindex sidecar image (kh-cocoindex-pipeline).
#
# ID-28.6: Cloud Run sidecar Service deploy infra.
# Spec: docs/specs/t8-cocoindex/TECH.md §Image-build + §Inv-9 + §T-OQ4
# Plan: docs/reference/task-list.json task 28, subtask 6
#
# Separate from cloudrun/cloudbuild.yaml (kh-pipeline) to maintain the
# AGPL boundary (O-Q3): this image includes Docling (MIT) + cocoindex Rust
# engine. pullmd (AGPL) ships in its own independently-deployed Service and
# is called via HTTP (PULLMD_SERVICE_URL).
#
# Image name: kh-cocoindex-pipeline
# Image-size budget: ~5.3 GB target (T-OQ4 ratification). Post-build step
# emits a WARNING if size > 5.3 GB × 1024³ — does NOT fail the build (log+warn
# at v1 per T-OQ4 board ratification).
#
# Inv-9 assertion (post-build): fail the build if the image contains any
# pullmd binary entries OR any Playwright/browser-driver dependencies.
# This enforces the AGPL boundary and prevents accidental headless-browser
# bloat (Playwright alone adds ~450 MB).
#
# Docling pre-warm: cloudrun/cocoindex-prewarm.py runs at build time to
# trigger Docling's lazy-load of layout-heron + docling-models into the
# image layer, avoiding a ~7 s cold-start model download on first request.
# (LMDB rebuild still requires ~7 s on new volume mount — that latency is
# acceptable per the S14 min-instances=1 design.)
#
# Tag strategy: $COMMIT_SHA + latest (mirrors kh-pipeline pattern).
# Cache: --cache-image=:cache + --previous-image=:latest for buildpack layer reuse.
#
# _COMMIT_SHA is a user-defined substitution (leading underscore required).
# Passed from GHA via --substitutions="_COMMIT_SHA=${GITHUB_SHA}".

steps:
  # Step 1: Build + publish the cocoindex image via buildpack.
  # Buildpack base: gcr.io/buildpacks/builder:google-22 (same as kh-pipeline).
  # GOOGLE_ENTRYPOINT points at the cocoindex HTTP server entry point.
  # Python 3.13 matches kh-pipeline to share layer cache.
  # NOTE: GOOGLE_BUILD_SCRIPT indirection is NOT used here — that env var
  # requires the script to have executable permissions (100755) which cannot
  # be guaranteed in a git checkout on Cloud Build workers. Instead, the
  # Docling pre-warm runs in a dedicated step (Step 1b) after image publish.
  - id: build-cocoindex
    name: gcr.io/k8s-skaffold/pack
    entrypoint: pack
    args:
      - build
      - europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:${_COMMIT_SHA}
      - --tag=europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:latest
      - --cache-image=europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:cache
      - --previous-image=europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:latest
      - --builder=gcr.io/buildpacks/builder:google-22
      # GOOGLE_ENTRYPOINT: cocoindex serves an HTTP interface on $PORT.
      # scripts/cocoindex_pipeline/server.py is authored by ID-28.15 — thin
      # aiohttp wrapper that exposes GET /health (200 OK) + runs
      # coco.start_blocking() in a background daemon thread so the cocoindex
      # fs-watch loop runs concurrently with the HTTP server. Resolves the
      # GOOGLE_ENTRYPOINT mismatch identified in S256 WP0 (the original brief
      # referenced scripts/cocoindex_server.py which was never authored).
      #
      # FX-8 (S257 W2 deploy verification): use `python3 -m` invocation, NOT
      # bare-script. Cloud Run buildpack runtime does NOT add /workspace to
      # sys.path on bare-script invocation, so `from scripts.cocoindex_pipeline.flow
      # import ...` qualified-namespace imports inside server.py + __main__.py
      # fail with `ModuleNotFoundError: No module named 'scripts'`. The `-m`
      # invocation makes Python prepend the parent of the topmost-package to
      # sys.path (i.e. /workspace), so the qualified namespace resolves. Local
      # pytest masked this gap (pytest rootdir auto-added /workspace to sys.path).
      # `scripts/` is a PEP 420 namespace package (no __init__.py); cocoindex_pipeline
      # is a regular package (__init__.py present). -m works for both.
      - --env=GOOGLE_ENTRYPOINT=python3 -m scripts.cocoindex_pipeline.server
      - --env=GOOGLE_RUNTIME=python
      - --env=GOOGLE_PYTHON_VERSION=3.13.13
      - --publish

  # Step 1b: Docling pre-warm — DEFERRED v1.0 per S256 FX-7.
  #
  # The original design ran python3 cloudrun/cocoindex-prewarm.py inside the
  # just-built buildpack image to bake Docling layout-heron + docling-models
  # into the final image layer (avoids a ~7 s cold-start model fetch on first
  # request). The naive entrypoint override (`entrypoint: python3 + args:
  # [cloudrun/cocoindex-prewarm.py]`) FAILS because buildpack images
  # (gcr.io/buildpacks/builder:google-22) put the Python runtime under
  # /layers/google.python.runtime/python/bin/ and expose it to PATH only via
  # the cnb launcher (/cnb/lifecycle/launcher). Direct entrypoint override
  # bypasses the launcher, so PATH is unset:
  #   "exec: \"python3\": executable file not found in $PATH"
  #
  # Correct invocation (untested — defer to v1.1):
  #   - id: prewarm-docling
  #     name: europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:${_COMMIT_SHA}
  #     entrypoint: /cnb/lifecycle/launcher
  #     args:
  #       - python3
  #       - cloudrun/cocoindex-prewarm.py
  # OR (more conservative, exercises the buildpack's web process type):
  #   - id: prewarm-docling
  #     name: europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:${_COMMIT_SHA}
  #     entrypoint: /cnb/lifecycle/launcher
  #     args:
  #       - bash
  #       - -c
  #       - "python3 cloudrun/cocoindex-prewarm.py"
  #
  # v1.0 trade-off (accepted FX-7 ratification): defer the pre-warm + accept
  # a one-time ~7 s cold-start latency hit on the first Service request after
  # min_instances=0 → 1. Inv-10 SLA target (60 s end-to-end on first PDF ingest
  # after scale-to-zero) has 53 s of slack vs the ~7 s lazy-load cost; the
  # Inv-10 acceptance test still passes without pre-warm. Re-enable in v1.1
  # once one of the two launcher invocations above is empirically verified
  # against the live buildpack image.

  # Step 2: Inv-9 assertion — confirm zero pullmd binary entries and zero
  # Playwright/browser-driver dependencies in the published image.
  # Fail-fast: any match exits non-zero, blocking the deploy.
  # Uses docker:cli (docker pull + inspect) against the just-published tag.
  - id: assert-inv9-no-pullmd-no-playwright
    name: docker:cli
    entrypoint: sh
    args:
      - -c
      - |
        set -e

        # Shell variables escaped with double-dollar per Cloud Build syntax
        # (FX-5 S256 WP0 fix — Cloud Build dynamic-substitution scans the YAML
        # literal-block including comments, so bare single-dollar var refs to
        # non-builtin keys fail at submit time with
        # "invalid value for build.substitutions". Escaped form resolves to a
        # literal dollar at shell-execution time.)
        IMAGE="europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:${_COMMIT_SHA}"
        echo "Inv-9 assertion: scanning $$IMAGE for forbidden binaries..."

        # Inspect image layers for pullmd binary entries.
        PULLMD_HITS=$$(docker image inspect "$$IMAGE" 2>/dev/null \
          | python3 -c "
        import sys, json
        layers = json.load(sys.stdin)
        hits = [l for l in layers if 'pullmd' in str(l)]
        print(len(hits))
        " || echo "0")

        # Inspect image config/labels for Playwright browser markers.
        PLAYWRIGHT_HITS=$$(docker image inspect "$$IMAGE" 2>/dev/null \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        raw = json.dumps(data)
        markers = ['playwright', 'chromium', 'playwright-driver']
        hits = [m for m in markers if m in raw.lower()]
        print(len(hits))
        " || echo "0")

        echo "pullmd entries found: $$PULLMD_HITS"
        echo "Playwright markers found: $$PLAYWRIGHT_HITS"

        if [ "$$PULLMD_HITS" -gt 0 ]; then
          echo "ERROR: Inv-9 FAIL — pullmd binary detected in cocoindex image. AGPL boundary violated." >&2
          exit 1
        fi

        if [ "$$PLAYWRIGHT_HITS" -gt 0 ]; then
          echo "ERROR: Inv-9 FAIL — Playwright/browser dependency detected in cocoindex image." >&2
          exit 1
        fi

        echo "Inv-9 PASS: zero pullmd entries, zero Playwright dependencies."

  # Step 3: Image-size budget check (T-OQ4 ratification — log+warn, do NOT fail).
  # Target: 5.3 GB. Emits a structured WARNING if exceeded so operators can
  # monitor drift without blocking the release pipeline.
  - id: check-image-size-budget
    name: docker:cli
    entrypoint: sh
    args:
      - -c
      - |
        # Shell variables escaped with $$ per Cloud Build substitution syntax
        # (FX-5 — see assert-inv9-no-pullmd-no-playwright step for rationale).
        IMAGE="europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-cocoindex-pipeline:${_COMMIT_SHA}"
        echo "Image-size budget check (T-OQ4): target <= 5.3 GB..."

        SIZE_BYTES=$$(docker image inspect "$$IMAGE" 2>/dev/null \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        print(data[0].get('Size', 0))
        " || echo "0")

        # 5.3 GB in bytes
        BUDGET_BYTES=5691392819

        # FX-3: use awk for GB conversion — avoids shell+Python quoting collision.
        if [ "$$SIZE_BYTES" != "0" ]; then
          SIZE_GB=$$(awk "BEGIN {printf \"%.2f\", $${SIZE_BYTES}/1024/1024/1024}")
        else
          SIZE_GB="unknown"
        fi
        echo "Image size: $$SIZE_BYTES bytes ($${SIZE_GB} GB, budget: 5.3 GB)"

        if [ "$$SIZE_BYTES" -gt "$$BUDGET_BYTES" ]; then
          echo "WARNING: Image size $$SIZE_BYTES bytes exceeds 5.3 GB budget ($$BUDGET_BYTES bytes)." >&2
          echo "WARNING: Review Docling model pre-warm scope or switch to runtime download." >&2
          echo "WARNING: T-OQ4 ratification: log+warn at v1 — build continues." >&2
        else
          echo "OK: Image size within 5.3 GB budget."
        fi

# Image push handled by pack --publish in the build step.
# Do NOT use top-level images: block — same pack/push collision as kh-pipeline
# (see cloudbuild.yaml header comment: S17 W1 / F-1).

options:
  logging: CLOUD_LOGGING_ONLY
  # E2_HIGHCPU_8 required for Docling install (1.8 GB PyTorch-backed model
  # weights + Rust cocoindex wheel compilation). Matches kh-pipeline machine type.
  machineType: E2_HIGHCPU_8

# Extended timeout: Docling + cocoindex wheel install + pre-warm model download
# at build time is expected to take 30-45 min on cold cache.
timeout: 3600s

substitutions:
  _COMMIT_SHA: ""
