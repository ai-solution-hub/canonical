# Cloud Build pipeline — single image variant (kh-prod-readiness-S41 W3 collapse).
#
# Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-run-cloud-run-provisioning-spec.md §2.13 (image registry) — AC-2 amended v1.6 to single variant
# Plan: docs/audits/kh-production-readiness-phase-1/plans/wp-run-cloud-run-provisioning-plan.md T1b.3 step 2
#
# Single image variant: kh-pipeline (default entrypoint: python3 scripts/ingest.py).
# Eval entrypoint (scripts/eval-classification.py) is overridden at exec time via
# Cloud Run Job `args` once Phase 2 lands the script (does not exist today).
#
# Pre-S41 W3 history: previously built two variants kh-pipeline-{slim,eval} from
# identical requirements.txt — both 3.3 GB, both pulling bert-score+torch+CUDA.
# Verified empirically S40+S41 logs that the package lists were byte-identical.
# eval image was built every CI run only to satisfy the original AC-2 ("both
# variants present") and never invoked. Single-image collapse halves Cloud Build
# duration (S41 W2 measurement: per-step ~6 min × 2 → single ~6 min).
#
# Buildpack base: gcr.io/buildpacks/python (per D-RUN-2 primary path).
# Dockerfile escape hatch is Phase 1c contingent (R-10) — TODO if buildpack fails on bert-score.
# No Procfile per spec F-9 fix — entrypoints declared inline via GOOGLE_ENTRYPOINT env.
#
# Tag strategy: $COMMIT_SHA + latest. Push targets keyed by $PROJECT_ID
# so the same cloudbuild.yaml ships both kh-prod-494815 and kh-staging-494815 from a
# single GH Actions invocation.
#
# Cache plumbing per spec §2.13.1 v1.5 (S41 W2 amendment): --previous-image=:latest
# gives the lifecycle analyzer a previous image to derive layer metadata from
# (the SHA-tagged primary doesn't exist for new commits); --cache-image=:cache
# is both source and target for the buildpack's pip layer cache.
steps:
  - id: build
    name: gcr.io/k8s-skaffold/pack
    entrypoint: pack
    args:
      - build
      - europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-pipeline:${_COMMIT_SHA}
      - --tag=europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-pipeline:latest
      - --cache-image=europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-pipeline:cache
      - --previous-image=europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline/kh-pipeline:latest
      - --builder=gcr.io/buildpacks/builder:google-22
      - --env=GOOGLE_ENTRYPOINT=python3 scripts/ingest.py
      - --env=GOOGLE_RUNTIME=python
      - --env=GOOGLE_PYTHON_VERSION=3.13.13
      - --publish

# Image push is handled by pack `--publish` inside the build step. We deliberately
# do NOT use the top-level `images:` block here: that block triggers a final
# Docker-daemon push at the end of the build, which fails when pack `--publish`
# has already pushed (pack discards the local Docker image, so the post-step push
# finds nothing to push — same root cause as S17 W1 verifier finding F-1).
# Provenance / AC-2 verification: `gcloud artifacts docker images list \
# europe-west2-docker.pkg.dev/$PROJECT_ID/pipeline` after the workflow lands.
# `_COMMIT_SHA` is a user-defined substitution (leading underscore required) —
# passed from the GHA workflow via `--substitutions=_COMMIT_SHA=$GITHUB_SHA`.
# Built-in `$COMMIT_SHA` only populates for trigger-invoked builds; direct
# `gcloud builds submit` leaves it empty.

options:
  logging: CLOUD_LOGGING_ONLY
  # Cloud Build worker machine size — bumped from default e2-standard-2 to
  # cope with bert-score wheel install (R-3 / R-10 mitigation).
  machineType: E2_HIGHCPU_8

timeout: 1800s
