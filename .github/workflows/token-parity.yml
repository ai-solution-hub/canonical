# Warm Meridian token-parity guard (ID-114 {114.10}).
#
# Asserts that the six mirror tokens in docs-site/src/styles/warm-meridian.css
# match their canonical declarations in app/globals.css (PRODUCT Inv-10,
# TECH.md §2.7 — re-homed from DS to MAIN so the MAIN repo is the single
# authoritative CI gate for this contract).
#
# IMPORTANT — OPT-IN LANE ONLY (Inv 30):
#   The resolve-private-docs action (PC-28 bridge) is not permitted in any
#   PR-blocking CI job. This workflow is intentionally NOT listed in ci.yml
#   and must never become a required check. Drift is caught on push to main
#   (build-time warning) and on demand via workflow_dispatch.
#
# Resolution routes for KH_PRIVATE_DOCS_DIR (Inv 28):
#   CI:    this action — GitHub-App token clone into runner.temp.
#   Local: KH_PRIVATE_DOCS_DIR set to the sibling checkout.
#
# Secrets required:
#   APP_ID          — GitHub App ID (knowledge-hub-integration; repo-level).
#   APP_PRIVATE_KEY — GitHub App private key (PEM; repo-level).

name: token-parity

on:
  push:
    branches: [main]
    paths:
      - "app/globals.css"
      - "scripts/check-token-parity.ts"
      - ".github/workflows/token-parity.yml"
  workflow_dispatch:

concurrency:
  group: token-parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Warm Meridian token parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve private docs (warm-meridian.css bridge)
        uses: ./.github/actions/resolve-private-docs
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
        # KH_PRIVATE_DOCS_DIR is exported into the job env by the action.
        # Subsequent steps read the warm-meridian.css mirror from there.

      - name: Run token-parity guard
        run: bun run scripts/check-token-parity.ts
