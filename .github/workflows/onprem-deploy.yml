# On-prem (B1) pipeline image build — ID-66 {66.7} (TECH change 4 slice A).
#
# Builds the KH-owned cocoindex pipeline image OFF-HOST on GitHub-hosted runners
# and pushes a pinned, content-addressable image to ghcr.io. The ~16 GB IONOS
# host never runs this ~5.3 GB Docling+cocoindex build (OQ-66-6: Coolify warns
# resource-intensive on-host builds crash the server). Satisfies invariant 13
# (no host CPU/RAM contention) + invariant 14 (push half — a pinned, non-:latest
# image lands in ghcr.io).
#
# SCOPE — the BUILD half ({66.7}) builds-and-pushes; the DEPLOY half ({66.11})
# bumps the Coolify image tag and triggers a Coolify deploy of the freshly-built
# pinned tag (see the `deploy-cocoindex` job below):
#   * The Coolify pull/deploy webhook was {66.11} — now wired as a SECOND job that
#     `needs:` the build job (so a deploy can NEVER fire on a tag that was not
#     built + pushed + pull-verified — the "never a stale image" ordering guard).
#   * pullmd / playwright / trafilatura are UPSTREAM aeternalabshq/* images
#     (pulled by the {66.8} compose); only the cocoindex image is KH-built, so
#     this workflow builds exactly ONE image.
#   * NO KH application-code changes — it packages scripts/cocoindex_pipeline/*.py
#     unchanged; the build config is faithful to cloudrun/cloudbuild-cocoindex.yaml
#     (same google-22 builder, GOOGLE_ENTRYPOINT, runtime, Python version).
#   * NEXT_PUBLIC_CLIENT_ID is NOT a B1-host concern (OQ-66-6 — Vercel-side bake).
#
# BURN-PREVENTION — read docs/runbooks/onprem-b1-deploy.md §B2 before changing
# anything here. The on-prem pipeline burned Anthropic tokens TWICE across
# S294-S297. The burn guard is now ARCHITECTURAL (ID-83 / bl-221): the cocoindex
# worker boots lifespan-only (coco.start_blocking()) and NEVER walks the corpus
# at boot, so a deploy/auto-restart is burn-safe BY CONSTRUCTION regardless of
# COCOINDEX_SOURCE_PATH's value. The corpus walk fires only via the on-demand
# POST /walk trigger. INFORMATIONAL (no longer burn-critical, {66.11} superseded):
# the deploy jobs below still only PATCH COCOINDEX_IMAGE_TAG and do not set
# COCOINDEX_SOURCE_PATH — corpus-path management stays with Coolify env / the
# operator — but this avoidance is no longer load-bearing for burn-safety now
# that boot is decoupled. The load-bearing operator guarantee — "this Action is
# the SOLE deploy trigger" — still lives in the runbook (Coolify git-auto-deploy
# MUST be disabled, else a push would redeploy on the STALE tag before the build
# finishes); that ordering guard is unchanged.
#
# Replaces the build half of cloud-run-deploy.yml (retired at cutover {66.17};
# the file + Cloud Run manifests stay in git for reversibility, inv 24). WIF /
# deploy-SA are DROPPED, not migrated — no gcloud credential lands on the host.
#
# ─────────────────────────────────────────────────────────────────────────────
# Activation review items (resolved S288 — ID-66.7; staging arm added S309 / bl-222):
#   1. ✅ DEPLOY BRANCHES = `main` (prod) + `staging` (staging mirror, added S309).
#      The staging on-prem mirror now EXISTS: Liam added `COOLIFY_API_TOKEN` to the
#      Staging GH environment (the only blocker), so a push to `staging` builds the
#      staging-branch sha image and deploys it to the staging Coolify compose project
#      (uuid ljurtiab99kb6dst38k76419) via the `deploy-cocoindex-staging` job below.
#      The prod `deploy-cocoindex` job is now branch-guarded (`refs/heads/main`) so a
#      push to `staging` never fires the prod deploy.
#   2. ✅ EXTERNAL REFS PINNED to commit SHAs (workflow-injection hardening per the
#      cloud-run-deploy.yml header). SHAs resolved 2026-05-31; floated version in the
#      trailing comment. setup-pack moved off the v5.8.11 placeholder to current v5.12.3.
#   3. ⬜ LIVE TRIGGER TEST ({66.7} testStrategy): run once (workflow_dispatch off the
#      working branch) and confirm a pullable ghcr.io/<owner>/kh-cocoindex-pipeline:sha-<sha>
#      appears and the host stays uncontended.
# ─────────────────────────────────────────────────────────────────────────────

name: onprem-deploy (B1 cocoindex image → ghcr.io)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual build reason (first off-host build / roll-forward)"
        required: false
        default: "manual"
      deploy:
        # Build-only dry-run escape hatch ({66.11}): set false to build + push +
        # pull-verify the image WITHOUT touching the host (no tag bump, no Coolify
        # deploy). Defaults true so a plain dispatch behaves like a push. A `push`
        # event always deploys (this input is workflow_dispatch-only).
        description:
          "Trigger the Coolify deploy after build (false = build-only dry-run)"
        required: false
        type: boolean
        default: true
  push:
    branches: [main, staging] # main → prod deploy; staging → staging deploy (bl-222, S309). Branch-guarded per job below.
    paths:
      - "scripts/**/*.py"
      - "requirements.txt"
      - "deploy/coolify/**"

permissions:
  contents: read
  packages: write # GITHUB_TOKEN push to ghcr.io/<owner>/*

env:
  # Pinned, content-addressable tag — NEVER :latest (mirrors the pullmd
  # no-:latest discipline at cloud-run-deploy.yml:458). Rollback ({66.12}) =
  # re-point Coolify to a prior sha- tag; no rebuild.
  IMAGE: ghcr.io/${{ github.repository_owner }}/kh-cocoindex-pipeline
  TAG: sha-${{ github.sha }}

jobs:
  build-and-push-cocoindex:
    name: Build + push cocoindex image (off-host)
    runs-on: ubuntu-latest
    timeout-minutes: 75 # Docling install + cocoindex Rust wheel + model layer (cloudbuild budgets 60m)
    steps:
      - name: Checkout (build context = repo root)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (pinned 2026-05-31)

      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3 (pinned 2026-05-31)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up the Cloud Native Buildpacks `pack` CLI
        uses: buildpacks/github-actions/setup-pack@812ff667850b930be2217c48e1f980e71bd3e14f # v5.12.3 (pinned 2026-05-31; was v5.8.11 placeholder)

      - name:
          Build + publish cocoindex image (buildpacks — faithful to
          cloudbuild-cocoindex.yaml)
        run: |
          set -euo pipefail
          # IMAGE HYGIENE (IP + slim): the cocoindex image must ship ONLY the Python
          # pipeline + its deps — never the Next.js app, docs/, .planning/ (client IP),
          # docs-site, .claude, or tests. pack does NOT reliably honour .gcloudignore or
          # project.toml include/exclude (a whitelist attempt still leaked
          # .claude / docs-site / __tests__ into /workspace), so we build from an
          # EXPLICITLY PRUNED context containing nothing but scripts/ + requirements.txt.
          # This is the authoritative mechanism — verify with `ls /workspace` on the
          # pulled image (expect: scripts requirements.txt only).
          CTX="$(mktemp -d)"
          cp -R scripts "${CTX}/scripts"
          cp requirements.txt "${CTX}/requirements.txt"
          echo "Pruned build context:"; ls -A "${CTX}"
          # Same builder/env as cloudrun/cloudbuild-cocoindex.yaml. `-m` invocation
          # is load-bearing (FX-8): the buildpack runtime does not add /workspace
          # to sys.path on bare-script invocation, so `scripts.cocoindex_pipeline`
          # qualified imports need `python3 -m`.
          #
          # REMOTE LAYER CACHE (approach B — backlog 216 follow-up): --cache-image
          # persists the buildpack build cache (incl. the heavy pip / Docling / ML /
          # cocoindex-Rust-wheel deps layer — the bulk of the ~9-min cold build) to a
          # STABLE registry tag, so each ephemeral GH runner RESTORES it instead of
          # rebuilding from cold. It is registry-backed (requires --publish; there is
          # no persistent local volume across runners). On the FIRST run the tag does
          # not exist — pack treats it as an empty cache and SEEDS it post-build;
          # subsequent runs with an unchanged requirements.txt cache-hit the deps
          # layer (~9 min cold -> ~2-4 min warm; a requirements.txt change re-seeds it).
          # The :buildcache tag is SEPARATE from the pinned :sha- app image, so the
          # Inv-9 assertion + size-budget steps below still inspect ONLY the app image.
          pack build "${IMAGE}:${TAG}" \
            --path "${CTX}" \
            --builder gcr.io/buildpacks/builder:google-22 \
            --cache-image "${IMAGE}:buildcache" \
            --env "GOOGLE_ENTRYPOINT=python3 -m scripts.cocoindex_pipeline.server" \
            --env "GOOGLE_RUNTIME=python" \
            --env "GOOGLE_PYTHON_VERSION=3.13.13" \
            --publish
          echo "Published ${IMAGE}:${TAG}"

      - name:
          Inv-9 assertion — cocoindex image carries NO pullmd / Playwright (AGPL
          boundary)
        run: |
          set -euo pipefail
          # --publish pushes straight to the registry without a local load; pull
          # the just-pushed digest back to inspect it (ports cloudbuild-cocoindex.yaml
          # step "assert-inv9-no-pullmd-no-playwright"). pullmd (AGPL) + Playwright
          # ship as their own upstream compose services — they must never be baked
          # into the cocoindex image.
          docker pull "${IMAGE}:${TAG}"
          RAW="$(docker image inspect "${IMAGE}:${TAG}")"
          if printf '%s' "$RAW" | grep -qiE 'pullmd'; then
            echo "::error::Inv-9 FAIL — pullmd entry detected in cocoindex image (AGPL boundary violated)."
            exit 1
          fi
          if printf '%s' "$RAW" | grep -qiE 'playwright|chromium|playwright-driver'; then
            echo "::error::Inv-9 FAIL — Playwright/Chromium dependency detected in cocoindex image."
            exit 1
          fi
          echo "Inv-9 PASS: zero pullmd entries, zero Playwright dependencies."

      - name: Image-size budget check (T-OQ4 — log + warn, never fail)
        run: |
          set -euo pipefail
          SIZE="$(docker image inspect "${IMAGE}:${TAG}" --format '{{.Size}}')"
          BUDGET=5691392819 # 5.3 GB
          GB="$(awk "BEGIN{printf \"%.2f\", ${SIZE}/1024/1024/1024}")"
          echo "cocoindex image size: ${GB} GB (budget 5.3 GB)"
          if [ "${SIZE}" -gt "${BUDGET}" ]; then
            echo "::warning::cocoindex image ${GB} GB exceeds the 5.3 GB budget (T-OQ4: warn-only, build continues)."
          else
            echo "OK: within 5.3 GB budget."
          fi

      - name: Job summary
        run: |
          {
            echo "### onprem-deploy — cocoindex image built off-host"
            echo ""
            echo "- **Image:** \`${IMAGE}:${TAG}\` (pinned, non-\`:latest\`)"
            echo "- **Builder:** buildpacks \`google-22\` on GH runner (inv 13 — host uncontended)"
            echo "- **Next:** the \`deploy-cocoindex\` job ({66.11}) bumps Coolify \`COCOINDEX_IMAGE_TAG\` to this tag + triggers a deploy"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # DEPLOY HALF — {66.11}: bump the Coolify image tag to the just-built pinned
  # tag and trigger a Coolify deploy of THAT tag. Coolify re-clones the git
  # compose and PULLS the finished image (it never builds on the host).
  #
  # ORDERING GUARD (never a stale image): `needs: build-and-push-cocoindex`
  # means this job only runs after the build job has built + pushed +
  # pull-verified `${IMAGE}:${TAG}`. The PATCH below sets COCOINDEX_IMAGE_TAG to
  # the SAME `${{ env.TAG }}` the build job published, so the bumped tag is
  # byte-identical to the built tag.
  #
  # BURN GUARD — INFORMATIONAL since ID-83 / bl-221 (boot is decoupled): this
  # job touches ONLY COCOINDEX_IMAGE_TAG and does NOT set COCOINDEX_SOURCE_PATH —
  # but that avoidance is NO LONGER load-bearing for burn-safety. The burn guard
  # is now ARCHITECTURAL: the cocoindex worker boots lifespan-only
  # (coco.start_blocking()) and never walks the corpus at boot, so the
  # deploy/restart this job triggers is burn-safe by construction whether or not
  # COCOINDEX_SOURCE_PATH is set. The corpus walk fires only via the on-demand
  # POST /walk trigger (a Coolify scheduled task / operator curl). We still leave
  # SOURCE_PATH to Coolify env / the operator. The "Action is the SOLE deploy
  # trigger" guarantee (Coolify git-auto-deploy disabled) remains an OPERATOR
  # action — see docs/runbooks/onprem-b1-deploy.md §B2.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-cocoindex:
    name: Bump Coolify tag + deploy (on-host pull)
    needs: build-and-push-cocoindex
    runs-on: ubuntu-latest
    # `Production` GH environment (case-sensitive) resolves COOLIFY_API_TOKEN
    # (added S294) + COOLIFY_BASE_URL (operator must create = http://77.68.122.71:8000).
    environment: Production
    timeout-minutes: 10
    # A `push` always deploys; a `workflow_dispatch` deploys unless the operator
    # set deploy=false (build-only dry-run). github.event.inputs.deploy is the
    # boolean input serialised to the string "true"/"false".
    # BRANCH GUARD (bl-222 / S309): the build job now also triggers on push to
    # `staging`. The `refs/heads/main` guard keeps this PROD deploy job firing ONLY
    # in the prod (main) context — a push to `staging` deploys via the
    # `deploy-cocoindex-staging` job below, never here.
    if:
      github.ref == 'refs/heads/main' && (github.event_name == 'push' ||
      github.event.inputs.deploy == 'true')
    env:
      # NON-secret Coolify app uuid (git-sourced Docker Compose app
      # `kh-onprem-pipeline-git`). Safe as a literal — it is not a credential.
      COOLIFY_APP_UUID: ybiczck7f7e1xbdev3bk89cr
    steps:
      - name: Bump COCOINDEX_IMAGE_TAG in Coolify (PATCH — update in place)
        env:
          # Map secrets / dynamic values into the shell env (never interpolate
          # ${{ }} directly inside run: — injection-safe, and no secret is echoed).
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          # PATCH updates the EXISTING COCOINDEX_IMAGE_TAG env in place (by key).
          # POST would CREATE A DUPLICATE — the §6 duplicate-key footgun — so we
          # MUST use PATCH. We touch ONLY COCOINDEX_IMAGE_TAG here; we NEVER send
          # COCOINDEX_SOURCE_PATH (corpus-path management stays with Coolify env /
          # the operator). INFORMATIONAL since ID-83 / bl-221: not setting it is no
          # longer burn-critical — boot is decoupled (lifespan-only, no walk), so
          # the auto-restart this deploy triggers cannot burn Anthropic regardless
          # of SOURCE_PATH's value; the walk fires only via on-demand POST /walk.
          # --fail-with-body: non-2xx → non-zero exit + body printed (so the job
          # fails loudly instead of silently "succeeding" on a Coolify error).
          curl --fail-with-body -sS \
            -X PATCH "${COOLIFY_BASE_URL}/api/v1/applications/${COOLIFY_APP_UUID}/envs" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"COCOINDEX_IMAGE_TAG\",\"value\":\"${DEPLOY_TAG}\",\"is_buildtime\":true,\"is_runtime\":true}"
          echo "PATCHed COCOINDEX_IMAGE_TAG -> ${DEPLOY_TAG} (SOURCE_PATH left untouched / idle-safe)"

      - name:
          Trigger Coolify deploy of the pinned tag (host pulls — no on-host
          build)
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          # The per-resource deploy webhook the Coolify UI exposes. Coolify
          # re-clones the git compose and pulls the image resolved from the
          # (just-bumped) COCOINDEX_IMAGE_TAG. force=false: reuse cache where it
          # is safe; the pinned tag bump is what guarantees the fresh image.
          curl --fail-with-body -sS \
            -X GET "${COOLIFY_BASE_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"
          echo "Triggered Coolify deploy of ${COOLIFY_APP_UUID} (pinned tag pull)."

      - name: Deploy summary
        env:
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          {
            echo "### onprem-deploy — Coolify tag bump + deploy ({66.11})"
            echo ""
            echo "- **Tag bumped:** \`COCOINDEX_IMAGE_TAG\` → \`${DEPLOY_TAG}\` (PATCH, in place — never duplicated)"
            echo "- **Deploy:** triggered on \`${COOLIFY_APP_UUID}\` (host pulls the pinned tag; never builds on-host)"
            echo "- **Burn guard (architectural, ID-83 / bl-221):** boot is decoupled — the worker boots lifespan-only and never walks the corpus, so this deploy/restart is burn-safe regardless of \`COCOINDEX_SOURCE_PATH\` (the walk fires only via on-demand POST /walk). This Action still leaves SOURCE_PATH to Coolify env (informational, no longer burn-critical)."
            echo "- **Reminder:** this Action is the **SOLE deploy trigger** — Coolify git-auto-deploy MUST stay disabled (see \`docs/runbooks/onprem-b1-deploy.md\` §B2)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # STAGING DEPLOY HALF — bl-222 / S309: a faithful mirror of `deploy-cocoindex`
  # for the STAGING on-prem compose project. Triggered ONLY by a push to the
  # `staging` branch (the build job builds the staging-branch sha image; this job
  # bumps the staging Coolify COCOINDEX_IMAGE_TAG to THAT tag + triggers a deploy).
  #
  # ORDERING GUARD (never a stale image): `needs: build-and-push-cocoindex`
  # means this job only runs after the build job has built + pushed +
  # pull-verified `${IMAGE}:${TAG}`. The PATCH below sets COCOINDEX_IMAGE_TAG to
  # the SAME `${{ env.TAG }}` the build job published, so the bumped tag is
  # byte-identical to the built tag.
  #
  # BURN GUARD — INFORMATIONAL since ID-83 / bl-221 (boot is decoupled): this
  # job touches ONLY COCOINDEX_IMAGE_TAG and does NOT set COCOINDEX_SOURCE_PATH —
  # but that avoidance is NO LONGER load-bearing for burn-safety. The burn guard
  # is now ARCHITECTURAL: the cocoindex worker boots lifespan-only
  # (coco.start_blocking()) and never walks the corpus at boot, so the
  # deploy/restart this job triggers is burn-safe by construction whether or not
  # COCOINDEX_SOURCE_PATH is set. The corpus walk fires only via the on-demand
  # POST /walk trigger (a Coolify scheduled task / operator curl). We still leave
  # SOURCE_PATH to Coolify env / the operator. The "Action is the SOLE deploy
  # trigger" guarantee (Coolify git-auto-deploy disabled) remains an OPERATOR
  # action — see docs/runbooks/onprem-b1-deploy.md §B2.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-cocoindex-staging:
    name: Bump Coolify tag + deploy — STAGING (on-host pull)
    needs: build-and-push-cocoindex
    runs-on: ubuntu-latest
    # `Staging` GH environment (case-sensitive) resolves COOLIFY_API_TOKEN
    # (added S309 — the bl-222 unblocker) + COOLIFY_BASE_URL (already on Staging).
    environment: Staging
    timeout-minutes: 10
    # Mirror of the prod job's gate, scoped to the staging branch: a `push` (to
    # `staging`) always deploys; a `workflow_dispatch` deploys unless the operator
    # set deploy=false. The `refs/heads/staging` guard keeps this STAGING deploy
    # job firing ONLY in the staging context (a push to `main` deploys via the
    # prod `deploy-cocoindex` job above, never here).
    if:
      github.ref == 'refs/heads/staging' && (github.event_name == 'push' ||
      github.event.inputs.deploy == 'true')
    env:
      # NON-secret Coolify app uuid (staging git-sourced Docker Compose app).
      # Safe as a literal — it is not a credential.
      COOLIFY_APP_UUID: ljurtiab99kb6dst38k76419
    steps:
      - name: Bump COCOINDEX_IMAGE_TAG in Coolify (PATCH — update in place)
        env:
          # Map secrets / dynamic values into the shell env (never interpolate
          # ${{ }} directly inside run: — injection-safe, and no secret is echoed).
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          # PATCH updates the EXISTING COCOINDEX_IMAGE_TAG env in place (by key).
          # POST would CREATE A DUPLICATE — the §6 duplicate-key footgun — so we
          # MUST use PATCH. We touch ONLY COCOINDEX_IMAGE_TAG here; we NEVER send
          # COCOINDEX_SOURCE_PATH (corpus-path management stays with Coolify env /
          # the operator). INFORMATIONAL since ID-83 / bl-221: not setting it is no
          # longer burn-critical — boot is decoupled (lifespan-only, no walk), so
          # the auto-restart this deploy triggers cannot burn Anthropic regardless
          # of SOURCE_PATH's value; the walk fires only via on-demand POST /walk.
          # --fail-with-body: non-2xx → non-zero exit + body printed (so the job
          # fails loudly instead of silently "succeeding" on a Coolify error).
          curl --fail-with-body -sS \
            -X PATCH "${COOLIFY_BASE_URL}/api/v1/applications/${COOLIFY_APP_UUID}/envs" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"COCOINDEX_IMAGE_TAG\",\"value\":\"${DEPLOY_TAG}\",\"is_buildtime\":true,\"is_runtime\":true}"
          echo "PATCHed COCOINDEX_IMAGE_TAG -> ${DEPLOY_TAG} (SOURCE_PATH left untouched / idle-safe)"

      - name:
          Trigger Coolify deploy of the pinned tag (host pulls — no on-host
          build)
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          # The per-resource deploy webhook the Coolify UI exposes. Coolify
          # re-clones the git compose and pulls the image resolved from the
          # (just-bumped) COCOINDEX_IMAGE_TAG. force=false: reuse cache where it
          # is safe; the pinned tag bump is what guarantees the fresh image.
          curl --fail-with-body -sS \
            -X GET "${COOLIFY_BASE_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"
          echo "Triggered Coolify deploy of ${COOLIFY_APP_UUID} (pinned tag pull)."

      - name: Deploy summary
        env:
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          {
            echo "### onprem-deploy — Coolify tag bump + deploy — STAGING (bl-222)"
            echo ""
            echo "- **Tag bumped:** \`COCOINDEX_IMAGE_TAG\` → \`${DEPLOY_TAG}\` (PATCH, in place — never duplicated)"
            echo "- **Deploy:** triggered on \`${COOLIFY_APP_UUID}\` (staging host pulls the pinned tag; never builds on-host)"
            echo "- **Burn guard (architectural, ID-83 / bl-221):** boot is decoupled — the worker boots lifespan-only and never walks the corpus, so this deploy/restart is burn-safe regardless of \`COCOINDEX_SOURCE_PATH\` (the walk fires only via on-demand POST /walk). This Action still leaves SOURCE_PATH to Coolify env (informational, no longer burn-critical)."
            echo "- **Reminder:** this Action is the **SOLE deploy trigger** — Coolify git-auto-deploy MUST stay disabled (see \`docs/runbooks/onprem-b1-deploy.md\` §B2)"
          } >> "$GITHUB_STEP_SUMMARY"
