# On-prem (B1) pipeline image build — ID-66 {66.7} (TECH change 4 slice A).
#
# Builds the KH-owned cocoindex pipeline image OFF-HOST on GitHub-hosted runners
# and pushes a pinned, content-addressable image to ghcr.io. The ~16 GB IONOS
# host never runs this ~5.3 GB Docling+cocoindex build (OQ-66-6: Coolify warns
# resource-intensive on-host builds crash the server). Satisfies invariant 13
# (no host CPU/RAM contention) + invariant 14 (push half — a pinned, non-:latest
# image lands in ghcr.io).
#
# SCOPE — the BUILD half ({66.7}) builds-and-pushes; the DEPLOY half ({66.11})
# bumps the Coolify image tag and triggers a Coolify deploy of the freshly-built
# pinned tag. PUSH NO LONGER DEPLOYS (ID-127.6 + ID-127.16): a push to main /
# staging builds + pushes the image only. The PLATFORM deploy is now
# workflow_dispatch-ONLY (the `deploy-cocoindex-platform` / `-platform-staging`
# jobs below, gated on the `deploy_platform` / `deploy_platform_staging` inputs).
# CLIENT pipeline deploys are REMOVED from this workflow entirely — they run OFF
# the platform GH environments (Coolify-direct now; a future per-client GitHub
# Environment before client-2). See the client-pipeline comment block by the
# platform deploy jobs. NO client app UUID appears in this PUBLIC repo.
#   * The Coolify pull/deploy webhook was {66.11} — now wired as platform deploy
#     jobs that `needs:` the build job (so a deploy can NEVER fire on a tag that
#     was not built + pushed + pull-verified — the "never a stale image" guard).
#   * Only the cocoindex image is KH-built — HTML extraction is now fully
#     in-process (Trafilatura, ID-112), so there is no upstream extractor
#     sidecar image; this workflow builds exactly ONE image.
#   * NO KH application-code changes — it packages scripts/cocoindex_pipeline/*.py
#     unchanged; the build config preserves the original Cloud Build setup
#     (same google-22 builder, GOOGLE_ENTRYPOINT, runtime, Python version).
#   * NEXT_PUBLIC_CLIENT_ID is NOT a B1-host concern (OQ-66-6 — Vercel-side bake).
#
# BURN-PREVENTION — read docs/runbooks/onprem-b1-deploy.md §B2 before changing
# anything here. The on-prem pipeline burned Anthropic tokens TWICE across
# S294-S297. The burn guard is now ARCHITECTURAL (ID-83 / bl-221): the cocoindex
# worker boots lifespan-only (coco.start_blocking()) and NEVER walks the corpus
# at boot, so a deploy/auto-restart is burn-safe BY CONSTRUCTION regardless of
# COCOINDEX_SOURCE_PATH's value. The corpus walk fires only via the on-demand
# POST /walk trigger. INFORMATIONAL (no longer burn-critical, {66.11} superseded):
# the deploy jobs below still only PATCH COCOINDEX_IMAGE_TAG and do not set
# COCOINDEX_SOURCE_PATH — corpus-path management stays with Coolify env / the
# operator — but this avoidance is no longer load-bearing for burn-safety now
# that boot is decoupled. The load-bearing operator guarantee — "this Action is
# the SOLE deploy trigger" — still lives in the runbook (Coolify git-auto-deploy
# MUST be disabled, else a push would redeploy on the STALE tag before the build
# finishes); that ordering guard is unchanged.
#
# Replaces the build half of cloud-run-deploy.yml (retired at cutover {66.17};
# the file + Cloud Run manifests stay in git for reversibility, inv 24). WIF /
# deploy-SA are DROPPED, not migrated — no gcloud credential lands on the host.
#
# CHANGE DETECTION (ID-86 / bl-236, S321): the workflow-level `paths:` filter is
# GONE. GitHub's push-event paths filter inspects only the FIRST 300 changed
# files of a compare, so align-class pushes (S319: 1,522 files, first scripts/
# hit at position 1,467) silently skipped this workflow on main AND staging — no
# error, no run. The workflow now ALWAYS starts on a main/staging push and the
# `detect-changes` first job diffs the FULL before..sha compare (no 300-file
# limit), gating the heavy build/deploy jobs on `outputs.relevant`. The match
# set preserves the retired filter's semantics exactly: scripts/**/*.py,
# requirements.txt, deploy/coolify/**. workflow_dispatch stays as the
# belt-and-braces fallback and is always treated as relevant. None of the
# burn-prevention guarantees above change — the detection job runs no deploys
# and touches no Coolify state.
#
# ─────────────────────────────────────────────────────────────────────────────
# Activation review items (resolved S288 — ID-66.7; staging arm S309 / bl-222;
# deploy-separation ID-127.6 + ID-127.16 + AMENDMENT OQ-2):
#   1. ✅ BUILD BRANCHES = `main` + `staging` — a push to either builds + pushes the
#      branch sha image (the `detect-changes` + `build-and-push-cocoindex` jobs).
#      DEPLOY is now DISPATCH-ONLY and PLATFORM-only: there is NO push-triggered
#      deploy. The PLATFORM cocoindex app is deployed via the
#      `deploy-cocoindex-platform` (prod) / `deploy-cocoindex-platform-staging`
#      (staging) jobs below — each fires ONLY on a workflow_dispatch with its
#      `deploy_platform` / `deploy_platform_staging` input set true. AMENDMENT OQ-2
#      (ratified, SUPERSEDES the stale TECH "add a Platform GH environment" text):
#      these REUSE the existing `Production` / `Staging` GH environments — their
#      `COOLIFY_BASE_URL` + `COOLIFY_API_TOKEN` already point at the Server B Coolify
#      control-plane, and `COOLIFY_APP_UUID` in each is the PLATFORM prod/staging app
#      UUID (operator-set later — never hardcoded). CLIENT deploys are REMOVED from
#      this workflow (ID-127.16) — no client app UUID in this PUBLIC repo.
#   2. ✅ EXTERNAL REFS PINNED to commit SHAs (workflow-injection hardening per the
#      cloud-run-deploy.yml header). SHAs resolved 2026-05-31; floated version in the
#      trailing comment. setup-pack moved off the v5.8.11 placeholder to current v5.12.3.
#   3. ⬜ LIVE TRIGGER TEST ({66.7} testStrategy): run once (workflow_dispatch off the
#      working branch) and confirm a pullable ghcr.io/<owner>/kh-cocoindex-pipeline:sha-<sha>
#      appears and the host stays uncontended.
# ─────────────────────────────────────────────────────────────────────────────

name: onprem-deploy (B1 cocoindex image → ghcr.io)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual build reason (first off-host build / roll-forward)"
        required: false
        default: "manual"
      deploy:
        # VESTIGIAL since the deploy-separation (ID-127.6): no job reads this input
        # any more. Push never deploys, and the PLATFORM deploys are gated on the
        # dedicated `deploy_platform` / `deploy_platform_staging` inputs below — NOT
        # on this flag. Retained only to avoid breaking saved dispatch forms; safe
        # to drop in a later cleanup.
        description: "(vestigial — no effect) historic build-only dry-run flag"
        required: false
        type: boolean
        default: true
      deploy_platform:
        # PLATFORM PROD deploy gate (ID-127.6 + AMENDMENT OQ-2). Platform tracks
        # `main` too, so a push must NEVER auto-deploy it (BI-9 intermittent +
        # burn-safety) — the platform deploy is workflow_dispatch-ONLY and fires
        # only when this input is explicitly true. Reuses the existing `Production`
        # GH environment (its COOLIFY_BASE_URL + COOLIFY_API_TOKEN already point at
        # the Server B Coolify control-plane); COOLIFY_APP_UUID in `Production` is
        # the PLATFORM prod app UUID (operator-set, never hardcoded here).
        description: "Deploy the Platform PROD cocoindex app"
        required: false
        type: boolean
        default: false
      deploy_platform_staging:
        # PLATFORM STAGING deploy gate — identical contract to deploy_platform but
        # against the existing `Staging` GH environment (COOLIFY_APP_UUID there is
        # the PLATFORM staging app UUID). workflow_dispatch-ONLY; never push-fired.
        description: "Deploy the Platform STAGING cocoindex app"
        required: false
        type: boolean
        default: false
      source_sha:
        # ID-113.6 release re-tag: the full or abbreviated commit SHA of a
        # known-good image already published as ${IMAGE}:sha-<sha>. When set
        # alongside release_version, the `tag-release` job aliases that image
        # to the vX.Y.Z tag WITHOUT a rebuild. Leave blank for a normal
        # build-and-deploy dispatch.
        description:
          "Known-good commit SHA to re-tag (e.g. abc1234); leave blank for
          normal build"
        required: false
        default: ""
      release_version:
        # Semantic version string, e.g. v1.2.3. Paired with source_sha — the
        # tag-release job aliases ${IMAGE}:sha-<source_sha> to
        # ${IMAGE}:<release_version>. No rebuild; content-addressable alias only.
        description:
          "Release version tag to publish (e.g. v1.2.3); leave blank for normal
          build"
        required: false
        default: ""
  push:
    branches: [main, staging] # main + staging → BUILD-ONLY (build + push the branch sha image). NO push-triggered deploy (ID-127.6) — platform deploys are workflow_dispatch-only.
    # NO paths: filter (ID-86 / bl-236) — GitHub inspects only the first 300
    # changed files of a push compare, silently skipping the workflow on
    # align-class pushes. Path relevance is now decided by the `detect-changes`
    # job below over the FULL compare.

permissions:
  contents: read
  packages: write # GITHUB_TOKEN push to ghcr.io/<owner>/*

env:
  # Pinned, content-addressable tag — NEVER :latest (the no-:latest
  # discipline at cloud-run-deploy.yml:458). Rollback ({66.12}) =
  # re-point Coolify to a prior sha- tag; no rebuild.
  IMAGE: ghcr.io/${{ github.repository_owner }}/kh-cocoindex-pipeline
  TAG: sha-${{ github.sha }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # CHANGE DETECTION — ID-86 / bl-236: replaces the workflow-level `paths:`
  # filter (which GitHub evaluates over only the FIRST 300 changed files of a
  # push compare — align-class pushes silently skipped the whole workflow).
  # Diffs the FULL before..sha compare via plain `git diff --name-only` (no
  # 300-file limit, no marketplace actions — pure git + shell, matching this
  # workflow's pinned-deps discipline) and matches against the EXACT path set
  # the retired filter carried: scripts/**/*.py, requirements.txt,
  # deploy/coolify/**. Edge cases: all-zeros `before` (branch create /
  # force-push) and workflow_dispatch are both treated as relevant=true.
  # ───────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect pipeline-relevant changes (full compare)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      relevant: ${{ steps.diff.outputs.relevant }}
    steps:
      - name: Checkout (full history — the before..sha diff needs both ends)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned 2026-05-31)
        with:
          fetch-depth: 0

      - name: Diff before..sha and match the pipeline path set
        id: diff
        env:
          # Map dynamic values into the shell env (never interpolate ${{ }}
          # directly inside run: — injection-safe, mirroring the deploy jobs).
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          emit() {
            echo "relevant=$1" >> "$GITHUB_OUTPUT"
            echo "detect-changes verdict: relevant=$1 ($2)"
          }
          # workflow_dispatch: operator-triggered — always relevant (the
          # belt-and-braces fallback stays unconditionally live).
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            emit true "workflow_dispatch is always relevant"
            exit 0
          fi
          # Branch create / force-push: GitHub sends an all-zeros `before` SHA
          # (or none). No comparable base — fail open to relevant=true.
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "${ZERO_SHA}" ]; then
            emit true "before SHA empty/all-zeros (branch create or force-push)"
            exit 0
          fi
          # History rewrite can leave `before` unreachable even at
          # fetch-depth 0 — fail open rather than erroring the gate.
          if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            emit true "before SHA ${BEFORE_SHA} not found locally (history rewrite)"
            exit 0
          fi
          # FULL compare — git diff has no 300-file ceiling. Capture first,
          # then grep WITHOUT -q (avoids the SIGPIPE/pipefail early-exit
          # footgun), so the matched files are also logged for the operator.
          CHANGED="$(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}")"
          TOTAL="$(printf '%s\n' "${CHANGED}" | grep -c . || true)"
          echo "Full compare ${BEFORE_SHA}..${AFTER_SHA}: ${TOTAL} changed file(s)."
          # Match set == the retired workflow-level paths: filter, verbatim
          # semantics: scripts/**/*.py | requirements.txt | deploy/coolify/**
          MATCHES="$(printf '%s\n' "${CHANGED}" | grep -E '^(scripts/.*\.py|requirements\.txt|deploy/coolify/.*)$' || true)"
          if [ -n "${MATCHES}" ]; then
            echo "Pipeline-relevant changes:"
            printf '%s\n' "${MATCHES}"
            emit true "pipeline path(s) changed"
          else
            emit false "no pipeline-relevant paths in the compare"
          fi

  build-and-push-cocoindex:
    name: Build + push cocoindex image (off-host)
    needs: detect-changes
    # Heavy-job gate (ID-86): only build when the detection job found a
    # pipeline-relevant change (workflow_dispatch is always relevant).
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75 # Docling install + cocoindex Rust wheel + model layer (cloudbuild budgets 60m)
    steps:
      - name: Checkout (build context = repo root)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned 2026-05-31)

      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3 (pinned 2026-05-31)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up the Cloud Native Buildpacks `pack` CLI
        uses: buildpacks/github-actions/setup-pack@8fe5c9d7f5a3fa22d4b7cc7d50ba8ebd7eddf414 # v5.12.3 (pinned 2026-05-31; was v5.8.11 placeholder)

      - name:
          Build + publish cocoindex image (buildpacks — faithful to
          cloudbuild-cocoindex.yaml)
        run: |
          set -euo pipefail
          # IMAGE HYGIENE (IP + slim): the cocoindex image must ship ONLY the Python
          # pipeline + its deps — never the Next.js app, docs/, .planning/ (client IP),
          # docs-site, .claude, or tests. pack does NOT reliably honour .gcloudignore or
          # project.toml include/exclude (a whitelist attempt still leaked
          # .claude / docs-site / __tests__ into /workspace), so we build from an
          # EXPLICITLY PRUNED context containing nothing but scripts/ + requirements.txt.
          # This is the authoritative mechanism — verify with `ls /workspace` on the
          # pulled image (expect: scripts requirements.txt only).
          CTX="$(mktemp -d)"
          cp -R scripts "${CTX}/scripts"
          # Build installs from the LOCKED transitive closure, not the human-edited
          # requirements.txt directly ({127.22}, S438): the buildpacks Python pip
          # installer reads exactly one filename (requirements.txt) from the build
          # context root, so requirements.lock is copied in UNDER that name. This
          # makes rebuilds reproducible (full closure pinned, not just direct deps)
          # while requirements.txt itself stays the source developers edit — see the
          # header comment in requirements.lock for the regenerate command.
          cp requirements.lock "${CTX}/requirements.txt"
          echo "Pruned build context:"; ls -A "${CTX}"
          # Same builder/env as the original Cloud Build config. `-m` invocation
          # is load-bearing (FX-8): the buildpack runtime does not add /workspace
          # to sys.path on bare-script invocation, so `scripts.cocoindex_pipeline`
          # qualified imports need `python3 -m`.
          #
          # REMOTE LAYER CACHE (approach B — backlog 216 follow-up): --cache-image
          # persists the buildpack build cache (incl. the heavy pip / Docling / ML /
          # cocoindex-Rust-wheel deps layer — the bulk of the ~9-min cold build) to a
          # STABLE registry tag, so each ephemeral GH runner RESTORES it instead of
          # rebuilding from cold. It is registry-backed (requires --publish; there is
          # no persistent local volume across runners). On the FIRST run the tag does
          # not exist — pack treats it as an empty cache and SEEDS it post-build;
          # subsequent runs with an unchanged requirements.txt cache-hit the deps
          # layer (~9 min cold -> ~2-4 min warm; a requirements.txt change re-seeds it).
          # The :buildcache tag is SEPARATE from the pinned :sha- app image, so the
          # The size-budget step below still inspects ONLY the app image.
          pack build "${IMAGE}:${TAG}" \
            --path "${CTX}" \
            --builder gcr.io/buildpacks/builder:google-22 \
            --cache-image "${IMAGE}:buildcache" \
            --env "GOOGLE_ENTRYPOINT=python3 -m scripts.cocoindex_pipeline.server" \
            --env "GOOGLE_RUNTIME=python" \
            --env "GOOGLE_PYTHON_VERSION=3.13.13" \
            --publish
          echo "Published ${IMAGE}:${TAG}"

      - name:
          Bake `git` + LibreOffice into the published image (thin post-pack
          layer — ID-132 {132.35} G-DEPLOY-PROOF Defect C + ID-145 {145.31}
          DR-059 doc/xls convert-on-upload)
        run: |
          set -euo pipefail
          # DEFECT C (ID-132 {132.35} deploy proof, RUN 1): the deployed
          # google-22 buildpacks run image ships NO `git` binary, but
          # `producer/git_sync.py` (the OKF bundle clone reconcile) and
          # `producer/publish.py` (the DR-055 post-publish push lane) both
          # shell out to `git`. RUN 1's own remediation already confirmed
          # empirically that the google-22 run image IS apt-capable
          # (Debian/Ubuntu-based) — an ephemeral `apt-get install git` inside
          # the live container unblocked the probe, but was lost on the next
          # redeploy (no Dockerfile layer bakes it in). There is no
          # apt/git buildpack wired into this google-22 build, and the
          # "IMAGE HYGIENE" pruned-context build above is deliberately kept
          # byte-for-byte faithful to the original cloudbuild-cocoindex.yaml
          # config (no Dockerfile of our own) — so this is a thin, SEPARATE
          # post-pack layering step, not a change to the `pack build`
          # invocation itself: pull the just-published buildpacks image
          # (`pack build --publish` does not load it into the local daemon —
          # see the image-size-budget step below), install `git` as root,
          # restore the base image's ORIGINAL user (read dynamically via
          # `docker inspect`, never hardcoded — buildpacks images are not
          # guaranteed to run as the same uid/name across builder versions),
          # then push the augmented image back to the exact SAME pinned tag.
          # ENTRYPOINT/CMD need no explicit restoration — standard Docker
          # FROM semantics inherit them unchanged from the base image as
          # long as this layer's Dockerfile never redeclares them (it does
          # not).
          #
          # ID-145 {145.31} DR-059 LibreOffice provisioning (this SAME apt
          # layer is the fix): scripts/bid_worker.py's
          # `_convert_legacy_office_to_ooxml` shells out to `soffice
          # --headless --norestore --convert-to <ext> --outdir <dir>
          # <input>` to convert legacy .doc/.xls (OLE2) uploads to real
          # OOXML (.docx/.xlsx) — but this image never provisioned
          # LibreOffice, so every .doc/.xls upload RuntimeErrors in prod
          # (a {145.13} Checker FAIL gate — DR-059 was 0% functional
          # despite green mocked-subprocess unit tests). `bid-worker-platform`
          # (deploy/coolify/docker-compose.platform.yaml) runs the SAME
          # published image as this cocoindex sidecar via a `command:`
          # override (G8 folded-worker deploy decision — no second
          # image/service), so THIS is the one and only place both
          # consumers get soffice from. Package choice: `libreoffice-writer`
          # + `libreoffice-calc` — the two metapackages that pull in
          # `libreoffice-core` (ships the `soffice` binary itself) plus the
          # legacy .doc/.xls import filters and the .docx/.xlsx export
          # filters bid_worker.py's `--convert-to` invocation needs.
          # `--no-install-recommends` keeps `libreoffice-java-common` /
          # `default-jre` OUT — a plain Writer/Calc `--convert-to` does not
          # need Java, and pulling a JRE would balloon the shared image far
          # beyond the LibreOffice-only delta. The cocoindex pipeline itself
          # never calls soffice — this bloat is accepted, shared-image
          # collateral from the G8 decision, not something to work around by
          # splitting the image. `&& soffice --headless --version` is
          # appended to the RUN below so a broken/missing LibreOffice
          # install fails THIS `docker build` immediately (a build-time
          # smoke test: binary present + runs) — this is NOT the deployed-
          # runtime .doc/.xls -> OOXML conversion smoke-test, which remains
          # a separate pre-go-live deploy gate (see the {145.31} journal).
          docker pull "${IMAGE}:${TAG}"
          ORIG_USER="$(docker inspect --format '{{.Config.User}}' "${IMAGE}:${TAG}")"
          echo "Base image user (restored after the root apt-get layer): '${ORIG_USER:-cnb}'"
          WORKDIR="$(mktemp -d)"
          # NB: an UNQUOTED heredoc delimiter is required for ${IMAGE}/${TAG}/
          # ${ORIG_USER} substitution below, which also means a trailing
          # backslash-newline is consumed as a shell line-continuation (not
          # preserved literally) — so the RUN instruction is written as one
          # line rather than a visually-multi-line one that would silently
          # collapse anyway.
          cat > "${WORKDIR}/Dockerfile" <<DOCKERFILE
          FROM ${IMAGE}:${TAG}
          USER root
          RUN apt-get update && apt-get install -y --no-install-recommends git libreoffice-writer libreoffice-calc && rm -rf /var/lib/apt/lists/* && soffice --headless --version
          USER ${ORIG_USER:-cnb}
          DOCKERFILE
          docker build -t "${IMAGE}:${TAG}" "${WORKDIR}"
          docker push "${IMAGE}:${TAG}"
          echo "Re-published ${IMAGE}:${TAG} with git + LibreOffice (soffice) baked in (same pinned tag)."

      - name:
          Inv-9 assertion — cocoindex image carries NO Playwright / Chromium
          (extraction is in-process Trafilatura, ID-112)
        run: |
          set -euo pipefail
          # The cocoindex image is built by buildpacks from requirements.lock (copied
          # into the build context AS requirements.txt — {127.22}) + scripts/ (the
          # Python source) — there is no Dockerfile. This grep intentionally checks the
          # human-edited direct-dependency SOURCE (requirements.txt): uv pip compile can
          # only add playwright/chromium to the lock if reachable from a declared dep.
          # HTML extraction is fully in-process (Trafilatura, ID-112); a Playwright /
          # Chromium browser binary must NEVER be baked into this image, and it can only
          # enter via a pip dependency or a pipeline-source import. We assert on those
          # two surfaces rather than `docker image inspect` on the pushed image:
          # `pack build … --publish` does NOT load the image into the local daemon (see
          # the size-budget step below — `docker image inspect` errors "No such image"
          # post-publish), and a metadata grep would miss a filesystem-baked binary
          # anyway. The dependency + import surface is the authoritative, deterministic
          # gate.
          #
          # RESTORED after id-129 (75d9146e) removed this negative-assertion as
          # collateral alongside the (correctly-removed) pullmd image grep — the two
          # were double-duty in one step and the Playwright/Chromium guard was lost when
          # pullmd retired. NO pullmd coupling is reintroduced here (PullMD is fully
          # decommissioned).
          if grep -qiE 'playwright|chromium' requirements.txt; then
            echo "::error::Inv-9 FAIL — Playwright/Chromium dependency detected in requirements.txt (the cocoindex image must stay browser-free; extraction is in-process Trafilatura)."
            grep -niE 'playwright|chromium' requirements.txt
            exit 1
          fi
          if grep -rqiE 'playwright|chromium' scripts/cocoindex_pipeline --include='*.py'; then
            echo "::error::Inv-9 FAIL — Playwright/Chromium reference in the cocoindex pipeline source (scripts/cocoindex_pipeline/**.py)."
            grep -rniE 'playwright|chromium' scripts/cocoindex_pipeline --include='*.py'
            exit 1
          fi
          echo "Inv-9 PASS: zero Playwright/Chromium pip dependencies (requirements.txt) and zero references in the cocoindex pipeline source."

      - name: Image-size budget check (T-OQ4 — log + warn, never fail)
        # GENUINELY never fails. The build step above used `pack build … --publish`,
        # which pushes the image STRAIGHT to ghcr.io and does NOT load it into the
        # local Docker daemon — so `docker image inspect` here errored "No such
        # image", and under `set -euo pipefail` that aborted this "never fail" step
        # and (via `needs:`) skipped BOTH deploy jobs (run 28125818103 false-fail).
        # FIX: read the size from the REGISTRY manifest (no multi-GB pull) by summing
        # the layer `size` fields from `docker buildx imagetools inspect --raw`
        # (compressed/on-the-wire bytes — an APPROXIMATE signal vs the on-disk budget).
        # The whole step is best-effort: NO `set -e`, every failure path falls
        # through to a `::notice::` skip, and the step ALWAYS `exit 0`.
        run: |
          # Deliberately NO `set -e` — this step must never return non-zero.
          set -uo pipefail
          BUDGET=5691392819 # 5.3 GB (on-disk reference budget)
          # NOTE (ID-145 {145.31}): the "Bake git + LibreOffice" post-pack
          # layer above now adds libreoffice-writer + libreoffice-calc to
          # this SAME image (DR-059 doc/xls convert-on-upload) — an expected
          # ~400-700MB delta. Left as a warn-only note rather than bumping
          # BUDGET: this check is T-OQ4 log+warn-never-fail, so a stale
          # threshold cannot break the build; bump BUDGET here if/when the
          # warn becomes noisy against the new baseline.
          # Sum the compressed layer sizes from the registry manifest WITHOUT
          # pulling the image. buildx imagetools --raw emits the manifest JSON;
          # the layer `size` fields are the compressed on-the-wire bytes. For a
          # multi-arch manifest list there are no top-level layers, so this sums
          # to 0 and we fall through to the registry-read-failed skip below.
          RAW="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --raw 2>/dev/null || true)"
          SIZE=""
          if [ -n "${RAW}" ]; then
            # Sum every layer `size` (jq if available, else a portable grep/awk
            # fallback so we never hard-depend on jq being on the runner).
            if command -v jq >/dev/null 2>&1; then
              SIZE="$(printf '%s' "${RAW}" | jq '[.layers[]?.size] | add // 0' 2>/dev/null || true)"
            else
              SIZE="$(printf '%s' "${RAW}" \
                | grep -oE '"size"[[:space:]]*:[[:space:]]*[0-9]+' \
                | grep -oE '[0-9]+' \
                | awk '{s+=$1} END{print s+0}')"
            fi
          fi
          # Positive-form numeric guard: the arithmetic `-gt` test errors (exit 2,
          # redirected to /dev/null) for empty / non-numeric / float SIZE and is
          # false for 0 — so ONLY a valid positive integer enters the budget
          # branch; everything else falls to the skip. (Deliberately NOT a
          # `*[!0-9]*` case-glob nor a `! [ … ] 2>/dev/null` negation — both were
          # verified to misbehave across bash 3.2 / shell variants in testing.)
          if [ "${SIZE}" -gt 0 ] 2>/dev/null; then
            GB="$(awk "BEGIN{printf \"%.2f\", ${SIZE}/1024/1024/1024}")"
            echo "cocoindex image size (registry, compressed/approx): ${GB} GB (budget 5.3 GB)"
            if [ "${SIZE}" -gt "${BUDGET}" ]; then
              echo "::warning::cocoindex image ~${GB} GB (compressed) exceeds the 5.3 GB budget (T-OQ4: warn-only, build continues)."
            else
              echo "OK: ~${GB} GB within 5.3 GB budget (compressed/approx — on-disk size is larger)."
            fi
          else
            echo "::notice::image-size check skipped (image not local; registry read unavailable)"
          fi
          exit 0

      - name: Job summary
        run: |
          {
            echo "### onprem-deploy — cocoindex image built off-host"
            echo ""
            echo "- **Image:** \`${IMAGE}:${TAG}\` (pinned, non-\`:latest\`)"
            echo "- **Builder:** buildpacks \`google-22\` on GH runner (inv 13 — host uncontended)"
            echo "- **Post-pack layer:** \`git\` + LibreOffice (\`soffice\`) baked in as a thin post-pack Docker layer (ID-132 {132.35} Defect C; LibreOffice added {145.31} for DR-059 .doc/.xls convert-on-upload) — the buildpacks build itself is untouched"
            echo "- **Next:** the \`deploy-cocoindex\` job ({66.11}) bumps Coolify \`COCOINDEX_IMAGE_TAG\` to this tag + triggers a deploy"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # CLIENT PIPELINE DEPLOYS — NOT in this workflow.
  #
  # Client pipeline deploys run OFF this workflow and off the platform GH
  # environments — via direct Coolify API/MCP now, and a future per-client GitHub
  # Environment (client-<name>-prod/staging) before client-2. No client app UUID
  # appears in this public repo. Refs: ID-127.16, ID-113 per-client release pins.
  #
  # This workflow now deploys ONLY the PLATFORM cocoindex app, and ONLY on an
  # explicit workflow_dispatch (never on push — see the platform deploy jobs below).
  # ───────────────────────────────────────────────────────────────────────────

  # ───────────────────────────────────────────────────────────────────────────
  # PLATFORM PROD DEPLOY — ID-127.6 + AMENDMENT OQ-2: bump the platform Coolify
  # image tag to the just-built pinned tag and trigger a Coolify deploy of THAT
  # tag. Coolify re-clones the git compose and PULLS the finished image (it never
  # builds on the host).
  #
  # DISPATCH-ONLY (BI-9 + burn-safety): Platform tracks `main`, so a push must
  # NEVER auto-deploy it. This job fires ONLY on a workflow_dispatch where the
  # operator explicitly set deploy_platform == true — NO push event reaches it.
  #
  # ENVIRONMENT REUSE (AMENDMENT OQ-2 SUPERSEDES the stale TECH "new Platform GH
  # environment" text): the platform deploy REUSES the existing `Production` GH
  # environment. Its COOLIFY_BASE_URL + COOLIFY_API_TOKEN already point at the
  # Server B Coolify control-plane; COOLIFY_APP_UUID in `Production` is the
  # PLATFORM prod app UUID (operator-set later — NEVER hardcoded here).
  #
  # EMPTY-UUID GATE: GitHub forbids `secrets.*` in a job-level `if:`, so the empty
  # check cannot live in the `if:`. Instead the FIRST step probes COOLIFY_APP_UUID
  # and sets a `configured` step output; every subsequent step is guarded on it.
  # When the platform app is not yet provisioned (UUID empty) the job emits a
  # ::notice:: and concludes SUCCESS (no-op skip) — it must never fail closed.
  #
  # ORDERING GUARD (never a stale image): `needs: build-and-push-cocoindex` means
  # this job only runs after the build job has built + pushed + pull-verified
  # `${IMAGE}:${TAG}`. The PATCH below sets COCOINDEX_IMAGE_TAG to the SAME
  # `${{ env.TAG }}` the build job published, so the bumped tag is byte-identical
  # to the built tag.
  #
  # BURN GUARD — INFORMATIONAL since ID-83 / bl-221 (boot is decoupled): this job
  # touches ONLY COCOINDEX_IMAGE_TAG and does NOT set COCOINDEX_SOURCE_PATH — but
  # that avoidance is NO LONGER load-bearing for burn-safety. The burn guard is now
  # ARCHITECTURAL: the cocoindex worker boots lifespan-only (coco.start_blocking())
  # and never walks the corpus at boot, so the deploy/restart this job triggers is
  # burn-safe by construction whether or not COCOINDEX_SOURCE_PATH is set. The walk
  # fires only via the on-demand POST /walk trigger. The "Action is the SOLE deploy
  # trigger" guarantee (Coolify git-auto-deploy disabled) remains an OPERATOR action
  # — see docs/runbooks/onprem-b1-deploy.md §B2.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-cocoindex-platform:
    name:
      Bump Coolify tag + deploy — PLATFORM PROD (dispatch-only, on-host pull)
    needs: [detect-changes, build-and-push-cocoindex]
    runs-on: ubuntu-latest
    # `Production` GH environment (case-sensitive) resolves COOLIFY_API_TOKEN +
    # COOLIFY_BASE_URL (Server B control-plane) + COOLIFY_APP_UUID (platform prod app).
    environment: Production
    timeout-minutes: 10
    # DISPATCH-ONLY + input-gated: this job is INERT on every push (the platform
    # also tracks `main`, but a push must never auto-deploy it — BI-9 + burn-safety).
    # It fires only when the operator explicitly requests the platform prod deploy.
    if:
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_platform == 'true'
    env:
      # Platform prod Coolify app uuid, resolved from the `Production` GH
      # environment secret — NEVER a literal (ai-solution-hub/canonical is PUBLIC).
      # Operator sets this to the PLATFORM prod app UUID; if unset the job no-ops to
      # success via the empty-UUID gate below.
      COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
    steps:
      - name: Probe platform COOLIFY_APP_UUID (empty-UUID gate)
        id: gate
        env:
          # secrets.* are forbidden in a job-level `if:`, so map the UUID into the
          # shell env here and emit a `configured` step output. Never echo the value.
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail
          if [ -n "${COOLIFY_APP_UUID}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "platform COOLIFY_APP_UUID is set — proceeding with deploy."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::platform COOLIFY_APP_UUID not set — skipping deploy (platform app not yet provisioned)"
          fi

      - name: Bump COCOINDEX_IMAGE_TAG in Coolify (PATCH — update in place)
        if: steps.gate.outputs.configured == 'true'
        env:
          # Map secrets / dynamic values into the shell env (never interpolate
          # ${{ }} directly inside run: — injection-safe, and no secret is echoed).
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          # PATCH updates the EXISTING COCOINDEX_IMAGE_TAG env in place (by key).
          # POST would CREATE A DUPLICATE — the §6 duplicate-key footgun — so we
          # MUST use PATCH. We touch ONLY COCOINDEX_IMAGE_TAG here; we NEVER send
          # COCOINDEX_SOURCE_PATH (corpus-path management stays with Coolify env /
          # the operator). INFORMATIONAL since ID-83 / bl-221: not setting it is no
          # longer burn-critical — boot is decoupled (lifespan-only, no walk), so
          # the auto-restart this deploy triggers cannot burn Anthropic regardless
          # of SOURCE_PATH's value; the walk fires only via on-demand POST /walk.
          # --fail-with-body: non-2xx → non-zero exit + body printed (so the job
          # fails loudly instead of silently "succeeding" on a Coolify error).
          curl --fail-with-body -sS \
            -X PATCH "${COOLIFY_BASE_URL}/api/v1/applications/${COOLIFY_APP_UUID}/envs" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"COCOINDEX_IMAGE_TAG\",\"value\":\"${DEPLOY_TAG}\",\"is_buildtime\":true,\"is_runtime\":true}"
          echo "PATCHed COCOINDEX_IMAGE_TAG -> ${DEPLOY_TAG} (SOURCE_PATH left untouched / idle-safe)"

      - name:
          Trigger Coolify deploy of the pinned tag (host pulls — no on-host
          build)
        if: steps.gate.outputs.configured == 'true'
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          # The per-resource deploy webhook the Coolify UI exposes. Coolify
          # re-clones the git compose and pulls the image resolved from the
          # (just-bumped) COCOINDEX_IMAGE_TAG. force=false: reuse cache where it
          # is safe; the pinned tag bump is what guarantees the fresh image.
          curl --fail-with-body -sS \
            -X GET "${COOLIFY_BASE_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"
          echo "Triggered Coolify deploy of ${COOLIFY_APP_UUID} (pinned tag pull)."

      - name: Deploy summary
        if: steps.gate.outputs.configured == 'true'
        env:
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          {
            echo "### onprem-deploy — Coolify tag bump + deploy — PLATFORM PROD (ID-127.6)"
            echo ""
            echo "- **Tag bumped:** \`COCOINDEX_IMAGE_TAG\` → \`${DEPLOY_TAG}\` (PATCH, in place — never duplicated)"
            echo "- **Deploy:** triggered on \`${COOLIFY_APP_UUID}\` (host pulls the pinned tag; never builds on-host)"
            echo "- **Trigger:** workflow_dispatch with \`deploy_platform=true\` (dispatch-only — a push never auto-deploys the platform)"
            echo "- **Burn guard (architectural, ID-83 / bl-221):** boot is decoupled — the worker boots lifespan-only and never walks the corpus, so this deploy/restart is burn-safe regardless of \`COCOINDEX_SOURCE_PATH\` (the walk fires only via on-demand POST /walk). This Action still leaves SOURCE_PATH to Coolify env (informational, no longer burn-critical)."
            echo "- **Reminder:** this Action is the **SOLE deploy trigger** — Coolify git-auto-deploy MUST stay disabled (see \`docs/runbooks/onprem-b1-deploy.md\` §B2)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # PLATFORM STAGING DEPLOY — ID-127.6 + AMENDMENT OQ-2: identical shape to the
  # platform PROD job above, against the existing `Staging` GH environment.
  #
  # DISPATCH-ONLY: fires ONLY on a workflow_dispatch where the operator explicitly
  # set deploy_platform_staging == true — NO push event reaches it.
  #
  # ENVIRONMENT REUSE (AMENDMENT OQ-2): REUSES the existing `Staging` GH
  # environment. Its COOLIFY_BASE_URL + COOLIFY_API_TOKEN already point at the
  # Server B Coolify control-plane; COOLIFY_APP_UUID in `Staging` is the PLATFORM
  # staging app UUID (operator-set later — NEVER hardcoded here).
  #
  # EMPTY-UUID GATE: same as the prod job — the FIRST step probes COOLIFY_APP_UUID
  # (secrets.* are forbidden in a job-level `if:`) and sets a `configured` output;
  # subsequent steps are guarded on it. Unprovisioned UUID → ::notice:: + SUCCESS.
  #
  # ORDERING GUARD (never a stale image): `needs: build-and-push-cocoindex` —
  # PATCHes COCOINDEX_IMAGE_TAG to the SAME `${{ env.TAG }}` the build published.
  #
  # BURN GUARD — INFORMATIONAL since ID-83 / bl-221 (boot is decoupled): touches
  # ONLY COCOINDEX_IMAGE_TAG, never COCOINDEX_SOURCE_PATH; the burn guard is now
  # ARCHITECTURAL (lifespan-only boot, no walk), so the deploy/restart is burn-safe
  # by construction. The walk fires only via on-demand POST /walk. The "Action is
  # the SOLE deploy trigger" guarantee (Coolify git-auto-deploy disabled) remains
  # an OPERATOR action — see docs/runbooks/onprem-b1-deploy.md §B2.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-cocoindex-platform-staging:
    name:
      Bump Coolify tag + deploy — PLATFORM STAGING (dispatch-only, on-host pull)
    needs: [detect-changes, build-and-push-cocoindex]
    runs-on: ubuntu-latest
    # `Staging` GH environment (case-sensitive) resolves COOLIFY_API_TOKEN +
    # COOLIFY_BASE_URL + COOLIFY_APP_UUID (platform staging app).
    environment: Staging
    timeout-minutes: 10
    # DISPATCH-ONLY + input-gated: INERT on every push; fires only when the
    # operator explicitly requests the platform staging deploy.
    if:
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_platform_staging == 'true'
    env:
      # Platform staging Coolify app uuid, resolved from the `Staging` GH
      # environment secret — NEVER a literal (public repo). If unset the job no-ops
      # to success via the empty-UUID gate below.
      COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
    steps:
      - name: Probe platform COOLIFY_APP_UUID (empty-UUID gate)
        id: gate
        env:
          # secrets.* are forbidden in a job-level `if:`, so map the UUID into the
          # shell env here and emit a `configured` step output. Never echo the value.
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail
          if [ -n "${COOLIFY_APP_UUID}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "platform COOLIFY_APP_UUID is set — proceeding with deploy."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::platform COOLIFY_APP_UUID not set — skipping deploy (platform app not yet provisioned)"
          fi

      - name: Bump COCOINDEX_IMAGE_TAG in Coolify (PATCH — update in place)
        if: steps.gate.outputs.configured == 'true'
        env:
          # Map secrets / dynamic values into the shell env (never interpolate
          # ${{ }} directly inside run: — injection-safe, and no secret is echoed).
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          # PATCH updates the EXISTING COCOINDEX_IMAGE_TAG env in place (by key).
          # POST would CREATE A DUPLICATE — the §6 duplicate-key footgun — so we
          # MUST use PATCH. We touch ONLY COCOINDEX_IMAGE_TAG here; we NEVER send
          # COCOINDEX_SOURCE_PATH (corpus-path management stays with Coolify env /
          # the operator). INFORMATIONAL since ID-83 / bl-221: not setting it is no
          # longer burn-critical — boot is decoupled (lifespan-only, no walk), so
          # the auto-restart this deploy triggers cannot burn Anthropic regardless
          # of SOURCE_PATH's value; the walk fires only via on-demand POST /walk.
          # --fail-with-body: non-2xx → non-zero exit + body printed (so the job
          # fails loudly instead of silently "succeeding" on a Coolify error).
          curl --fail-with-body -sS \
            -X PATCH "${COOLIFY_BASE_URL}/api/v1/applications/${COOLIFY_APP_UUID}/envs" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"COCOINDEX_IMAGE_TAG\",\"value\":\"${DEPLOY_TAG}\",\"is_buildtime\":true,\"is_runtime\":true}"
          echo "PATCHed COCOINDEX_IMAGE_TAG -> ${DEPLOY_TAG} (SOURCE_PATH left untouched / idle-safe)"

      - name:
          Trigger Coolify deploy of the pinned tag (host pulls — no on-host
          build)
        if: steps.gate.outputs.configured == 'true'
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          # The per-resource deploy webhook the Coolify UI exposes. Coolify
          # re-clones the git compose and pulls the image resolved from the
          # (just-bumped) COCOINDEX_IMAGE_TAG. force=false: reuse cache where it
          # is safe; the pinned tag bump is what guarantees the fresh image.
          curl --fail-with-body -sS \
            -X GET "${COOLIFY_BASE_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"
          echo "Triggered Coolify deploy of ${COOLIFY_APP_UUID} (pinned tag pull)."

      - name: Deploy summary
        if: steps.gate.outputs.configured == 'true'
        env:
          DEPLOY_TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          {
            echo "### onprem-deploy — Coolify tag bump + deploy — PLATFORM STAGING (ID-127.6)"
            echo ""
            echo "- **Tag bumped:** \`COCOINDEX_IMAGE_TAG\` → \`${DEPLOY_TAG}\` (PATCH, in place — never duplicated)"
            echo "- **Deploy:** triggered on \`${COOLIFY_APP_UUID}\` (staging host pulls the pinned tag; never builds on-host)"
            echo "- **Trigger:** workflow_dispatch with \`deploy_platform_staging=true\` (dispatch-only — a push never auto-deploys the platform)"
            echo "- **Burn guard (architectural, ID-83 / bl-221):** boot is decoupled — the worker boots lifespan-only and never walks the corpus, so this deploy/restart is burn-safe regardless of \`COCOINDEX_SOURCE_PATH\` (the walk fires only via on-demand POST /walk). This Action still leaves SOURCE_PATH to Coolify env (informational, no longer burn-critical)."
            echo "- **Reminder:** this Action is the **SOLE deploy trigger** — Coolify git-auto-deploy MUST stay disabled (see \`docs/runbooks/onprem-b1-deploy.md\` §B2)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # RELEASE RE-TAG — ID-113.6: alias a known-good sha- image to a vX.Y.Z tag
  # at release cut. NO rebuild — content-addressable alias only (TECH PI-10
  # option (a): docker pull → docker tag → docker push).
  #
  # TRIGGER: workflow_dispatch ONLY with BOTH source_sha AND release_version
  # inputs set. A branch push (push: [main, staging]) NEVER reaches this job
  # (the `if:` guards against it). A plain dispatch (source_sha/release_version
  # blank) also skips this job via the same guard.
  #
  # ROLLBACK: re-point Coolify to a prior vX.Y.Z tag (a runbook step, {113.9})
  # — no rebuild required because the tag is a content-addressable alias of the
  # original sha- image.
  #
  # AUTHENTICATION: reuses the same docker/login-action + GITHUB_TOKEN pattern
  # as the build-and-push-cocoindex job (ghcr.io, packages: write permission).
  #
  # INJECTION SAFETY: source_sha and release_version are mapped into the shell
  # env (never interpolated directly inside run:), matching the injection-safe
  # pattern used throughout this workflow.
  # ───────────────────────────────────────────────────────────────────────────
  tag-release:
    name: Re-tag known-good sha- image as vX.Y.Z (release cut, no rebuild)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Guard: only fire on workflow_dispatch where BOTH release inputs are
    # provided. This job is completely inert on push: [main, staging] events
    # and on plain dispatches (source_sha / release_version left blank).
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.source_sha
      != '' && github.event.inputs.release_version != ''
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3 (pinned 2026-05-31)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull known-good sha- image, tag as vX.Y.Z, push (no rebuild)
        env:
          # Map dynamic inputs into the shell env — NEVER interpolate ${{ }}
          # directly inside run: (injection-safe, matching the deploy-job pattern).
          SOURCE_SHA: ${{ github.event.inputs.source_sha }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail
          SOURCE_TAG="${IMAGE}:sha-${SOURCE_SHA}"
          RELEASE_TAG="${IMAGE}:${RELEASE_VERSION}"
          echo "Pulling ${SOURCE_TAG} …"
          docker pull "${SOURCE_TAG}"
          echo "Tagging as ${RELEASE_TAG} …"
          docker tag "${SOURCE_TAG}" "${RELEASE_TAG}"
          echo "Pushing ${RELEASE_TAG} …"
          docker push "${RELEASE_TAG}"
          echo "Published ${RELEASE_TAG} (content-addressable alias of ${SOURCE_TAG}; no rebuild)"

      - name: Release re-tag summary
        env:
          SOURCE_SHA: ${{ github.event.inputs.source_sha }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail
          {
            echo "### onprem-deploy — release re-tag (ID-113.6)"
            echo ""
            echo "- **Source image:** \`${IMAGE}:sha-${SOURCE_SHA}\` (known-good, already published)"
            echo "- **Release tag:** \`${IMAGE}:${RELEASE_VERSION}\` (content-addressable alias — no rebuild)"
            echo "- **Rollback:** re-point Coolify \`COCOINDEX_IMAGE_TAG\` to a prior \`vX.Y.Z\` tag; no rebuild required"
            echo "- **Note:** Coolify pinning to \`${RELEASE_VERSION}\` is a runbook step ({113.9}) — this job ONLY publishes the alias"
          } >> "$GITHUB_STEP_SUMMARY"
