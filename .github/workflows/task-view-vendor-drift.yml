# ID-20.12 — task-view vendor-drift reminder (TECH §3.5, §6.4; PRODUCT inv 39).
#
# The external `task-view` ledger editor (https://github.com/liam-jons/task-view)
# vendors KH's four ledger-schema sources into its `packages/schemas/src/`:
#   - lib/validation/task-list-schema.ts
#   - lib/validation/roadmap-schema.ts
#   - lib/validation/backlog-schema.ts
#   - lib/validation/work-status.ts
# task-view consumes the canonical ledgers (task-list / product-roadmap /
# product-backlog) and generates the per-record `.md` mirrors committed under
# docs/reference/{tasks,roadmap,backlog}. If KH edits a ledger schema without
# re-vendoring task-view, the two drift and mirror generation can desync.
#
# This workflow is a NON-BLOCKING REMINDER (ratified OQ-T2 default): when a PR
# touches any of the four schema sources, it fetches the tagged task-view
# release vendor bundle and diffs it against the KH sources, emitting a
# `::warning::` annotation on substantive drift. It NEVER fails the PR — the
# author is simply reminded to re-vendor task-view (run its re-vendor
# procedure + cut a new tag) in a follow-up.
#
# Vendor bundle source: the `packages/schemas/src/*.ts` files published as
# assets on the `v0.1.0-task-view` GitHub release of the task-view repo. That
# tag is published in Subtask 20.13; until then the fetch step soft-skips
# (release-not-found is a notice, never a failure), so this workflow is safe to
# land ahead of the tag.
#
# Workflow-injection mitigation: all github / external context values arrive via
# env, never inline ${{ }} in run: blocks (mirrors supabase-advisors.yml +
# api-grant-guard.yml discipline).
#
# Spec: docs/specs/id-20-per-task-mirror/TECH.md §3.5 + §6.4.

name: task-view vendor drift

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "lib/validation/task-list-schema.ts"
      # ID-148.12 (Option C): roadmap-schema.ts DROPPED (deleted — the roadmap
      # server arm is repurposed to initiatives); initiatives-schema.ts +
      # doc-link.ts ADDED (the vendored-twin schema + DocLinkSchema's neutral
      # relocated home — TECH §3.2, INV-12(a)/(c)).
      - "lib/validation/initiatives-schema.ts"
      - "lib/validation/doc-link.ts"
      - "lib/validation/backlog-schema.ts"
      - "lib/validation/work-status.ts"
      # ID-90.22 R3: ledger-budgets.ts joins the schema-arm watched paths. It is
      # the server budget gate's registry and its relocated upstream twin
      # (packages/schemas/src/ledger-budgets.ts, U0) is canonical — no longer
      # "KH-only / never-vendor" (PRODUCT inv 59-60). The schema-arm asset diff +
      # the eventual KH-copy deletion ride {68.30}.
      - "lib/validation/ledger-budgets.ts"
      # ID-35.10: vendored task-view patch primitives (lib/ledger/) — the
      # task-view→KH direction. Editing one triggers the primitive-drift step.
      # ID-90.22 R2/R3: atomic-write.ts was DELETED (server owns the atomic
      # write); its watched path is removed. The three RETAINED oracle modules
      # (detect-schema / patch-apply / record-mutate) stay watched — they remain
      # vendored and upstream-drift-relevant until {68.30} re-homes them.
      - "lib/ledger/detect-schema.ts"
      - "lib/ledger/patch-apply.ts"
      - "lib/ledger/record-mutate.ts"
      # ID-148.12: initiatives-tree.ts — the shared tree-walk module the
      # re-vendored patch-apply.ts/record-mutate.ts import (INV-13). Vendored
      # alongside the three RETAINED oracle modules; watched identically.
      - "lib/ledger/initiatives-tree.ts"
      - ".github/workflows/task-view-vendor-drift.yml"

concurrency:
  group:
    task-view-vendor-drift-${{ github.event_name }}-${{
    github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vendor-drift:
    name: task-view vendor-drift reminder
    # PR-only; the paths filter already scopes this, but guard explicitly so a
    # future trigger cannot accidentally fail closed.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # No env-scoped secrets: the only network call is a GitHub release fetch
    # against a public repo using the default GITHUB_TOKEN. `environment:`
    # omitted intentionally so Dependabot PRs run the reminder too.
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      # The tagged release of the task-view repo. Bump TASK_VIEW_TAG here when
      # task-view cuts a new schema-bearing release (OQ-T1 / OQ-T2).
      - name: Fetch task-view vendor bundle + diff
        env:
          # GITHUB_TOKEN read scope authenticates `gh release` against the
          # same-owner public task-view repo (raises the rate limit).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_VIEW_REPO: liam-jons/task-view
          TASK_VIEW_TAG: v0.10.1-task-view
        run: |
          set -uo pipefail

          # ID-148.12 (Option C): the schema-arm asset list. KH path:
          # lib/validation/<name>. task-view vendor path:
          # packages/schemas/src/<name> (basename-equal), published as release
          # assets named <name>. `roadmap-schema.ts` DROPPED (the roadmap
          # server arm is repurposed to initiatives upstream — TECH §3.1/§3.2,
          # INV-12(a)); `initiatives-schema.ts` + `doc-link.ts` ADDED
          # (InitiativesSchema is the vendored-twin registered in the
          # re-vendored detect-schema.ts; DocLinkSchema relocated out of
          # roadmap-schema.ts in {148.8}).
          SCHEMAS=(
            "task-list-schema.ts"
            "initiatives-schema.ts"
            "backlog-schema.ts"
            "work-status.ts"
            # ID-90.22 R3: the budget registry joins the schema-arm asset diff.
            # Soft-skips if the upstream twin asset is not yet published on the
            # tag (the per-file download already notices-and-continues on a
            # missing asset, so this is safe to land ahead of the U0 publish).
            "ledger-budgets.ts"
            # ID-148.12: DocLinkSchema's neutral home — both repos vendor it.
            "doc-link.ts"
          )

          VENDOR_DIR="$(mktemp -d)"

          # Soft-skip if the tag does not exist yet (pre-20.13). Never block.
          if ! gh release view "$TASK_VIEW_TAG" --repo "$TASK_VIEW_REPO" >/dev/null 2>&1; then
            echo "::notice title=task-view vendor drift::Release '$TASK_VIEW_TAG' not found in $TASK_VIEW_REPO (expected before Subtask 20.13 publishes it). Skipping drift comparison."
            exit 0
          fi

          for name in "${SCHEMAS[@]}"; do
            gh release download "$TASK_VIEW_TAG" \
              --repo "$TASK_VIEW_REPO" \
              --pattern "$name" \
              --dir "$VENDOR_DIR" \
              --clobber >/dev/null 2>&1 \
              || echo "::notice title=task-view vendor drift::Release asset '$name' not present on '$TASK_VIEW_TAG'; skipping that file."
          done

          if [ -z "$(ls -A "$VENDOR_DIR")" ]; then
            echo "::notice title=task-view vendor drift::No vendor schema assets retrievable from '$TASK_VIEW_TAG'. Skipping drift comparison."
            exit 0
          fi

          # Normalisation: the vendored copies intentionally differ from KH in
          # known structural ways (task-view CONTRIBUTING.md re-vendor
          # procedure) that are NOT schema drift and must not trip a warning:
          #   1. a leading "VENDORED into task-view ..." JSDoc header block;
          #   2. rewritten import specifiers (KH uses `@/lib/validation/...`
          #      aliases; the bundle uses relative / `@task-view/schemas/...`);
          #   3. re-export specifiers (`export … from '…'`) whose paths diverge;
          #   4. inlined module-level regex consts (e.g. BARE_ID_REGEX, which KH
          #      imports from lib/validation/schemas.ts but the 4-file bundle
          #      inlines);
          #   5. equivalent re-export forms (`export { Foo };` vs
          #      `export type Foo = z.infer<…>` vs a re-export-from line).
          # We strip all of the above from BOTH sides so the diff reflects only
          # substantive Zod-schema-body drift — the kind that warrants a
          # re-vendor. (Verified: the post-20.19 bundle normalises to in-sync
          # against KH lib/validation across all four files.)
          normalise() {
            awk '
              BEGIN { inblock = 0; inimport = 0 }
              {
                line = $0
                if (inblock) {
                  if (line ~ /\*\//) { sub(/.*\*\//, "", line); inblock = 0 }
                  else { next }
                }
                while (match(line, /\/\*/)) {
                  if (match(line, /\/\*.*\*\//)) { sub(/\/\*.*\*\//, "", line) }
                  else { sub(/\/\*.*/, "", line); inblock = 1; break }
                }
                sub(/\/\/.*/, "", line)
                if (inimport) { if (line ~ /;/) { inimport = 0 } next }
                if (line ~ /^[[:space:]]*import[[:space:]]/) {
                  if (line !~ /;/) { inimport = 1 }
                  next
                }
                if (line ~ /^[[:space:]]*export[[:space:]].*[[:space:]]from[[:space:]]/) { next }
                if (line ~ /^[[:space:]]*const[[:space:]]+[A-Za-z_]+[[:space:]]*=[[:space:]]*\//) { next }
                if (line ~ /^[[:space:]]*export[[:space:]]*\{[^}]*\}[[:space:]]*;?[[:space:]]*$/) { next }
                if (line ~ /^[[:space:]]*export[[:space:]]+type[[:space:]]+[A-Za-z_]+[[:space:]]*=[[:space:]]*z\.infer/) { next }
                gsub(/^[[:space:]]+/, "", line)
                gsub(/[[:space:]]+$/, "", line)
                if (line == "") next
                print line
              }
            ' "$1"
          }

          drift_found=0
          for name in "${SCHEMAS[@]}"; do
            kh_file="lib/validation/$name"
            vendor_file="$VENDOR_DIR/$name"
            if [ ! -f "$kh_file" ]; then
              echo "::warning title=task-view vendor drift::KH source '$kh_file' missing — expected one of the four vendored schemas."
              continue
            fi
            [ -f "$vendor_file" ] || continue
            if ! diff -u <(normalise "$vendor_file") <(normalise "$kh_file") >/tmp/drift.diff 2>&1; then
              drift_found=1
              echo "::warning title=task-view vendor drift::Schema body drift in '$name' between KH lib/validation and task-view@$TASK_VIEW_TAG. Re-vendor task-view (run its re-vendor procedure + cut a new tag), then bump TASK_VIEW_TAG in this workflow."
              echo "----- normalised diff: $name (vendor <-> KH) -----"
              cat /tmp/drift.diff || true
              echo "---------------------------------------------------"
            else
              echo "No substantive drift in $name."
            fi
          done

          if [ "$drift_found" -eq 0 ]; then
            echo "task-view vendor bundle is in sync with KH lib/validation schema sources (modulo header + import normalisation)."
          fi

          # NON-BLOCKING (OQ-T2): always succeed. Drift surfaces as a
          # ::warning:: annotation only — the author is reminded, not blocked.
          exit 0

      # ID-35.10 — vendored PATCH PRIMITIVES drift (task-view → KH direction).
      # The schema step above diffs release assets (KH → task-view). The
      # primitives live the other way round: task-view's packages/server/* is
      # upstream; KH vendors them into lib/ledger/. We shallow-clone task-view
      # @ the same pinned tag, re-format each upstream file with KH's prettier
      # config (so quote-style + line-wrap are canonicalised — task-view uses
      # double quotes, KH single), strip comments + import lines (the only
      # intentional difference is the @task-view/schemas → @/lib/validation
      # import rewire), and diff. NON-BLOCKING — ::warning:: only.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - name: Clone task-view + diff vendored primitives
        env:
          # Static literals (not external context) — safe in run:.
          TASK_VIEW_REPO_URL: https://github.com/liam-jons/task-view.git
          TASK_VIEW_TAG: v0.10.1-task-view
        run: |
          set -uo pipefail

          # ID-90.22 R2/R3: atomic-write.ts was DELETED — dropped from the
          # primitive-diff list (the workflow must never watch a non-existent
          # path, PRODUCT inv 59-60). The three RETAINED oracle primitives stay.
          # ID-148.12: initiatives-tree.ts ADDED — the new shared tree-walk
          # module patch-apply.ts/record-mutate.ts import (INV-13); vendored
          # + drift-watched identically to the three RETAINED primitives.
          PRIMITIVES=(
            "detect-schema.ts"
            "patch-apply.ts"
            "record-mutate.ts"
            "initiatives-tree.ts"
          )

          CLONE_DIR="$(mktemp -d)"
          if ! git clone --depth 1 --branch "$TASK_VIEW_TAG" \
              "$TASK_VIEW_REPO_URL" "$CLONE_DIR" >/dev/null 2>&1; then
            echo "::notice title=task-view primitive drift::Could not clone task-view @ '$TASK_VIEW_TAG'. Skipping primitive drift comparison."
            exit 0
          fi

          # Canonicalise the upstream copies with KH's prettier config so only
          # substantive (non-formatting) body drift survives the diff.
          FMT_DIR="$(mktemp -d)"
          for name in "${PRIMITIVES[@]}"; do
            [ -f "$CLONE_DIR/packages/server/$name" ] \
              && cp "$CLONE_DIR/packages/server/$name" "$FMT_DIR/$name"
          done
          bunx prettier --config prettier.config.mjs --write "$FMT_DIR"/*.ts >/dev/null 2>&1 \
            || echo "::notice title=task-view primitive drift::prettier normalisation step soft-failed; diff may show formatting noise."

          # Strip block + line comments and import / re-export lines so only the
          # post-prettier body remains (the import rewire is the only expected diff).
          normalise() {
            awk '
              BEGIN { inblock = 0; inimport = 0 }
              {
                line = $0
                if (inblock) {
                  if (line ~ /\*\//) { sub(/.*\*\//, "", line); inblock = 0 }
                  else { next }
                }
                while (match(line, /\/\*/)) {
                  if (match(line, /\/\*.*\*\//)) { sub(/\/\*.*\*\//, "", line) }
                  else { sub(/\/\*.*/, "", line); inblock = 1; break }
                }
                sub(/\/\/.*/, "", line)
                if (inimport) { if (line ~ /;/) { inimport = 0 } next }
                if (line ~ /^[[:space:]]*import[[:space:]]/) {
                  if (line !~ /;/) { inimport = 1 }
                  next
                }
                if (line ~ /^[[:space:]]*export[[:space:]].*[[:space:]]from[[:space:]]/) { next }
                gsub(/^[[:space:]]+/, "", line)
                gsub(/[[:space:]]+$/, "", line)
                if (line == "") next
                print line
              }
            ' "$1"
          }

          prim_drift=0
          for name in "${PRIMITIVES[@]}"; do
            kh_file="lib/ledger/$name"
            up_file="$FMT_DIR/$name"
            if [ ! -f "$kh_file" ]; then
              echo "::warning title=task-view primitive drift::Vendored primitive '$kh_file' missing."
              continue
            fi
            if [ ! -f "$up_file" ]; then
              echo "::notice title=task-view primitive drift::Upstream '$name' not present at '$TASK_VIEW_TAG'; skipping."
              continue
            fi
            if ! diff -u <(normalise "$up_file") <(normalise "$kh_file") >/tmp/prim.diff 2>&1; then
              prim_drift=1
              echo "::warning title=task-view primitive drift::Body drift in '$name' between lib/ledger and task-view@$TASK_VIEW_TAG. Re-vendor per lib/ledger/README.md (copy the file + re-apply the @/lib/validation import rewire)."
              echo "----- normalised diff: $name (upstream <-> KH) -----"
              cat /tmp/prim.diff || true
              echo "----------------------------------------------------"
            else
              echo "No substantive drift in $name."
            fi
          done

          if [ "$prim_drift" -eq 0 ]; then
            echo "Vendored lib/ledger primitives are in sync with task-view@$TASK_VIEW_TAG (modulo import rewire)."
          fi

          # NON-BLOCKING: drift is a ::warning:: only.
          exit 0
