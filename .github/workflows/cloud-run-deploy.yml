# Cloud Run deploy — Python pipeline image build + Job manifest deploy.
#
# Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-run-cloud-run-provisioning-spec.md §2.6, §2.11, §4
# Plan: docs/audits/kh-production-readiness-phase-1/plans/wp-run-cloud-run-provisioning-plan.md T1b.4
# Runbook: docs/runbooks/cloud-run-phase-1-handover.md
#
# Triggers:
#   * push on staging → deploy to kh-staging-494815 (Staging environment).
#   * push on main → deploy to kh-prod-494815 (Production environment).
#   * workflow_dispatch → manual deploy to either environment (for first deploy +
#     fallback recovery).
#
# Auth: Workload Identity Federation per spec §2.11. WIF provider + deploy SA
# email come from per-environment GitHub Environment secrets (set per
# docs/runbooks/github-environments.md). No long-lived JSON keys.
#
# Per-tenant manifest deploy: NEXT_PUBLIC_CLIENT_ID is baked at deploy time
# (D-RUN-12.1 / spec §2.6) — wrong slug → loadBranding() corrupts holder
# metadata. Deploy step asserts via the regex precondition before each
# `gcloud run jobs replace`.
#
# Dockerfile fallback (D-RUN-2 escape hatch): workflow_dispatch carries a
# fallback-build-mode input. Today only `buildpack` is wired. If R-10
# trips on bert-score, switch to `dockerfile` — Phase 1c authors the
# Dockerfile (out of scope here).
#
# Untrusted-input safety: this workflow does NOT consume user-authored data
# (issue / PR / comment / commit-message text). Inputs are either GitHub
# control-plane values (`github.ref`, `github.event_name`) or `type: choice`
# fixed allowlists (`inputs.environment`, `inputs.fallback-build-mode`).
# All run-step interpolations are routed via env: indirection per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/.

name: Cloud Run deploy

on:
  push:
    branches: [main, staging]
    paths:
      - "scripts/**/*.py"
      - "!scripts/tests/**"
      - "requirements.txt"
      - "cloudrun/**"
      # ID-42.7: belt-and-braces — cloudrun/** already matches the pullmd
      # Service manifests; this explicit entry documents the deploy coupling.
      - "cloudrun/services/*pullmd*"
      - ".gcloudignore"
      - ".github/workflows/cloud-run-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target deploy environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      fallback-build-mode:
        description:
          Build mode (D-RUN-2 escape hatch — leave default unless R-10 trips)
        required: false
        default: buildpack
        type: choice
        options:
          - buildpack
          - dockerfile

concurrency:
  group:
    cloud-run-deploy-${{ github.workflow }}-${{ github.event_name }}-${{
    github.ref }}
  cancel-in-progress: false

jobs:
  resolve-environment:
    # Map ref / dispatch input to canonical GitHub Environment name + GCP
    # project. Capital-first env names per docs/runbooks/github-environments.md.
    name: Resolve target environment
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      gh-env: ${{ steps.resolve.outputs.gh-env }}
      gcp-project: ${{ steps.resolve.outputs.gcp-project }}
    steps:
      - name: Resolve env + project
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          DISPATCH_ENV: ${{ inputs.environment }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            INPUT="$DISPATCH_ENV"
          elif [[ "$GIT_REF" == "refs/heads/main" ]]; then
            INPUT="production"
          else
            INPUT="staging"
          fi

          if [[ "$INPUT" == "production" ]]; then
            echo "gh-env=Production" >> "$GITHUB_OUTPUT"
            echo "gcp-project=kh-prod-494815" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT" == "staging" ]]; then
            echo "gh-env=Staging" >> "$GITHUB_OUTPUT"
            echo "gcp-project=kh-staging-494815" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown deploy target: $INPUT" >&2
            exit 1
          fi

  build-and-deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    needs: resolve-environment
    # Resolves secrets/vars from the Production OR Staging environment
    # scope per resolve-environment output. Case-sensitive — must match
    # the canonical capital-first env name.
    environment: ${{ needs.resolve-environment.outputs.gh-env }}
    timeout-minutes: 45
    permissions:
      # Required for google-github-actions/auth WIF flow.
      id-token: write
      contents: read
      # Required by `vercel/repository-dispatch/actions/status@v1` —
      # action reads workflow run info + posts commit status (W6 / WP-G4.7).
      actions: read
      statuses: write
      checks: write

    env:
      GCP_PROJECT: ${{ needs.resolve-environment.outputs.gcp-project }}
      GH_ENV: ${{ needs.resolve-environment.outputs.gh-env }}
      BUILD_MODE: ${{ inputs.fallback-build-mode || 'buildpack' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # GCP_WIF_PROVIDER + GCP_DEPLOY_SA_EMAIL are stored as Environment
          # variables (vars.*), not secrets, because they are non-sensitive
          # resource paths (the WIF provider name + SA email are public IDs).
          # Using vars makes them visible in workflow logs which aids debug
          # of WIF binding mismatches; per
          # feedback_gha_secrets_vs_vars_silent_empty.md, mismatch between
          # workflow access form and storage type returns empty string
          # silently. See docs/runbooks/cloud-run-phase-1-handover.md §4.
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Verify build mode
        run: |
          if [[ "$BUILD_MODE" == "dockerfile" ]]; then
            # TODO Phase 1c if R-10 trips — author cloudrun/Dockerfile and
            # wire `gcloud builds submit --tag` invocation here.
            echo "Dockerfile fallback mode requested but not yet wired." >&2
            echo "See spec D-RUN-2 + plan T1b.4 step 3." >&2
            exit 1
          fi
          echo "Build mode: $BUILD_MODE"

      - name: Build images via Cloud Build
        env:
          # Post-April-2024 GCP projects have no Cloud Build legacy default SA
          # (`<projectnum>@cloudbuild.gserviceaccount.com`). `gcloud builds submit`
          # requires an explicit `--service-account`. Reuse the deploy SA — it
          # holds `roles/cloudbuild.builds.builder` which grants the union of
          # logging.logWriter + storage.objectUser + artifactregistry write that
          # Cloud Build needs at build time. cloudbuild.yaml's
          # `options.logging: CLOUD_LOGGING_ONLY` keeps logs flowing to Cloud
          # Logging without a logs bucket.
          #
          # `_COMMIT_SHA` is a user-defined substitution (leading underscore
          # required by Cloud Build for non-built-in subs). Passed through to
          # cloudbuild.yaml so the image SHA tag resolves; built-in
          # `$COMMIT_SHA` is empty for direct `submit` (only set by triggers).
          DEPLOY_SA: ${{ vars.GCP_DEPLOY_SA_EMAIL }}
        run: |
          gcloud builds submit \
            --project="$GCP_PROJECT" \
            --service-account="projects/${GCP_PROJECT}/serviceAccounts/${DEPLOY_SA}" \
            --config=cloudrun/cloudbuild.yaml \
            --substitutions="_COMMIT_SHA=${GITHUB_SHA}" \
            .

      - name: Build cocoindex image via Cloud Build
        # ID-28.6: Build the kh-cocoindex-pipeline image (Docling + cocoindex Rust engine).
        # Runs in parallel with the existing kh-pipeline build conceptually, but
        # executes sequentially here (single GHA job) after the primary image build.
        # cloudbuild-cocoindex.yaml: separate Cloud Build config to maintain the
        # AGPL boundary (pullmd excluded) and the 5.3 GB image-size budget (T-OQ4).
        # Docling pre-warm (cloudrun/cocoindex-prewarm.py) bakes model weights into
        # the image layer at build time.
        env:
          DEPLOY_SA: ${{ vars.GCP_DEPLOY_SA_EMAIL }}
        run: |
          gcloud builds submit \
            --project="$GCP_PROJECT" \
            --service-account="projects/${GCP_PROJECT}/serviceAccounts/${DEPLOY_SA}" \
            --config=cloudrun/cloudbuild-cocoindex.yaml \
            --substitutions="_COMMIT_SHA=${GITHUB_SHA}" \
            .

      - name: Deploy tenant manifests
        run: |
          # Map gh-env -> manifest prefix.
          if [[ "$GH_ENV" == "Production" ]]; then
            ENV_PREFIX="prod"
          else
            ENV_PREFIX="staging"
          fi

          # Per-tenant deploy with NEXT_PUBLIC_CLIENT_ID precondition assertion
          # (spec F-29 + D-RUN-12.1). Asserts each manifest's value matches
          # the tenant slug pattern before replace lands.
          for TENANT in example-client kpf; do
            MANIFEST="cloudrun/jobs/${ENV_PREFIX}-${TENANT}.yaml"
            echo "::group::Deploy $MANIFEST"

            # Extract the baked NEXT_PUBLIC_CLIENT_ID and assert it matches
            # the tenant slug pattern. Fail-fast guard mirrors the
            # script-level guards in eval-holder-rule-ts.ts +
            # reclassify-items.ts (R-9 mitigation).
            BAKED_CLIENT_ID=$(awk '/- name: NEXT_PUBLIC_CLIENT_ID/{flag=1; next} flag && /value:/{print $2; exit}' "$MANIFEST")
            if [[ ! "$BAKED_CLIENT_ID" =~ ^(example-client|kpf)$ ]]; then
              echo "ERROR: NEXT_PUBLIC_CLIENT_ID '$BAKED_CLIENT_ID' in $MANIFEST does not match (example-client|kpf)." >&2
              exit 1
            fi
            if [[ "$BAKED_CLIENT_ID" != "$TENANT" ]]; then
              echo "ERROR: $MANIFEST has NEXT_PUBLIC_CLIENT_ID=$BAKED_CLIENT_ID but expected $TENANT." >&2
              exit 1
            fi

            gcloud run jobs replace "$MANIFEST" \
              --project="$GCP_PROJECT" \
              --region=europe-west2
            echo "::endgroup::"
          done

      - name: Deploy cocoindex Services
        # ID-28.6: Deploy the 4 per-tenant kh-cocoindex-pipeline Cloud Run Services.
        # Uses gcloud run services replace (declarative manifest apply) — analogous
        # to gcloud run jobs replace for Job manifests. The manifests are in
        # cloudrun/services/{env}-{tenant}-cocoindex.yaml.
        # Ingress: internal-only (run.googleapis.com/ingress: internal in manifests).
        # Auth: same WIF SA used for job deploys (GCP_DEPLOY_SA_EMAIL).
        run: |
          # Map gh-env -> manifest prefix.
          if [[ "$GH_ENV" == "Production" ]]; then
            ENV_PREFIX="prod"
          else
            ENV_PREFIX="staging"
          fi

          for TENANT in example-client kpf; do
            MANIFEST="cloudrun/services/${ENV_PREFIX}-${TENANT}-cocoindex.yaml"
            echo "::group::Deploy $MANIFEST"
            gcloud run services replace "$MANIFEST" \
              --project="$GCP_PROJECT" \
              --region=europe-west2
            echo "::endgroup::"
          done

      - name: Deploy pullmd Service
        # ID-42.7: Deploy the single kh-pullmd-example-client Cloud Run Service (pullmd AGPL
        # extractor — replaces the retired HTML extraction path). NON-LOOPED and
        # example-client-only by design: pullmd is a shared example-client-tenant Service the cocoindex
        # adapter reaches over HTTP via PULLMD_SERVICE_URL — there is no per-tenant
        # kpf pullmd Service (do NOT add a `for TENANT in example-client kpf` loop here).
        # Uses gcloud run services replace (declarative manifest apply), mirroring
        # the cocoindex Services step. Manifest: cloudrun/services/{env}-pullmd.yaml.
        # Image is pinned in the manifest (aeternalabshq/pullmd:2.0.0) — the
        # smoke-verify step below asserts it is not :latest.
        run: |
          # Map gh-env -> manifest prefix (same mechanism as the cocoindex step).
          if [[ "$GH_ENV" == "Production" ]]; then
            ENV_PREFIX="prod"
          else
            ENV_PREFIX="staging"
          fi

          MANIFEST="cloudrun/services/${ENV_PREFIX}-pullmd.yaml"
          echo "::group::Deploy $MANIFEST"
          gcloud run services replace "$MANIFEST" \
            --project="$GCP_PROJECT" \
            --region=europe-west2
          echo "::endgroup::"

      - name: Inject IMAGE_SHA into cocoindex Services
        # FX-2 (ID-28.6): Post-deploy step to inject the current commit SHA
        # into IMAGE_SHA env var on each cocoindex Service.
        # gcloud run services replace applies the static manifest as-is, so
        # IMAGE_SHA=="" in the manifest. This step patches it post-deploy so
        # pipeline_runs.result->'extractor_version' can cross-reference the
        # deployed image (Inv-8 forensic correlation procedure).
        # Uses github.sha routed via COMMIT_SHA env var (untrusted-input safety
        # pattern per workflow header comment — no direct interpolation in run:).
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          for TENANT in example-client kpf; do
            SERVICE_NAME="kh-cocoindex-pipeline-${TENANT}"
            echo "::group::Inject IMAGE_SHA into $SERVICE_NAME"
            gcloud run services update "$SERVICE_NAME" \
              --project="$GCP_PROJECT" \
              --region=europe-west2 \
              --update-env-vars IMAGE_SHA="${COMMIT_SHA}"
            echo "::endgroup::"
          done

      - name: Mount Secret Manager secrets (Phase 2 / T2.2)
        # Phase 2 / T2.2 per spec §2.5 — mount the 10 always-required Secret
        # Manager secrets onto each tenant Job. (Was 11; FIRECRAWL_API_KEY
        # dropped per ID-42.7 — vestigial Cloud Run mount, Inv-10-safe: no
        # scripts/ Python reader, lib/env-server.ts treats it as optional, and
        # the live Firecrawl cascade is Vercel-side via process.env.)
        # NEXT_PUBLIC_CLIENT_ID is NOT
        # mounted here (deploy-time bake per D-RUN-12.1 + F-29). Optional
        # SUPABASE_AUTH_{EMAIL,PASSWORD} pair (used only by batch-reclassify.ts)
        # are NOT mounted by default — add them here if the batch-reclassify
        # invocation path is wired into a Cloud Run Job manifest later.
        #
        # `gcloud run jobs update --set-secrets` is declarative: it REPLACES
        # the full secret-mount set on each invocation. Format is
        # KEY=secret-name:VERSION; `:latest` follows the most recent enabled
        # version. The runtime SA (example-client-pipeline-sa / kpf-pipeline-sa per
        # tenant) needs roles/secretmanager.secretAccessor — granted at
        # project scope, see docs/runbooks/cloud-run-phase-1-handover.md §3.
        #
        # Without this step the container boots but lib/env-server.ts Zod
        # validation fails fast at module load and the pipeline never emits
        # its first structured log entry — so this gates Hold (a) and
        # Hold (a-prod) close-out (OPS-61).
        run: |
          # Heredoc body is literal — no untrusted input is interpolated. Each
          # line is KEY=SECRET:VERSION. Newlines are collapsed to commas for
          # --set-secrets via tr/sed (gcloud accepts comma-delimited form).
          SECRETS=$(cat <<'SECRETS_EOF'
          ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
          OPENAI_API_KEY=OPENAI_API_KEY:latest
          SUPABASE_URL=SUPABASE_URL:latest
          SUPABASE_PUBLISHABLE_KEY=SUPABASE_PUBLISHABLE_KEY:latest
          SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest
          NEXT_PUBLIC_SUPABASE_URL=NEXT_PUBLIC_SUPABASE_URL:latest
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:latest
          NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest
          CRON_SECRET=CRON_SECRET:latest
          SENTRY_AUTH_TOKEN=SENTRY_AUTH_TOKEN:latest
          SECRETS_EOF
          )
          SECRETS_FLAT=$(echo "$SECRETS" | tr '\n' ',' | sed 's/,$//;s/^,//')

          for TENANT in example-client kpf; do
            JOB_NAME="kh-pipeline-${TENANT}"
            echo "::group::Mount secrets on $JOB_NAME"
            gcloud run jobs update "$JOB_NAME" \
              --project="$GCP_PROJECT" \
              --region=europe-west2 \
              --set-secrets="$SECRETS_FLAT"
            echo "::endgroup::"
          done

          # ID-28.6: Mount secrets on cocoindex Services.
          # Services need the 10 base secrets + cocoindex-specific secrets:
          #   PIPELINE_RUN_WEBHOOK_URL — webhook for pipeline_runs updates (ID-28.11)
          #   PULLMD_SERVICE_URL — HTTP URL of the pullmd AGPL sidecar (ID-28.7)
          #   PULLMD_API_TOKEN — Bearer token the cocoindex adapter sends to pullmd
          #     (ID-42.7). Appended IN PLACE here, NOT via a separate partial
          #     `update` — `--set-secrets` is declarative and replaces the whole
          #     mount set, so a separate call would silently drop the others.
          #   COCOINDEX_DB_DSN — explicit Supabase pooler connection string read by
          #     flow.py:_build_dsn() (ID-49.8). Carries host + user + password +
          #     port, so NO host reconstruction (the old `<ref>.pooler.supabase.com`
          #     derivation was NXDOMAIN and crashed the worker at boot). The secret
          #     VALUE — the region-qualified pooler URL (aws-<n>-<region>) + the
          #     Postgres/pooler password — is minted out-of-band; this only mounts
          #     it. See docs/audits/cocoindex-state-db-connection-crash-2026-05-26.md.
          COCOINDEX_SECRETS="${SECRETS_FLAT},PIPELINE_RUN_WEBHOOK_URL=PIPELINE_RUN_WEBHOOK_URL:latest,PULLMD_SERVICE_URL=PULLMD_SERVICE_URL:latest,PULLMD_API_TOKEN=PULLMD_API_TOKEN:latest,COCOINDEX_DB_DSN=COCOINDEX_DB_DSN:latest"

          for TENANT in example-client kpf; do
            SERVICE_NAME="kh-cocoindex-pipeline-${TENANT}"
            echo "::group::Mount secrets on $SERVICE_NAME"
            gcloud run services update "$SERVICE_NAME" \
              --project="$GCP_PROJECT" \
              --region=europe-west2 \
              --set-secrets="$COCOINDEX_SECRETS"
            echo "::endgroup::"
          done

          # ID-42.7: Mount secrets on the pullmd Service (kh-pullmd-example-client).
          # The pullmd container reads its single-admin credentials + API token at
          # bootstrap (PULLMD_AUTH_MODE=single-admin in the manifest). NON-LOOPED,
          # example-client-only — there is no kpf pullmd Service. `--set-secrets` is
          # declarative; this is the pullmd Service's only secret-mount call, so it
          # carries the full set in one invocation.
          echo "::group::Mount secrets on kh-pullmd-example-client"
          gcloud run services update kh-pullmd-example-client \
            --project="$GCP_PROJECT" \
            --region=europe-west2 \
            --set-secrets=PULLMD_ADMIN_EMAIL=PULLMD_ADMIN_EMAIL:latest,PULLMD_ADMIN_PASSWORD=PULLMD_ADMIN_PASSWORD:latest,PULLMD_API_TOKEN=PULLMD_API_TOKEN:latest
          echo "::endgroup::"

      - name: Smoke verify (jobs describe)
        run: |
          for TENANT in example-client kpf; do
            JOB_NAME="kh-pipeline-${TENANT}"
            DESCRIBED=$(gcloud run jobs describe "$JOB_NAME" \
              --project="$GCP_PROJECT" \
              --region=europe-west2 \
              --format='value(metadata.name)')
            if [[ "$DESCRIBED" != "$JOB_NAME" ]]; then
              echo "ERROR: jobs describe returned '$DESCRIBED', expected '$JOB_NAME'" >&2
              exit 1
            fi
            echo "OK: $JOB_NAME deployed"
          done

      - name: Smoke verify pullmd (revision Ready + image pin)
        # ID-42.7: Verify the kh-pullmd-example-client Service is live and correctly pinned.
        #   1. Assert the latest-created revision became Ready. Cloud Run only
        #      promotes a revision to latestReadyRevisionName after its startup
        #      probe (httpGet GET / on :3000) passes IN-POD — so Ready == pullmd is
        #      serving on /. We deliberately do NOT curl the URL from the runner:
        #      the Service is ingress: internal, so an external GitHub-hosted runner
        #      gets 403 (not 200) even when the Service is healthy — see
        #      docs/runbooks/pullmd-deploy.md §2.3. The in-pod probe is the
        #      authoritative liveness signal; pullmd exposes no /health endpoint.
        #   2. Assert the deployed image is NOT :latest — pullmd images must be
        #      pinned (manifest bakes aeternalabshq/pullmd:2.0.0) so a floating tag
        #      can never reach prod silently.
        run: |
          READY_REV=$(gcloud run services describe kh-pullmd-example-client \
            --project="$GCP_PROJECT" --region=europe-west2 \
            --format='value(status.latestReadyRevisionName)')
          CREATED_REV=$(gcloud run services describe kh-pullmd-example-client \
            --project="$GCP_PROJECT" --region=europe-west2 \
            --format='value(status.latestCreatedRevisionName)')
          if [[ -z "$READY_REV" || "$READY_REV" != "$CREATED_REV" ]]; then
            echo "ERROR: kh-pullmd-example-client latest revision not Ready (created=$CREATED_REV ready=$READY_REV) — the in-pod startup probe (GET / on :3000) failed; inspect the revision logs" >&2
            exit 1
          fi
          echo "OK: $READY_REV is Ready (in-pod startup probe GET / on :3000 passed)"

          PULLMD_IMAGE=$(gcloud run services describe kh-pullmd-example-client \
            --project="$GCP_PROJECT" \
            --region=europe-west2 \
            --format='value(spec.template.spec.containers[0].image)')
          echo "pullmd image: $PULLMD_IMAGE"
          if [[ "$PULLMD_IMAGE" == *:latest ]]; then
            echo "ERROR: kh-pullmd-example-client deployed with a :latest image tag ($PULLMD_IMAGE) — must be pinned" >&2
            exit 1
          fi
          echo "OK: kh-pullmd-example-client image is pinned ($PULLMD_IMAGE)"

      # WP-G4.7 — Vercel deploy gate. Dispatches the workflow status to
      # Vercel so prod deploys can be gated on the Cloud Run pipeline-
      # image build + deploy chain. `if: always()` so Vercel sees both
      # success and failure — without it Vercel would only ever see green.
      - name: Notify Vercel — cloud-run-deploy status
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - knowledge-hub: cloud-run-deploy"
