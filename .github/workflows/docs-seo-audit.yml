name: docs-seo-audit — KH docs maintenance
on:
  workflow_dispatch:
    inputs:
      target_pr_number:
        description: "Optional PR number to scope the skill to"
        required: false
      prompt_override:
        description: "Optional bespoke prompt override"
        required: false
  # schedule: monthly 1st 07:00 UTC. Per OQ-T3 (ratified default) the cron is
  # committed COMMENTED OUT at foundation; a follow-up commit uncomments it
  # post first-deploy once the sitemap exists (ID-9.18).
  # schedule:
  #   - cron: "0 7 1 * *"

jobs:
  docs-seo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run skill via Claude Agent SDK
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PR_NUMBER: ${{ inputs.target_pr_number }}
          PROMPT_OVERRIDE: ${{ inputs.prompt_override }}
        run: |
          bun scripts/skills/run-skill.ts \
            --skill docs-seo-audit \
            --skill-md .claude/skills/docs-seo-audit/SKILL.md
      - name: Upload run artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-seo-audit-run-${{ github.run_id }}
          path: |
            .skills/docs-seo-audit/run.log
            .skills/docs-seo-audit/output/**
          retention-days: 30
