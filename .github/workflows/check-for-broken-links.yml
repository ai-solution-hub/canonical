name: check-for-broken-links — KH docs maintenance
on:
  workflow_dispatch:
    inputs:
      target_pr_number:
        description: "Optional PR number to scope the skill to"
        required: false
      prompt_override:
        description: "Optional bespoke prompt override"
        required: false
  # Daily 05:00 UTC (OQ-T2 ratified default).
  schedule:
    - cron: "0 5 * * *"

jobs:
  check-for-broken-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run skill via Claude Agent SDK
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PR_NUMBER: ${{ inputs.target_pr_number }}
          PROMPT_OVERRIDE: ${{ inputs.prompt_override }}
        run: |
          bun scripts/skills/run-skill.ts \
            --skill check-for-broken-links \
            --skill-md .claude/skills/check-for-broken-links/SKILL.md
      - name: Upload run artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-for-broken-links-run-${{ github.run_id }}
          path: |
            .skills/check-for-broken-links/run.log
            .skills/check-for-broken-links/output/**
          retention-days: 30
