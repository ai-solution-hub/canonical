# Spec: docs/runbooks/ci.md — PR-blocking CI foundation (WP-G4.1)

name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, staging]

concurrency:
  group:
    ci-${{ github.workflow }}-${{ github.event_name }}-${{
    github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-precheck:
    # WP-CI.RES.1 (S15) — Pattern A 4-way file-shard. Quality precheck runs the
    # build-bound work whose cost is independent of shard count: lint, format
    # check, knip baseline guard, Next.js build, build-output regression scan,
    # and (paths-filter-gated) Python pytest. The Vitest unit suite has been
    # split into the `quality-test` matrix below. Closes roadmap §9.16.11.
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-ci-res1-vitest-perf-spec.md
    name: Quality pre-check
    runs-on: ubuntu-latest
    # Resolves ${{ secrets.X }} and ${{ vars.X }} from the Production
    # environment scope (per docs/runbooks/github-environments.md §4.1).
    # Case-sensitive — must exactly match `Production`.
    environment: Production
    # 10 min headroom covers lint + format + knip + build + test:build + (gated)
    # Python pytest at ~3-4 min observed on push-to-main. Vitest now lives in
    # `quality-test`. Per spec D-CI.RES.1-3 + D-CI.RES.1-11.
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 lets `vitest run --changed origin/<base>` diff
          # the PR head against the merge base on PR runs (consumed in the
          # downstream `quality-test` matrix job).
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - 'scripts/**/*.py'
              - 'requirements.txt'
              - 'scripts/tests/**'

      # Bun handles dependency install + script execution; Node 22 is required for
      # Vitest 4 + Next.js 16 tooling that does not run on Bun's Node-compat layer.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key:
            ${{ runner.os }}-next-quality-${{ hashFiles('bun.lock',
            'package.json', 'next.config.ts', 'tsconfig.json',
            'postcss.config.mjs') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-next-quality-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}-
            ${{ runner.os }}-next-quality-

      # WP1.2 (S19): lint / format-check / knip run with `if: !cancelled()` so
      # each reports independently. Default step semantics skip on prior
      # failure — that hid the +6 knip types breach S17 introduced behind the
      # earlier-failing format step. Build keeps default `if: success()` so
      # expensive work doesn't run when checks are already broken.
      - name: Lint (ESLint)
        if: "!cancelled()"
        run: bun lint

      - name: Format check (Prettier)
        if: "!cancelled()"
        run: bun run format:check

      - name: Knip baseline guard
        if: "!cancelled()"
        run: bun run ci:knip-check

      - name: Build (Next.js)
        # Dependabot PRs run with empty `secrets.*` (GitHub blocks repo +
        # environment secrets from Dependabot-triggered workflows; only
        # `vars.*` resolves). The Next.js build's env-client Zod schema
        # requires NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY and fails closed
        # otherwise. Skip on Dependabot — lint / format / knip above still
        # run and gate the PR. See docs/runbooks/ci.md §"Dependabot CI signal"
        # + memory feedback_gha_secrets_vs_vars_silent_empty.
        if: github.actor != 'dependabot[bot]'
        env:
          # WP1.5 parallel: quality-precheck runs solo but observed OOM on
          # ubuntu-latest (2 GB default) during post-compile TS phase when
          # the monorepo size increased past ~60 migration files. 4 GB
          # headroom mirrors the MCP eval matrix and local dev.
          NODE_OPTIONS: --max-old-space-size=4096
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          # Production stores bare names; mirror to NEXT_PUBLIC_* for the client schema.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          # VERCEL_GIT_COMMIT_SHA is Vercel-only; substitute github.sha so Sentry release tag resolves.
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: bun run build

      - name: Build-output regression scan (NEXT_PUBLIC_* substitution)
        # Guards against the S7 P0 (env-client safeParse(process.env)) class of
        # regression: any `process.env.NEXT_PUBLIC_*` left unsubstituted in
        # `.next/static/chunks/*.js` would crash the client bundle at first
        # paint. See `__tests__/build/env-substitution.test.ts` + memory
        # `feedback_env_client_literal_substitution.md`. Reuses the build
        # artefacts from the previous step — no extra build cost.
        # Dependabot-skip: depends on `.next/` artefacts produced by the
        # previous step (skipped on Dependabot per env-secret blackout).
        if: github.actor != 'dependabot[bot]'
        env:
          RUN_BUILD_TESTS: "1"
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
        run: bun run test:build

      - name: Setup Python
        # Dependabot-skip: pytest needs `secrets.*` (Supabase / Anthropic /
        # OpenAI) which resolve empty for Dependabot PRs. Setup + install
        # also skipped to avoid wasted runner time when test step won't run.
        if:
          steps.changes.outputs.python == 'true' && github.actor !=
          'dependabot[bot]'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        if:
          steps.changes.outputs.python == 'true' && github.actor !=
          'dependabot[bot]'
        run: pip install -r requirements.txt

      - name: Test (pytest)
        if:
          steps.changes.outputs.python == 'true' && github.actor !=
          'dependabot[bot]'
        env:
          # `kb_pipeline.config` calls `load_dotenv(.env.local)` at import; in
          # CI the file is absent so vars must come from process env. Without
          # this block, every test importing the pipeline raises
          # "SUPABASE_URL not set in .env.local". Step is gated by the
          # `python` paths-filter, so only fires when scripts/ changes.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: python3 -m pytest scripts/tests/

  quality-test:
    # WP-CI.RES.1 (S15) — Vitest 4-way file-shard matrix. Each entry runs
    # `bunx vitest run --shard=N/4` with the existing forks pool (per spec
    # D-CI.RES.1-1; threads-pool migration deferred per
    # `feedback_vitest_threads_deferred`). `fail-fast: false` so all 4 shards
    # report independently. R-3 carry: Vitest's `--shard` partition algorithm
    # is alphabetical-by-resolved-path; Vitest is pinned at `^4.0.18` in
    # package.json — re-balance only on minor-version bump.
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-ci-res1-vitest-perf-spec.md
    # Dependabot-skip: vitest setup imports validated env modules and the
    # whole shard fails closed on empty `secrets.*`. See
    # docs/runbooks/ci.md §"Dependabot CI signal".
    name: Quality test (shard ${{ matrix.shard }}/4)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: Production
    needs: quality-precheck
    # 10 min headroom covers slowest shard at ~2-3 min observed wall-clock
    # (~30-45 s bun install + ~2 min test step). Per spec D-CI.RES.1-3.
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    strategy:
      # `fail-fast: false` — surface the full failure picture across all 4
      # shards in a single CI run rather than aborting siblings on first
      # failure. Per spec D-CI.RES.1-2.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 required for `vitest run --changed origin/<base>`
          # PR-diff path retained below.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Test (Vitest, shard ${{ matrix.shard }}/4)
        env:
          # Vitest setup imports validated env modules; mirror the build step.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Workflow-injection mitigation: route github + matrix context through
          # env: rather than direct ${{ }} interpolation in the run: shell.
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
            bunx vitest run --changed "origin/$GITHUB_BASE_REF" \
              --shard="${SHARD_INDEX}/4"
          else
            bunx vitest run --shard="${SHARD_INDEX}/4"
          fi

  e2e-smoke:
    # WP-G4.3 — Curated Playwright smoke (~54 tests, target ≤5 min wall-clock)
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-g4.3-e2e-smoke-spec.md
    # Runs in parallel with `quality-precheck`/`quality-test` (no `needs:`) so total CI wall-clock stays
    # close to max(quality, e2e-smoke).
    # Dependabot-skip: requires staging Supabase URL + service-role key +
    # TEST_USER_*_PASSWORD which resolve empty for Dependabot PRs.
    name: E2E smoke
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Staging env scope per docs/runbooks/github-environments.md §2 —
    # carries staging Supabase URL/keys + TEST_USER_1/2/3 credentials.
    # Case-sensitive: must exactly match `Staging`.
    environment: Staging
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Install Playwright browsers (chromium only)
        # Smoke project uses Desktop Chrome only (per playwright.config.ts).
        # `--with-deps` installs the Linux system libraries the GH-hosted
        # runner doesn't carry by default.
        run: bunx playwright install --with-deps chromium
      - name: Cleanup stale test artifacts (staging preflight)
        env:
          ALLOW_STALE_TEST_ARTIFACT_CLEANUP: "1"
          TEST_ARTIFACT_CLEANUP_MIN_AGE_MINUTES: "120"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run cleanup:stale-test-artifacts

      - name: Run Playwright smoke
        env:
          # Staging Supabase connection — env scope resolves these from the
          # `Staging` GH environment.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Server-side secrets the dev server boots with (lib/env-server.ts
          # validates at module load — every Zod-required field must be set
          # or `bun run dev` fails at first import).
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Mirror to NEXT_PUBLIC_* for the client schema (same pattern as
          # the `quality` job's build step).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Test-user credentials — pre-seeded into staging by
          # scripts/seed-e2e-users.ts (per docs/runbooks/staging-refresh.md §4).
          TEST_USER_1_EMAIL: ${{ vars.TEST_USER_1_EMAIL }}
          TEST_USER_1_PASSWORD: ${{ secrets.TEST_USER_1_PASSWORD }}
          TEST_USER_2_EMAIL: ${{ vars.TEST_USER_2_EMAIL }}
          TEST_USER_2_PASSWORD: ${{ secrets.TEST_USER_2_PASSWORD }}
          TEST_USER_3_EMAIL: ${{ vars.TEST_USER_3_EMAIL }}
          TEST_USER_3_PASSWORD: ${{ secrets.TEST_USER_3_PASSWORD }}
        run: bunx playwright test --project=smoke

      - name: Cleanup orphaned content_history rows (staging)
        if: always()
        env:
          ALLOW_ORPHAN_CONTENT_HISTORY_CLEANUP: "1"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run cleanup:orphaned-content-history

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  mcp-build:
    # WP-G4.4 — build once for the MCP eval layer matrix.
    # The Staging-scoped build remains separate from Production quality-precheck
    # because env scopes differ, but L1/L3/L4 now share this single artefact.
    # Dependabot-skip: Next.js build's env-client Zod schema requires
    # NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY which resolves empty for Dependabot.
    name: MCP staging build
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: Staging
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key:
            ${{ runner.os }}-next-mcp-${{ hashFiles('bun.lock', 'package.json',
            'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}-${{
            github.sha }}
          restore-keys: |
            ${{ runner.os }}-next-mcp-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}-
            ${{ runner.os }}-next-mcp-

      - name: Build (Next.js)
        env:
          # Mirror the quality job's build env block — Staging-scoped secrets/vars.
          NODE_OPTIONS: --max-old-space-size=4096
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: bun run build

      - name: Archive MCP build artifact
        run: tar --exclude='.next/cache' -czf /tmp/mcp-next-build.tar.gz .next

      - name: Upload MCP build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-next-build
          path: /tmp/mcp-next-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  mcp-eval-seed:
    # Seed the shared deterministic Q&A corpus once before the L1/L3/L4 eval
    # matrix fans out. Rows are persistent staging fixtures identified by
    # metadata.mcp_eval_seed=true; per-layer cleanup only removes temporary
    # [MCP-EVAL] mutation fixtures.
    # Dependabot-skip: needs SUPABASE_SERVICE_ROLE_KEY + Anthropic / OpenAI
    # keys to seed and verify rows.
    name: MCP eval seed
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: Staging
    needs: mcp-build
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Seed MCP eval Q&A fixtures
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
        run: bun run seed:mcp-eval

  mcp-eval:
    # WP-G4.4 — MCP eval Layers 1/3/4 in CI.
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-g4.4-mcp-eval-ci-spec.md
    # Runs the three MCP eval scripts against a CI-local dev server backed by the
    # Staging Supabase branch. Matrix entries report independently as
    # `mcp-eval (l1)`, `mcp-eval (l3)`, `mcp-eval (l4)` while sharing the
    # single Staging build artefact produced by `mcp-build` and the shared
    # seeded Q&A corpus produced by `mcp-eval-seed`.
    #
    # Skip-flag policy (per spec §3.2):
    #   - push to main/staging → full mode (no skip flags)
    #   - PR touching MCP paths (paths-filter) → full mode
    #   - other PRs → --skip-ai (L1, L4) / --skip-search (L3) for cost-zero runs
    #
    # Independent of `quality-precheck`/`quality-test`; depends only on
    # `mcp-build` + `mcp-eval-seed` so eval results appear regardless of
    # quality-job state.
    name: MCP eval (${{ matrix.layer }})
    # Dependabot-skip: matrix expansion is gated upstream by mcp-build +
    # mcp-eval-seed (both also skipped on Dependabot). Adding the explicit
    # if: here keeps the policy obvious + matches the other 5 jobs.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Staging-scoped: TEST_USER_1_* secrets only exist on Staging env scope
    # (per docs/runbooks/github-environments.md §3.1). Eval scripts authenticate
    # as TEST_USER_1 to obtain a Bearer token for the MCP server endpoint.
    environment: Staging
    needs: [mcp-build, mcp-eval-seed]
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    strategy:
      fail-fast: false
      matrix:
        layer: [l1, l3, l4]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Detect MCP-related path changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            mcp:
              - 'lib/mcp/**'
              - 'app/api/mcp/**'
              - 'scripts/mcp-eval/**'
              - 'lib/ai/**'
              - 'lib/validation/schemas.ts'
              - 'package.json'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi
      - name: Download MCP build artifact
        uses: actions/download-artifact@v4
        with:
          name: mcp-next-build
          path: /tmp

      - name: Restore MCP build artifact
        run: tar -xzf /tmp/mcp-next-build.tar.gz

      - name: Start MCP server (background)
        env:
          # Runtime env block — same as Build step. `bun run start` reads these
          # at boot to satisfy lib/env.ts + lib/env-client.ts validation.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
        run: |
          bun run start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid

          # Health-check loop — POST to the MCP endpoint until any HTTP response
          # is received (timeout 30s). A 401 here means the server is up and the
          # MCP route handler is responding (auth-required is the expected
          # default for the endpoint without a Bearer token). A connection
          # failure (curl exit code 7) means the server is not yet listening.
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 5 -X POST \
                 -H "Content-Type: application/json" \
                 -d '{}' \
                 http://localhost:3000/api/mcp/streamable-http || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "MCP server up after ${i}s (HTTP $HTTP_CODE)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "MCP server failed to start within 30s" >&2
              echo "----- /tmp/server.log -----" >&2
              cat /tmp/server.log >&2
              exit 1
            fi
            sleep 1
          done

      - name: Run MCP eval (${{ matrix.layer }})
        env:
          # Eval scripts authenticate as TEST_USER_1 → Bearer token to MCP endpoint.
          TEST_USER_1_EMAIL: ${{ vars.TEST_USER_1_EMAIL }}
          TEST_USER_1_PASSWORD: ${{ secrets.TEST_USER_1_PASSWORD }}
          # NEXT_PUBLIC_* needed by fixtures.ts to build the Supabase client
          # (signs in as TEST_USER_1 to mint the Bearer token).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          # Service-role key for fixtures.ts cleanup paths (deleting eval items).
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Workflow-injection mitigation: pass github context through env, not run:.
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MCP_PATHS_CHANGED: ${{ steps.changes.outputs.mcp }}
          LAYER: ${{ matrix.layer }}
        run: |
          # Skip-flag policy (per spec §3.2):
          #   push to main/staging → full
          #   MCP-touch PR  → full
          #   other PRs     → skip flags active (cost-zero runs)
          if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "$MCP_PATHS_CHANGED" = "true" ]; then
            SKIP_FLAGS=""
            echo "Mode: full (no skip flags)"
          else
            case "$LAYER" in
              l1) SKIP_FLAGS="--skip-ai" ;;
              l3) SKIP_FLAGS="--skip-search" ;;
              l4) SKIP_FLAGS="--skip-ai" ;;
            esac
            echo "Mode: skip ($SKIP_FLAGS)"
          fi

          case "$LAYER" in
            l1) bun run test:mcp-eval $SKIP_FLAGS ;;
            l3) bun run test:mcp-eval:rq $SKIP_FLAGS ;;
            l4) bun run test:mcp-eval:fc $SKIP_FLAGS ;;
            *)  echo "Unknown layer: $LAYER" >&2; exit 1 ;;
          esac
      - name: Cleanup orphaned content_history rows (staging)
        if: always()
        env:
          ALLOW_ORPHAN_CONTENT_HISTORY_CLEANUP: "1"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run cleanup:orphaned-content-history

      - name: Stop MCP server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-eval-${{ matrix.layer }}-server-log
          path: /tmp/server.log
          retention-days: 7
          if-no-files-found: ignore

  integration:
    # WP-CI.RES.3 — Integration-tier tests in CI (Phase 1).
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-ci-res3-integration-tier-ci-spec.md
    # Closes roadmap §9.16.12 Phase 1.
    #
    # Runs `bun run test:integration` against the staging Supabase branch
    # (`turayklvaunphgbgscat`) with real Anthropic + OpenAI calls. Exercises
    # production code paths unit tests cannot: RLS policies, real auth flows,
    # AI-pipeline classification + embedding, migration triggers, cookie-store
    # auth-helper resolution.
    #
    # Phase 2 state: `continue-on-error` removed (line 529 comment). The
    # `set -o pipefail` in the run step ensures `| tee` does not mask the
    # test runner's exit code. Remaining soft-fail flags to drop atomically
    # once staging is fully populated (roadmap §9.16.10):
    #   - e2e-smoke `continue-on-error: true` (line 235)
    #   - MCP eval graceful-skip in `scripts/mcp-eval/fixtures.ts`
    #
    # Independent of the `quality` / `e2e-smoke` / `mcp-eval` jobs (no
    # `needs:` chain) so total CI wall-clock = max(quality, e2e-smoke,
    # mcp-eval, integration).
    # Dependabot-skip: hits real Supabase + Anthropic + OpenAI; all of these
    # come from `secrets.*` which are blocked for Dependabot PRs.
    name: Integration tests
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Staging-scoped: TEST_USER_{1,2,3}_* + staging Supabase secrets only
    # exist on Staging env scope (per docs/runbooks/github-environments.md
    # §3.1). Case-sensitive — must exactly match `Staging`.
    environment: Staging
    # WP-CI.RES.7 Phase 2 cutover: continue-on-error dropped. Staging now
    # has reference data + deterministic fixtures via Path (ii). Phase 1
    # soft-fail lever no longer needed.
    # Point estimate 5-7 min wall-clock under default gating + single shard
    # (spec §2.5). 25 min ceiling absorbs cold-cache + AI-API tail-latency
    # variance (~3.5x point estimate). Re-evaluate after 5 green runs.
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Run integration tests
        env:
          # Mirror e2e-smoke env block (spec §2.2) — staging Supabase
          # connection + TEST_USER_{1,2,3} credentials.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Server-side secrets the integration runner boots with
          # (lib/env-server.ts validates at module load — every Zod-required
          # field must be set or the first test import throws before any
          # `it()` runs).
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # AI keys (ANTHROPIC + OPENAI) are required because integration tests import
          # lib/ai/classify + lib/ai/embed at module load. e2e-smoke also carries them
          # today for the same Zod-load reason.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # CRON_SECRET — review-cadence-lifecycle.integration.test.ts asserts
          # cron-route Bearer-token gate.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Mirror to NEXT_PUBLIC_* for the client schema (auth-session.ts
          # sign-in path uses these).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Test-user credentials — pre-seeded into staging by
          # scripts/seed-e2e-users.ts (per docs/runbooks/staging-refresh.md
          # §4). 3 personas: TEST_USER_1 admin, TEST_USER_2 editor,
          # TEST_USER_3 viewer; auth-session.ts caps each test file at 3
          # sign-ins for rate-limit safety.
          TEST_USER_1_EMAIL: ${{ vars.TEST_USER_1_EMAIL }}
          TEST_USER_1_PASSWORD: ${{ secrets.TEST_USER_1_PASSWORD }}
          TEST_USER_2_EMAIL: ${{ vars.TEST_USER_2_EMAIL }}
          TEST_USER_2_PASSWORD: ${{ secrets.TEST_USER_2_PASSWORD }}
          TEST_USER_3_EMAIL: ${{ vars.TEST_USER_3_EMAIL }}
          TEST_USER_3_PASSWORD: ${{ secrets.TEST_USER_3_PASSWORD }}
          # INTEGRATION_INTELLIGENCE and KH_RUN_INTEGRATION are intentionally
          # NOT set — they default-off-skip ~28 cases and parity with
          # local-dev `bun run test:integration` is preserved (spec §2.2,
          # D-CI.RES.3-7).
        # `tee` so the log appears live in the GH Actions step UI as it
        # streams, not just post-failure (spec §2.8).
        # `set -o pipefail` ensures the pipeline returns the test runner's
        # exit code, not tee's (which always exits 0).
        run: |
          set -o pipefail
          bun run test:integration 2>&1 | tee /tmp/integration.log
      - name: Cleanup orphaned content_history rows (staging)
        if: always()
        env:
          ALLOW_ORPHAN_CONTENT_HISTORY_CLEANUP: "1"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run cleanup:orphaned-content-history

      - name: Upload integration log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-log
          path: /tmp/integration.log
          retention-days: 14
          if-no-files-found: ignore

  ci-summary:
    # OPS-58 (S33 W1) — single fixed-name aggregator. Posts on every PR
    # (including Dependabot) regardless of which upstream jobs ran.
    #
    # Why: the prior strict-gating set on ruleset 15785019 required
    # individual matrix names (`MCP eval (l*)`) and path-conditional jobs
    # (`REVOKE-guard PR lint`) that DO NOT post on every PR — Dependabot
    # PRs (where `secrets.*` is empty) and non-migration PRs left these
    # required checks "missing", blocking merge close-out (PR #49 S32).
    # The S32 fix removed dead names, leaving `Quality pre-check` +
    # `E2E smoke` only — but that is brittle (skip-on-empty-secrets
    # surface for `quality-precheck`, conditional `e2e-smoke` paths).
    #
    # Aggregator semantics (per spec): `failure` is the only red signal;
    # `success` and `skipped` both treated as pass. This decouples
    # required-check posting from upstream job composition: jobs can be
    # added, removed, sharded, or path-conditional without touching the
    # ruleset.
    #
    # Branch-protection ruleset 15785019 now requires only
    # `CI / ci-summary` (drops `Quality pre-check` + `E2E smoke`).
    #
    # Security note: every `${{ needs.<job>.result }}` is routed through
    # an env: var (no direct interpolation in run:). Per
    # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/.
    name: ci-summary
    if: always()
    needs:
      - quality-precheck
      - quality-test
      - e2e-smoke
      - mcp-build
      - mcp-eval-seed
      - mcp-eval
      - integration
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
      # Required by `vercel/repository-dispatch/actions/status@v1` —
      # action reads workflow run info + posts commit status (W6 / WP-G4.7).
      actions: read
      statuses: write
      checks: write

    steps:
      - name: Aggregate upstream job results
        env:
          QUALITY_PRECHECK: ${{ needs.quality-precheck.result }}
          QUALITY_TEST: ${{ needs.quality-test.result }}
          E2E_SMOKE: ${{ needs.e2e-smoke.result }}
          MCP_BUILD: ${{ needs.mcp-build.result }}
          MCP_EVAL_SEED: ${{ needs.mcp-eval-seed.result }}
          MCP_EVAL: ${{ needs.mcp-eval.result }}
          INTEGRATION: ${{ needs.integration.result }}
        run: |
          set -euo pipefail
          fail=0
          for entry in \
            "quality-precheck=$QUALITY_PRECHECK" \
            "quality-test=$QUALITY_TEST" \
            "e2e-smoke=$E2E_SMOKE" \
            "mcp-build=$MCP_BUILD" \
            "mcp-eval-seed=$MCP_EVAL_SEED" \
            "mcp-eval=$MCP_EVAL" \
            "integration=$INTEGRATION"; do
            name="${entry%%=*}"
            res="${entry##*=}"
            echo "  $name -> $res"
            if [[ "$res" == "failure" ]]; then
              fail=1
            fi
          done
          if [[ $fail -eq 1 ]]; then
            echo "::error::One or more upstream CI jobs failed."
            exit 1
          fi
          echo "All upstream CI jobs passed or skipped."

      # WP-G4.7 — Vercel deploy gate. Dispatches the workflow status to
      # Vercel so prod deploys can be gated on this check. Vercel-side
      # configuration: project must opt in to the named check via the
      # Vercel dashboard. `if: always()` so Vercel sees both success and
      # failure signals — without it, Vercel would only ever see green.
      - name: Notify Vercel — ci-summary status
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - knowledge-hub: ci-summary"
