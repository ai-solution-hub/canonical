# Spec: docs/runbooks/ci.md — PR-blocking CI foundation (WP-G4.1)

name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, staging]

concurrency:
  group:
    ci-${{ github.workflow }}-${{ github.event_name }}-${{
    github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# PLATFORM_PROJECT_REF — this repo's own dev/CI Supabase project, the only
# project ref CI targets. Client prod/staging refs are per-client and never
# committed (ID-68 / theme 12). Sourced from a repo secret and exposed to every
# job/step so the scripts/lib/project-refs.ts guards resolve.
env:
  PLATFORM_PROJECT_REF: ${{ secrets.PLATFORM_PROJECT_REF }}

jobs:
  quality-precheck:
    # WP-CI.RES.1 (S15) — Pattern A 4-way file-shard. Quality precheck runs the
    # build-bound work whose cost is independent of shard count: lint, format
    # check, knip baseline guard, Next.js build, build-output regression scan,
    # and (paths-filter-gated) Python pytest. The Vitest unit suite has been
    # split into the `quality-test` matrix below. Closes roadmap §9.16.11.
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-ci-res1-vitest-perf-spec.md
    name: Quality pre-check
    runs-on: ubuntu-latest
    # Resolves ${{ secrets.X }} and ${{ vars.X }} from the Production
    # environment scope (per docs/runbooks/github-environments.md §4.1).
    # Case-sensitive — must exactly match `Production`.
    # Dependabot PRs drop the environment binding so they pull from the
    # repo-level Dependabot secret namespace + repo-level vars (which
    # mirror staging values). See docs/runbooks/ci.md §4.4.
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Production' }}
    # 15 min headroom covers lint + format + knip + build + test:build + (gated)
    # Python pytest at ~3-4 min observed on push-to-main. Vitest now lives in
    # `quality-test`. Per spec D-CI.RES.1-3 + D-CI.RES.1-11. Raised 10 → 15
    # after S319 push run 27070911984 was cancelled at 10m13s mid-pytest
    # (pip install alone took 2m36s).
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # fetch-depth: 0 lets `vitest run --changed origin/<base>` diff
          # the PR head against the merge base on PR runs (consumed in the
          # downstream `quality-test` matrix job).
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            python:
              - 'scripts/**/*.py'
              - 'requirements.txt'
              - 'scripts/tests/**'

      # Bun handles dependency install + script execution; Node 22 is required for
      # Vitest 4 + Next.js 16 tooling that does not run on Bun's Node-compat layer.
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Cache Next.js build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .next/cache
          key:
            ${{ runner.os }}-next-quality-${{ hashFiles('bun.lock',
            'package.json', 'next.config.ts', 'tsconfig.json',
            'postcss.config.mjs') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-next-quality-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}-
            ${{ runner.os }}-next-quality-

      # WP1.2 (S19): lint / format-check / knip run with `if: !cancelled()` so
      # each reports independently. Default step semantics skip on prior
      # failure — that hid the +6 knip types breach S17 introduced behind the
      # earlier-failing format step. Build keeps default `if: success()` so
      # expensive work doesn't run when checks are already broken.
      - name: Lint (ESLint)
        if: "!cancelled()"
        run: bun lint

      - name: Format check (Prettier)
        if: "!cancelled()"
        run: bun run format:check

      - name: Knip baseline guard
        if: "!cancelled()"
        run: bun run ci:knip-check

      - name: Legacy form-template resolver guard (ID-145 {145.7})
        if: "!cancelled()"
        run: bun run scripts/check-no-legacy-form-template-resolver.ts

      - name: Build (Next.js)
        # Dependabot PRs now pull from the repo-level Dependabot secret
        # namespace + repo-level vars (mirror of staging) instead of the
        # Production env scope — see docs/runbooks/ci.md §4.4. The
        # conditional `environment:` at the job level drops the env
        # binding for Dependabot so `secrets.*` resolves from the
        # Dependabot namespace, not empty.
        env:
          # WP1.5 parallel: quality-precheck runs solo but observed OOM on
          # ubuntu-latest (2 GB default) during post-compile TS phase when
          # the monorepo size increased past ~60 migration files. 4 GB
          # headroom mirrors the MCP eval matrix and local dev.
          NODE_OPTIONS: --max-old-space-size=4096
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          # Production stores bare names; mirror to NEXT_PUBLIC_* for the client schema.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          # VERCEL_GIT_COMMIT_SHA is Vercel-only; substitute github.sha so Sentry release tag resolves.
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: bun run build

      - name: Build-output regression scan (NEXT_PUBLIC_* substitution)
        # Guards against the S7 P0 (env-client safeParse(process.env)) class of
        # regression: any `process.env.NEXT_PUBLIC_*` left unsubstituted in
        # `.next/static/chunks/*.js` would crash the client bundle at first
        # paint. See `__tests__/build/env-substitution.test.ts` + memory
        # `feedback_env_client_literal_substitution.md`. Reuses the build
        # artefacts from the previous step — no extra build cost.
        env:
          RUN_BUILD_TESTS: "1"
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
        run: bun run test:build

      - name: Setup Python
        if: steps.changes.outputs.python == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        if: steps.changes.outputs.python == 'true'
        run: pip install -r requirements.txt

      - name: Install pandoc
        # ID-85.1 — the B1 production image ships pandoc and local dev
        # machines have it, but ubuntu-latest runners do not. Without it,
        # docx_cell_to_markdown.py falls back to tag stripping and 6
        # conversion tests fail (in test_docx_cell_to_markdown.py), gating
        # all 4 quality-test shards.
        # Installing pandoc keeps those tests exercising REAL conversion
        # (production parity) rather than skipping via @requires_pandoc.
        if: steps.changes.outputs.python == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc

      - name: Test (pytest)
        if: steps.changes.outputs.python == 'true'
        env:
          # `kb_pipeline.config` calls `load_dotenv(.env.local)` at import; in
          # CI the file is absent so vars must come from process env. Without
          # this block, every test importing the pipeline raises
          # "SUPABASE_URL not set in .env.local". Step is gated by the
          # `python` paths-filter, so only fires when scripts/ changes.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: python3 -m pytest scripts/tests/

  quality-test:
    # WP-CI.RES.1 (S15) — Vitest 4-way file-shard matrix. Each entry runs
    # `bunx vitest run --shard=N/4` with the existing forks pool (per spec
    # D-CI.RES.1-1; threads-pool migration deferred per
    # `feedback_vitest_threads_deferred`). `fail-fast: false` so all 4 shards
    # report independently. R-3 carry: Vitest's `--shard` partition algorithm
    # is alphabetical-by-resolved-path; Vitest is pinned at `^4.0.18` in
    # package.json — re-balance only on minor-version bump.
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-ci-res1-vitest-perf-spec.md
    # Dependabot-skip: vitest setup imports validated env modules and the
    # whole shard fails closed on empty `secrets.*`. See
    # docs/runbooks/ci.md §"Dependabot CI signal".
    name: Quality test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Production' }}
    needs: quality-precheck
    # 15 min headroom covers the slowest full-suite shard. Per spec
    # D-CI.RES.1-3. Raised 10 → 15 after S319 push run 27070914918 killed
    # shard 2/4 at 9m47s with tests still passing.
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    strategy:
      # `fail-fast: false` — surface the full failure picture across all 4
      # shards in a single CI run rather than aborting siblings on first
      # failure. Per spec D-CI.RES.1-2.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # fetch-depth: 0 required for `vitest run --changed origin/<base>`
          # PR-diff path retained below.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Test (Vitest, shard ${{ matrix.shard }}/4)
        env:
          # Vitest setup imports validated env modules; mirror the build step.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Workflow-injection mitigation: route github + matrix context through
          # env: rather than direct ${{ }} interpolation in the run: shell.
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
            bunx vitest run --changed "origin/$GITHUB_BASE_REF" \
              --shard="${SHARD_INDEX}/4"
          else
            bunx vitest run --shard="${SHARD_INDEX}/4"
          fi

  e2e-smoke:
    # WP-G4.3 — Curated Playwright smoke (~54 tests, target ≤5 min wall-clock)
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-g4.3-e2e-smoke-spec.md
    # Runs in parallel with `quality-precheck`/`quality-test` (no `needs:`) so total CI wall-clock stays
    # close to max(quality, e2e-smoke).
    # Dependabot-skip: requires staging Supabase URL + service-role key +
    # TEST_USER_*_PASSWORD which resolve empty for Dependabot PRs.
    name: E2E smoke
    # Cross-PR serialisation: only one e2e-smoke job runs at a time across
    # the repo. Per-job-type group keys keep intra-PR parallelism (e2e-smoke,
    # mcp-eval-seed, mcp-eval matrix, integration all run in parallel within
    # one workflow run). cancel-in-progress: false queues instead of
    # cancelling — Dependabot PR throughput trades latency for fixture
    # isolation against the shared CI Supabase project.
    concurrency:
      group: integration-staging-e2e
      cancel-in-progress: false
    runs-on: ubuntu-latest
    # Staging env scope per docs/runbooks/github-environments.md §2 —
    # carries staging Supabase URL/keys + TEST_USER_1/2/3 credentials.
    # Case-sensitive: must exactly match `Staging`.
    # Dependabot drops env binding (no env-scoped secret access for
    # bot-triggered runs) — uses repo Dependabot namespace instead.
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Staging' }}
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Cache Next.js build cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: .next/cache
          key:
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{
            hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Install Playwright browsers (chromium only)
        # Smoke project uses Desktop Chrome only (per playwright.config.ts).
        # `--with-deps` installs the Linux system libraries the GH-hosted
        # runner doesn't carry by default.
        run: bunx playwright install --with-deps chromium
      - name: Cleanup stale test artifacts (staging preflight)
        env:
          ALLOW_STALE_TEST_ARTIFACT_CLEANUP: "1"
          TEST_ARTIFACT_CLEANUP_MIN_AGE_MINUTES: "120"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run cleanup:stale-test-artifacts

      - name: Build (Next.js prod)
        # id-128 {128.11}: migrate smoke onto the same build-once + `next
        # start` path the nightly lane uses ({128.6}/{128.7}) — no
        # next-dev compile-on-first-hit under load. Single job here (no
        # shard matrix), so the build is consumed directly by the next
        # step in the same workspace — no cross-job artifact upload/
        # download is needed (that machinery in e2e-nightly.yml exists
        # only to hand the build off to 4 parallel shard jobs).
        # ★ LOAD-BEARING: every NEXT_PUBLIC_* var is client-inlined
        # (lib/env-client.ts) and BAKED AT BUILD TIME, not at `next
        # start`. Each MUST be set in THIS step's env, or the served
        # bundle carries stale/missing values. Env block mirrors
        # e2e-nightly.yml's "Build (Next.js prod)" step.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          # Production stores bare names; mirror to NEXT_PUBLIC_* for the client schema.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          # VERCEL_GIT_COMMIT_SHA is Vercel-only; substitute github.sha so the Sentry release tag resolves.
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: bun run build

      - name: Run Playwright smoke
        env:
          # id-128 {128.11}: serve the prebuilt app via `next start` (routes
          # precompiled by the step above) instead of `bun dev`.
          PLAYWRIGHT_WEB_SERVER_CMD: "bun run start"
          # Staging Supabase connection — env scope resolves these from the
          # `Staging` GH environment.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Server-side secrets the dev server boots with (lib/env-server.ts
          # validates at module load — every Zod-required field must be set
          # or `bun run dev` fails at first import).
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Mirror to NEXT_PUBLIC_* for the client schema (same pattern as
          # the `quality` job's build step).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Test-user credentials — pre-seeded into staging by
          # scripts/seed-e2e-users.ts (per docs/runbooks/staging-refresh.md §4).
          TEST_USER_1_EMAIL: ${{ vars.TEST_USER_1_EMAIL }}
          TEST_USER_1_PASSWORD: ${{ secrets.TEST_USER_1_PASSWORD }}
          TEST_USER_2_EMAIL: ${{ vars.TEST_USER_2_EMAIL }}
          TEST_USER_2_PASSWORD: ${{ secrets.TEST_USER_2_PASSWORD }}
          TEST_USER_3_EMAIL: ${{ vars.TEST_USER_3_EMAIL }}
          TEST_USER_3_PASSWORD: ${{ secrets.TEST_USER_3_PASSWORD }}
          # TEST_USER_4 = dedicated sign-out user. The `setup` project (a
          # dependency of every browser project, incl. smoke) authenticates all
          # four users, so smoke needs these even though no @smoke test uses the
          # sign-out user directly — otherwise setup fails and smoke is skipped.
          TEST_USER_4_EMAIL: ${{ vars.TEST_USER_4_EMAIL }}
          TEST_USER_4_PASSWORD: ${{ secrets.TEST_USER_4_PASSWORD }}
        run: bunx playwright test --project=smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  mcp-build:
    # WP-G4.4 — build once for the MCP eval layer matrix.
    # The Staging-scoped build remains separate from Production quality-precheck
    # because env scopes differ, but L1/L3/L4 now share this single artefact.
    # Dependabot-skip: Next.js build's env-client Zod schema requires
    # NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY which resolves empty for Dependabot.
    name: MCP staging build
    runs-on: ubuntu-latest
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Staging' }}
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Cache Next.js build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .next/cache
          key:
            ${{ runner.os }}-next-mcp-${{ hashFiles('bun.lock', 'package.json',
            'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}-${{
            github.sha }}
          restore-keys: |
            ${{ runner.os }}-next-mcp-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}-
            ${{ runner.os }}-next-mcp-

      - name: Build (Next.js)
        env:
          # Mirror the quality job's build env block — Staging-scoped secrets/vars.
          NODE_OPTIONS: --max-old-space-size=4096
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: bun run build

      - name: Archive MCP build artifact
        run: tar --exclude='.next/cache' -czf /tmp/mcp-next-build.tar.gz .next

      - name: Upload MCP build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mcp-next-build
          path: /tmp/mcp-next-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  detect-changes:
    # ─────────────────────────────────────────────────────────────────────────
    # CHANGE DETECTION for the real-API lanes — ID-91 ({91.1}, bl-246).
    # Every push to main/staging previously ran `integration`, `mcp-eval-seed`
    # and the `mcp-eval` L1/L3/L4 matrix in full mode — burning real Anthropic
    # (Sonnet + Haiku) + OpenAI embedding tokens even when nothing those suites
    # exercise had changed (an align-class docs push burned the lanes twice:
    # once on main, once on staging). This job replicates the ID-86 pattern
    # from onprem-deploy.yml (commits ccc66f48/bd5f0359): a FULL `before..sha`
    # `git diff --name-only` compare — NOT the GitHub compare API / push-event
    # `paths:` filter, both of which inspect only the first 300 changed files
    # and silently skip on align-class pushes — matched against the path set
    # the real-API lanes actually exercise, gating those jobs on
    # `outputs.relevant` for PUSH events only.
    #
    # PR runs are untouched: on any non-push event this job short-circuits to
    # relevant=true without checking out, so the gated jobs' `if:` conditions
    # are always satisfied and the existing PR skip-flag policy inside
    # `mcp-eval` (paths-filter → --skip-ai / --skip-search) keeps sole control
    # of PR cost.
    #
    # Path-set rationale (verified against imports, S323 — err toward
    # over-inclusion: a false re-burn is cheaper than a silent skip of a real
    # regression):
    #   __tests__/integration/**          — the integration suite itself
    #   __tests__/helpers/**              — shared helpers the suite imports
    #                                       (mock-supabase, supabase-client, …)
    #   __tests__/setup.ts                — vitest setupFiles for the suite
    #   lib/**                            — suite imports 12+ lib subdirs
    #                                       (ai, auth, intelligence, queue,
    #                                       supabase, entities, pipeline, …);
    #                                       mcp-eval exercises lib/mcp +
    #                                       lib/ai + lib/validation; the
    #                                       booted server validates lib/env*
    #   app/api/**                        — suite dynamically imports route
    #                                       handlers (items, admin, cron,
    #                                       ingest, governance, review, …);
    #                                       mcp-eval hits app/api/mcp/**
    #   types/**                          — domain types the suite imports
    #   supabase/**                       — generated types + migrations
    #                                       (trigger tests exercise live DB
    #                                       schema: publication-status,
    #                                       archive-coverage, review-cadence)
    #   scripts/mcp-eval/**               — eval harness + corpus seeder
    #   proxy.ts                          — middleware on the booted server
    #   next.config.ts                    — server build/runtime behaviour
    #   vitest.integration.config.ts      — integration runner config
    #   tsconfig.json                     — path-alias resolution
    #   package.json / bun.lock           — dependency manifests
    #   .github/workflows/ci.yml          — this workflow itself
    #   .node-version                     — runtime version the jobs pin
    #
    # FAILURE MODES — no silent failure-by-skip: edge cases (all-zeros
    # `before` on branch create / force-push, unreachable `before` after a
    # history rewrite) fail OPEN to relevant=true; the verdict + compared
    # range + matched files are always logged; and `ci-summary` includes this
    # job in its needs, so an outright detection failure turns CI red instead
    # of quietly skipping the lanes.
    # ─────────────────────────────────────────────────────────────────────────
    name: Detect real-API-relevant changes (full compare)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.diff.outputs.relevant }}
    steps:
      - name: Checkout (full history — the before..sha diff needs both ends)
        # Push events only — non-push events short-circuit to relevant=true
        # in the step below without needing the repo, keeping PR-lane latency
        # at effectively zero.
        if: github.event_name == 'push'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Diff before..sha and match the real-API path set
        id: diff
        env:
          # Map dynamic values into the shell env (never interpolate ${{ }}
          # directly inside run: — injection-safe, mirroring onprem-deploy).
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          emit() {
            echo "relevant=$1" >> "$GITHUB_OUTPUT"
            echo "detect-changes verdict: relevant=$1 ($2)"
          }
          # Gate applies to push events ONLY. PR runs keep their existing
          # behaviour (mcp-eval's in-job paths-filter skip-flag policy).
          if [ "${EVENT_NAME}" != "push" ]; then
            emit true "non-push event (${EVENT_NAME}) — gate is push-only; PR lanes keep their own skip-flag policy"
            exit 0
          fi
          # Branch create / force-push: GitHub sends an all-zeros `before` SHA
          # (or none). No comparable base — fail open to relevant=true.
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "${ZERO_SHA}" ]; then
            emit true "before SHA empty/all-zeros (branch create or force-push)"
            exit 0
          fi
          # History rewrite can leave `before` unreachable even at
          # fetch-depth 0 — fail open rather than erroring the gate.
          if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            emit true "before SHA ${BEFORE_SHA} not found locally (history rewrite)"
            exit 0
          fi
          # FULL compare — git diff has no 300-file ceiling. Capture first,
          # then grep WITHOUT -q (avoids the SIGPIPE/pipefail early-exit
          # footgun), so the matched files are also logged for the operator.
          CHANGED="$(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}")"
          TOTAL="$(printf '%s\n' "${CHANGED}" | grep -c . || true)"
          echo "Full compare ${BEFORE_SHA}..${AFTER_SHA}: ${TOTAL} changed file(s)."
          MATCHES="$(printf '%s\n' "${CHANGED}" | grep -E '^(__tests__/integration/.*|__tests__/helpers/.*|__tests__/setup\.ts|lib/.*|app/api/.*|types/.*|supabase/.*|scripts/mcp-eval/.*|proxy\.ts|next\.config\.ts|vitest\.integration\.config\.ts|tsconfig\.json|package\.json|bun\.lock|\.github/workflows/ci\.yml|\.node-version)$' || true)"
          if [ -n "${MATCHES}" ]; then
            echo "Real-API-relevant changes:"
            printf '%s\n' "${MATCHES}"
            emit true "real-API path(s) changed"
          else
            emit false "no real-API-relevant paths in the compare — integration + mcp-eval-seed + mcp-eval (l1/l3/l4) will SKIP on this push"
          fi

  mcp-eval-seed:
    # Seed the shared deterministic Q&A corpus once before the L1/L3/L4 eval
    # matrix fans out. Rows are persistent staging fixtures identified by
    # metadata.mcp_eval_seed=true; per-layer cleanup only removes temporary
    # [MCP-EVAL] mutation fixtures.
    # Dependabot-skip: needs SUPABASE_SERVICE_ROLE_KEY + Anthropic / OpenAI
    # keys to seed and verify rows.
    name: MCP eval seed
    # Per-job-type concurrency group — see `e2e-smoke` for rationale.
    concurrency:
      group: integration-staging-mcp-eval-seed
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Staging' }}
    needs: [mcp-build, detect-changes]
    # Real-API gate (ID-91 / bl-246) — push events only: a push that touches
    # no real-API-relevant path skips the seed (and, via needs, the eval
    # matrix). PR runs always pass this condition (detect-changes emits
    # relevant=true on non-push events). No status function in the
    # expression, so the implicit success() keeps the existing
    # mcp-build-failure → skip semantics intact.
    if:
      github.event_name != 'push' || needs.detect-changes.outputs.relevant ==
      'true'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Seed MCP eval Q&A fixtures
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
        run: bun run seed:mcp-eval

      # ID-71 {71.20} / B-INV-13: register the born-evaluable AgentEvalContract
      # for each new/refined ID-71 touchpoint (consolidated MCP tools + lib/ai
      # inline touchpoints) so the L1/L3/L4 eval matrix resolves every touchpoint
      # before dispatch. Idempotent (B-INV-5); safe to re-run each seed.
      - name: Register ID-71 born-evaluable touchpoint contracts
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run register:id71-touchpoints

  mcp-eval:
    # WP-G4.4 — MCP eval Layers 1/3/4 in CI.
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-g4.4-mcp-eval-ci-spec.md
    # Runs the three MCP eval scripts against a CI-local dev server backed by the
    # Staging Supabase branch. Matrix entries report independently as
    # `mcp-eval (l1)`, `mcp-eval (l3)`, `mcp-eval (l4)` while sharing the
    # single Staging build artefact produced by `mcp-build` and the shared
    # seeded Q&A corpus produced by `mcp-eval-seed`.
    #
    # Skip-flag policy (per spec §3.2):
    #   - push to main/staging → full mode (no skip flags) — but only when the
    #     `detect-changes` gate (ID-91 / bl-246) found a real-API-relevant
    #     change in the push; otherwise the whole matrix skips
    #   - PR touching MCP paths (paths-filter) → full mode
    #   - other PRs → --skip-ai (L1, L4) / --skip-search (L3) for cost-zero runs
    #
    # Independent of `quality-precheck`/`quality-test`; depends only on
    # `mcp-build` + `mcp-eval-seed` (+ the `detect-changes` gate) so eval
    # results appear regardless of quality-job state.
    name: MCP eval (${{ matrix.layer }})
    # Dependabot-skip: matrix expansion is gated upstream by mcp-build +
    # mcp-eval-seed (both also skipped on Dependabot). Adding the explicit
    # if: here keeps the policy obvious + matches the other 5 jobs.
    # Per-job-type, per-layer concurrency — see `e2e-smoke` for rationale.
    # Distinct per-layer keys preserve intra-PR matrix parallelism while
    # cross-PR each layer still queues with itself.
    concurrency:
      group: integration-staging-mcp-eval-${{ matrix.layer }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    # Staging-scoped: TEST_USER_1_* secrets only exist on Staging env scope
    # (per docs/runbooks/github-environments.md §3.1). Eval scripts authenticate
    # as TEST_USER_1 to obtain a Bearer token for the MCP server endpoint.
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Staging' }}
    needs: [mcp-build, mcp-eval-seed, detect-changes]
    # Real-API gate (ID-91 / bl-246) — push events only; see `mcp-eval-seed`.
    # Belt-and-braces: a skipped `mcp-eval-seed` already skips this matrix via
    # the implicit success() over needs, but the explicit condition keeps the
    # policy self-documenting.
    if:
      github.event_name != 'push' || needs.detect-changes.outputs.relevant ==
      'true'
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    strategy:
      fail-fast: false
      matrix:
        layer: [l1, l3, l4]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Detect MCP-related path changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            mcp:
              - 'lib/mcp/**'
              - 'app/api/mcp/**'
              - 'scripts/mcp-eval/**'
              - 'lib/ai/**'
              - 'lib/validation/schemas.ts'
              - 'package.json'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi
      - name: Download MCP build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mcp-next-build
          path: /tmp

      - name: Restore MCP build artifact
        run: tar -xzf /tmp/mcp-next-build.tar.gz

      - name: Start MCP server (background)
        env:
          # Runtime env block — same as Build step. `bun run start` reads these
          # at boot to satisfy lib/env.ts + lib/env-client.ts validation.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
        run: |
          bun run start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid

          # Health-check loop — POST to the MCP endpoint until any HTTP response
          # is received (timeout 30s). A 401 here means the server is up and the
          # MCP route handler is responding (auth-required is the expected
          # default for the endpoint without a Bearer token). A connection
          # failure (curl exit code 7) means the server is not yet listening.
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 5 -X POST \
                 -H "Content-Type: application/json" \
                 -d '{}' \
                 http://localhost:3000/api/mcp/streamable-http || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "MCP server up after ${i}s (HTTP $HTTP_CODE)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "MCP server failed to start within 30s" >&2
              echo "----- /tmp/server.log -----" >&2
              cat /tmp/server.log >&2
              exit 1
            fi
            sleep 1
          done

      - name: Run MCP eval (${{ matrix.layer }})
        env:
          # Eval scripts authenticate as TEST_USER_1 → Bearer token to MCP endpoint.
          TEST_USER_1_EMAIL: ${{ vars.TEST_USER_1_EMAIL }}
          TEST_USER_1_PASSWORD: ${{ secrets.TEST_USER_1_PASSWORD }}
          # NEXT_PUBLIC_* needed by fixtures.ts to build the Supabase client
          # (signs in as TEST_USER_1 to mint the Bearer token).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          # Service-role key for fixtures.ts cleanup paths (deleting eval items).
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Workflow-injection mitigation: pass github context through env, not run:.
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MCP_PATHS_CHANGED: ${{ steps.changes.outputs.mcp }}
          LAYER: ${{ matrix.layer }}
        run: |
          # Skip-flag policy (per spec §3.2):
          #   push to main/staging → full
          #   MCP-touch PR  → full
          #   other PRs     → skip flags active (cost-zero runs)
          if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "$MCP_PATHS_CHANGED" = "true" ]; then
            SKIP_FLAGS=""
            echo "Mode: full (no skip flags)"
          else
            case "$LAYER" in
              l1) SKIP_FLAGS="--skip-ai" ;;
              l3) SKIP_FLAGS="--skip-search" ;;
              l4) SKIP_FLAGS="--skip-ai" ;;
            esac
            echo "Mode: skip ($SKIP_FLAGS)"
          fi

          case "$LAYER" in
            l1) bun run test:mcp-eval $SKIP_FLAGS ;;
            l3) bun run test:mcp-eval:rq $SKIP_FLAGS ;;
            l4) bun run test:mcp-eval:fc $SKIP_FLAGS ;;
            *)  echo "Unknown layer: $LAYER" >&2; exit 1 ;;
          esac
      - name: Stop MCP server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mcp-eval-${{ matrix.layer }}-server-log
          path: /tmp/server.log
          retention-days: 7
          if-no-files-found: ignore

  integration:
    # WP-CI.RES.3 — Integration-tier tests in CI (Phase 1).
    # Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-ci-res3-integration-tier-ci-spec.md
    # Closes roadmap §9.16.12 Phase 1.
    #
    # Runs `bun run test:integration` against the CI Supabase project
    # with real Anthropic + OpenAI calls. Exercises
    # production code paths unit tests cannot: RLS policies, real auth flows,
    # AI-pipeline classification + embedding, migration triggers, cookie-store
    # auth-helper resolution.
    #
    # Phase 2 state: `continue-on-error` removed (line 529 comment). The
    # `set -o pipefail` in the run step ensures `| tee` does not mask the
    # test runner's exit code. Remaining soft-fail flags to drop atomically
    # once staging is fully populated (roadmap §9.16.10):
    #   - e2e-smoke `continue-on-error: true` (line 235)
    #   - MCP eval graceful-skip in `scripts/mcp-eval/fixtures.ts`
    #
    # Independent of the `quality` / `e2e-smoke` / `mcp-eval` jobs — the only
    # `needs:` is the lightweight `detect-changes` gate (seconds), so total CI
    # wall-clock stays ≈ max(quality, e2e-smoke, mcp-eval, integration).
    # Dependabot-skip: hits real Supabase + Anthropic + OpenAI; all of these
    # come from `secrets.*` which are blocked for Dependabot PRs.
    name: Integration tests
    # Per-job-type concurrency group — see `e2e-smoke` for rationale.
    concurrency:
      group: integration-staging-integration
      cancel-in-progress: false
    needs: detect-changes
    # Real-API gate (ID-91 / bl-246) — push events only: a push that touches
    # no real-API-relevant path skips the suite (real Anthropic + OpenAI
    # burn). PR runs always pass this condition (detect-changes emits
    # relevant=true on non-push events).
    if:
      github.event_name != 'push' || needs.detect-changes.outputs.relevant ==
      'true'
    runs-on: ubuntu-latest
    # Staging-scoped: TEST_USER_{1,2,3}_* + staging Supabase secrets only
    # exist on Staging env scope (per docs/runbooks/github-environments.md
    # §3.1). Case-sensitive — must exactly match `Staging`.
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Staging' }}
    # WP-CI.RES.7 Phase 2 cutover: continue-on-error dropped. Staging now
    # has reference data + deterministic fixtures via Path (ii). Phase 1
    # soft-fail lever no longer needed.
    # Point estimate 5-7 min wall-clock under default gating + single shard
    # (spec §2.5). 25 min ceiling absorbs cold-cache + AI-API tail-latency
    # variance (~3.5x point estimate). Re-evaluate after 5 green runs.
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Run integration tests
        env:
          # Mirror e2e-smoke env block (spec §2.2) — staging Supabase
          # connection + TEST_USER_{1,2,3} credentials.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Server-side secrets the integration runner boots with
          # (lib/env-server.ts validates at module load — every Zod-required
          # field must be set or the first test import throws before any
          # `it()` runs).
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # AI keys (ANTHROPIC + OPENAI) are required because integration tests import
          # lib/ai/classify + lib/ai/embed at module load. e2e-smoke also carries them
          # today for the same Zod-load reason.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # CRON_SECRET — review-cadence-lifecycle.integration.test.ts asserts
          # cron-route Bearer-token gate.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Mirror to NEXT_PUBLIC_* for the client schema (auth-session.ts
          # sign-in path uses these).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Test-user credentials — pre-seeded into staging by
          # scripts/seed-e2e-users.ts (per docs/runbooks/staging-refresh.md
          # §4). 3 personas: TEST_USER_1 admin, TEST_USER_2 editor,
          # TEST_USER_3 viewer; auth-session.ts caps each test file at 3
          # sign-ins for rate-limit safety.
          TEST_USER_1_EMAIL: ${{ vars.TEST_USER_1_EMAIL }}
          TEST_USER_1_PASSWORD: ${{ secrets.TEST_USER_1_PASSWORD }}
          TEST_USER_2_EMAIL: ${{ vars.TEST_USER_2_EMAIL }}
          TEST_USER_2_PASSWORD: ${{ secrets.TEST_USER_2_PASSWORD }}
          TEST_USER_3_EMAIL: ${{ vars.TEST_USER_3_EMAIL }}
          TEST_USER_3_PASSWORD: ${{ secrets.TEST_USER_3_PASSWORD }}
          # INTEGRATION_INTELLIGENCE and KH_RUN_INTEGRATION are intentionally
          # NOT set — they default-off-skip ~128 cases (cocoindex 76 /
          # q-a-pairs 27 / intelligence-golden-path 25), preserving parity with
          # local-dev `bun run test:integration` (spec §2.2, D-CI.RES.3-7).
          # cocoindex additionally needs COCOINDEX_STAGING_URL +
          # COCOINDEX_SOURCE_PATH + COCOINDEX_FIXTURE_STAGING_URL (sidecar).
          # Enabling the two flags would run the 52 Supabase+AI cases on
          # existing CI creds but adds real Anthropic/OpenAI spend per run —
          # deferred (bl-338; nightly cocoindex lane tracked separately).
        # `tee` so the log appears live in the GH Actions step UI as it
        # streams, not just post-failure (spec §2.8).
        # `set -o pipefail` ensures the pipeline returns the test runner's
        # exit code, not tee's (which always exits 0).
        run: |
          set -o pipefail
          bun run test:integration 2>&1 | tee /tmp/integration.log
      - name: Integration coverage summary (bl-338)
        # Visibility-only: a green run masks the ~128 env-gated cases. Emit the
        # vitest skip summary + the gated-suite list as a GH notice. Non-fatal
        # (always(), separate step, no exit-code change) so it never affects the
        # gate.
        if: always()
        run: |
          SKIP_LINE=$(grep -iE 'Tests?[[:space:]]+.*skipped' /tmp/integration.log 2>/dev/null | tail -1 || true)
          echo "::notice title=Integration coverage (bl-338)::${SKIP_LINE:-no skip summary in log}. Env-gated suites NOT run in CI: cocoindex (sidecar-gated), intelligence-golden-path + q-a-pairs (flags off). ~128 cases gated — see bl-338."
      - name: Upload integration log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-log
          path: /tmp/integration.log
          retention-days: 14
          if-no-files-found: ignore

  type-drift-parity:
    # R-WP17 (S10 Wave-B / R-WP21 option c) — fetcher-only interface regression
    # gate. Runs `bun run ast-dataflow type-drift-detect --ci`, which exits
    # non-zero if any new fetcher-only interface is detected that is absent from
    # the committed baseline (repo-root `.type-drift-baseline.json`).
    # The 37 existing gaps at S9 close-out are in the baseline (accepted debt);
    # this gate prevents new drift from being introduced unreviewed.
    #
    # No secrets required — the CLI reads repo files + the committed baseline
    # only. No Supabase, Anthropic, or OpenAI calls. `environment:` omitted
    # intentionally so Dependabot PRs run the check without needing env-scoped
    # secrets. Depends on `quality-precheck` so a lint/build failure doesn't
    # also spin up this job unnecessarily.
    #
    # Spec: docs/specs/id-16-ast-dataflow-tool/type-safety-pipeline/PRODUCT.md D-19
    # Decision: docs/specs/id-16-ast-dataflow-tool/type-safety-pipeline/decision-OPS-T1.md
    name: Type-drift parity
    runs-on: ubuntu-latest
    needs: quality-precheck
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Type-drift parity check
        run: bun run ast-dataflow type-drift-detect --ci

  supabase-types-parity:
    # ID-47.6 (S265 / type-safety-pipeline OQ6) — DB-axis generated-types parity
    # gate. Regenerates `supabase/types/database.types.ts` from the live schema
    # via `supabase gen types` and FAILS on any diff against the committed file.
    # This closes the silent-drift gap between `supabase/migrations/**.sql` (the
    # source of truth) and the committed TypeScript types. It is a DIFFERENT axis
    # from `type-drift-parity` (which gates fetcher-only interface regressions via
    # the ast-dataflow CLI, not the Supabase schema).
    #
    # Regenerates against the Platform CI project (PLATFORM_PROJECT_REF, a
    # workflow-level env sourced from a repo secret) — CI targets Platform only;
    # client refs are per-client and never committed (ID-68). The workflow-level
    # env also sidesteps the `.temp/project-ref` drift gotcha
    # (CLAUDE.md "Always cat supabase/.temp/project-ref before any push").
    #
    # Diff, not regenerate-and-commit: the auto-commit pattern bypasses review for
    # schema drift; diff-and-fail forces a PR to explicitly include the regenerated
    # types, matching CLAUDE.md's `supabase migration new` + `db push` + `gen types`
    # workflow. The MergeDeep override (`lib/supabase/database-overrides.ts`, 47.5)
    # is a SEPARATE file the generated types never contain, so the diff is
    # override-blind by construction — no override-aware diff path needed.
    #
    # FIRST-RUN RISK: the committed types file must be generated from the same
    # canonical baseline schema the Platform project carries; the diff fails
    # spuriously if the committed file was generated against a different schema.
    # Mitigation: `schema-parity.yml` confirms cross-project schema parity, or
    # regenerate the committed file from the Platform project.
    #
    # Spec: docs/specs/id-16-ast-dataflow-tool/type-safety-pipeline/TECH.md OQ6 (lines 640-679).
    name: Supabase generated types parity
    runs-on: ubuntu-latest
    # Staging env scope per docs/runbooks/github-environments.md §2 —
    # carries staging Supabase URL/keys + TEST_USER_1/2/3 credentials.
    # Case-sensitive: must exactly match `Staging`.
    # Dependabot drops env binding (no env-scoped secret access for
    # bot-triggered runs) — uses repo Dependabot namespace instead.
    environment: ${{ github.actor == 'dependabot[bot]' && '' || 'Staging' }}
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Install Supabase CLI
        run: |
          # Install the CLI binary from the version-stamped *.tar.gz asset.
          # PINNED to v2.108.0 deliberately: an unpinned `releases/latest` lets an
          # upstream CLI release silently change `supabase gen types` output and
          # flip the types-parity diff out from under us. Bump this version on
          # purpose (and review the parity impact) rather than tracking latest.
          # ID-130 {130.9}: bumped 2.107.0->2.108.0; verified gen-types output from
          # PLATFORM_PROJECT_REF is byte-identical across the two CLIs (format-neutral
          # bump — the committed-types diff is the form-altitude schema change alone).
          #
          # CLI v2.102.0+ ships TWO co-located binaries inside the tarball:
          # `supabase` (a thin shim) and `supabase-go` (the real CLI the shim
          # forwards to). Installing only the shim makes it fail at runtime with
          # "Could not find the supabase-go binary". Install both; the second is
          # conditional so older tarballs (shim-only) keep working.
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_2.108.0_linux_amd64.tar.gz -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /tmp
          sudo install -m 0755 /tmp/supabase /usr/local/bin/supabase
          if [ -f /tmp/supabase-go ]; then
            sudo install -m 0755 /tmp/supabase-go /usr/local/bin/supabase-go
          fi

      - name: Generate types from the Platform project
        # PLATFORM_PROJECT_REF is a workflow-level env (repo secret, not external
        # context) — safe to reference in run:.
        run: |
          supabase gen types typescript \
            --project-id "$PLATFORM_PROJECT_REF" \
            --schema public,api \
            > /tmp/database.types.generated.ts

      - name: Diff against checked-in types
        run: |
          if ! diff -q supabase/types/database.types.ts /tmp/database.types.generated.ts; then
            echo "::error::Generated Supabase types differ from supabase/types/database.types.ts."
            echo "::error::Run: supabase gen types typescript --project-id \"$PLATFORM_PROJECT_REF\" --schema public,api > supabase/types/database.types.ts"
            diff -u supabase/types/database.types.ts /tmp/database.types.generated.ts | head -200
            exit 1
          fi
          echo "Generated types match committed types."

  build-gate:
    # bl-200 (S283 retro) — standalone whole-repo `tsc --noEmit` build-break
    # alarm. A `tsc` error in a standalone CLI script (the since-retired
    # ledger-cli, ID-165) sat undetected on main ~4
    # sessions because no CI job typechecks `scripts/`: the base `tsconfig.json`
    # EXCLUDES `scripts`, and `next build` (run inside `quality-precheck`) only
    # typechecks files in the Next.js compilation graph — standalone CLI scripts
    # are invisible to it. This job runs `bun run typecheck` (tsc against
    # `tsconfig.ci.json`, which includes `scripts/`), so a scripts/-only type
    # break is caught.
    #
    # Deliberately a SEPARATE, top-level job with NO `needs:` — a red build-gate
    # is an unambiguous "build is broken" signal that cannot blend into the
    # other failures inside `quality-precheck` (which is what let the original
    # break hide behind an already-red job). Runs in parallel, fast (~20s tsc),
    # 5 min timeout.
    #
    # No secrets required — pure `tsc`, reads repo files only (no Supabase /
    # Anthropic / OpenAI). `environment:` omitted intentionally so Dependabot
    # PRs run it. Mirrors the `type-drift-parity` setup topology.
    #
    # Spec: bl-200 (docs/reference/product-backlog.json). Closes the
    # "known-red CI masks a fresh regression" gap from the S283 retro.
    name: Build gate (tsc --noEmit, whole repo incl scripts/)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Typecheck (tsc --noEmit, tsconfig.ci.json)
        # tsc OOMs at the ~2 GB default Node heap on the whole-repo (incl scripts/)
        # compile (S289 — exit 134, "Ineffective mark-compacts near heap limit",
        # surfaced once the database.types.ts CLI-notice parse-fail was removed and
        # tsc could compile far enough to exhaust the heap). ubuntu-latest has 7 GB
        # RAM; raise the V8 old-space ceiling to 4 GB.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: bun run typecheck

  ci-summary:
    # OPS-58 (S33 W1) — single fixed-name aggregator. Posts on every PR
    # (including Dependabot) regardless of which upstream jobs ran.
    #
    # Why: the prior strict-gating set on ruleset 15785019 required
    # individual matrix names (`MCP eval (l*)`) and path-conditional jobs
    # (`REVOKE-guard PR lint`) that DO NOT post on every PR — Dependabot
    # PRs (where `secrets.*` is empty) and non-migration PRs left these
    # required checks "missing", blocking merge close-out (PR #49 S32).
    # The S32 fix removed dead names, leaving `Quality pre-check` +
    # `E2E smoke` only — but that is brittle (skip-on-empty-secrets
    # surface for `quality-precheck`, conditional `e2e-smoke` paths).
    #
    # Aggregator semantics (per spec): `failure` is the only red signal;
    # `success` and `skipped` both treated as pass. This decouples
    # required-check posting from upstream job composition: jobs can be
    # added, removed, sharded, or path-conditional without touching the
    # ruleset.
    #
    # Branch-protection ruleset 15785019 now requires only
    # `CI / ci-summary` (drops `Quality pre-check` + `E2E smoke`).
    #
    # Security note: every `${{ needs.<job>.result }}` is routed through
    # an env: var (no direct interpolation in run:). Per
    # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/.
    # `detect-changes` is in the needs list (ID-91 / bl-246) so an outright
    # failure of the real-API gate turns ci-summary red — the gated jobs
    # would show `skipped` (treated as pass), so without this entry a broken
    # gate could silently skip the real-API lanes forever. Skips of the gated
    # jobs themselves stay green by the existing skipped-is-pass semantics.
    name: ci-summary
    if: always()
    needs:
      - detect-changes
      - quality-precheck
      - quality-test
      - e2e-smoke
      - mcp-build
      - mcp-eval-seed
      - mcp-eval
      - integration
      - type-drift-parity
      - supabase-types-parity
      - build-gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
      # Required by `vercel/repository-dispatch/actions/status@v1` —
      # action reads workflow run info + posts commit status (W6 / WP-G4.7).
      actions: read
      statuses: write
      checks: write

    steps:
      - name: Aggregate upstream job results
        env:
          DETECT_CHANGES: ${{ needs.detect-changes.result }}
          QUALITY_PRECHECK: ${{ needs.quality-precheck.result }}
          QUALITY_TEST: ${{ needs.quality-test.result }}
          E2E_SMOKE: ${{ needs.e2e-smoke.result }}
          MCP_BUILD: ${{ needs.mcp-build.result }}
          MCP_EVAL_SEED: ${{ needs.mcp-eval-seed.result }}
          MCP_EVAL: ${{ needs.mcp-eval.result }}
          INTEGRATION: ${{ needs.integration.result }}
          TYPE_DRIFT_PARITY: ${{ needs.type-drift-parity.result }}
          SUPABASE_TYPES_PARITY: ${{ needs.supabase-types-parity.result }}
          BUILD_GATE: ${{ needs.build-gate.result }}
        run: |
          set -euo pipefail
          fail=0
          for entry in \
            "detect-changes=$DETECT_CHANGES" \
            "quality-precheck=$QUALITY_PRECHECK" \
            "quality-test=$QUALITY_TEST" \
            "e2e-smoke=$E2E_SMOKE" \
            "mcp-build=$MCP_BUILD" \
            "mcp-eval-seed=$MCP_EVAL_SEED" \
            "mcp-eval=$MCP_EVAL" \
            "integration=$INTEGRATION" \
            "type-drift-parity=$TYPE_DRIFT_PARITY" \
            "supabase-types-parity=$SUPABASE_TYPES_PARITY" \
            "build-gate=$BUILD_GATE"; do
            name="${entry%%=*}"
            res="${entry##*=}"
            echo "  $name -> $res"
            if [[ "$res" == "failure" ]]; then
              fail=1
            fi
          done
          if [[ $fail -eq 1 ]]; then
            echo "::error::One or more upstream CI jobs failed."
            exit 1
          fi
          echo "All upstream CI jobs passed or skipped."

      # WP-G4.7 — Vercel deploy gate. Dispatches the workflow status to
      # Vercel so prod deploys can be gated on this check. Vercel-side
      # configuration: project must opt in to the named check via the
      # Vercel dashboard. `if: always()` so Vercel sees both success and
      # failure signals — without it, Vercel would only ever see green.
      - name: Notify Vercel — ci-summary status
        if: always()
        uses: vercel/repository-dispatch/actions/status@30f760c6640485cd92f8c785ef361382555fb712 # v1
        with:
          name: "Vercel - canonical: ci-summary"
