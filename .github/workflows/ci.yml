# PR-blocking CI for knowledge-hub.
#
# Runs on every PR (any base branch) and on push to main. Cheaper checks
# (lint, format, knip) precede slower checks (build, test) so failures
# surface fast.
#
# Spec: docs/audits/kh-production-readiness-phase-1/spec/wp-g4-ci-foundation-spec.md
# Runbook: docs/runbooks/ci.md

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group:
    ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    # Resolves ${{ secrets.X }} and ${{ vars.X }} from the Production
    # environment scope (per docs/runbooks/github-environments.md §4.1).
    # Case-sensitive — must exactly match `Production`.
    environment: Production
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'scripts/**/*.py'
              - 'requirements.txt'
              - 'scripts/tests/**'

      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 lets `vitest run --changed origin/<base>` diff
          # the PR head against the merge base on PR runs.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun lint

      - name: Format check (Prettier)
        run: bun run format:check

      - name: Knip baseline guard
        run: bun run ci:knip-check

      - name: Build (Next.js)
        env:
          # Server-side required vars (lib/env.ts)
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # Client-side required vars (lib/env-client.ts) — Production
          # environment exposes the bare names; mirror them onto the
          # NEXT_PUBLIC_* names the client schema expects.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          # Sentry release tagging — VERCEL_GIT_COMMIT_SHA is a Vercel-only
          # var; substitute github.sha so the release name resolves.
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          # Optional model overrides (variables, not secrets)
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: bun run build

      - name: Test (Vitest)
        env:
          # Vitest setup imports validated env modules; provide the same
          # set as the build step.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Pulled into env to avoid embedding github-context expressions
          # directly in `run:` commands (workflow-injection mitigation).
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
            bunx vitest run --changed "origin/$GITHUB_BASE_REF"
          else
            bun run test
          fi

      - name: Setup Python
        if: steps.changes.outputs.python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        if: steps.changes.outputs.python == 'true'
        run: pip install -r requirements.txt

      - name: Test (pytest)
        if: steps.changes.outputs.python == 'true'
        run: python3 -m pytest scripts/tests/
