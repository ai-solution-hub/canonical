# WP-G4.6 — Supabase advisor lint guard.
#
# Wires `bun run scripts/run-supabase-advisors.ts` into CI so PR-introduced
# advisor findings (security + performance) surface within 5 minutes of
# the offending commit landing.
#
# Triggers (mirrors migration-replay.yml pattern):
#   - schedule: nightly cron 02:00 UTC catches drift introduced via Studio
#     or out-of-band psql that wouldn't trip a path filter.
#   - push to main when supabase/migrations/** changes — paths-filter@v3
#     gated, so docs-only main pushes don't burn API quota.
#   - workflow_dispatch for ad-hoc re-runs or capture-baseline artefact generation.
#
# Required secrets (Production-scoped, per docs/runbooks/github-environments.md):
#   - SUPABASE_ACCESS_TOKEN (existing; provisioned for WP-G4.5)
#
# Runtime budget: <=5 min wall-clock. Two GET requests + JSON diff against
# committed baseline; no DB writes, no compute on Supabase side.
#
# Workflow-injection mitigation: all github context values arrive via env,
# never inline ${{ }} in the run: block (mirrors migration-replay.yml).
#
# Spec slot: docs/runbooks/ci.md §6.5 (subsection added in this WP).

name: Supabase advisors

on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - ".github/workflows/supabase-advisors.yml"
      - "scripts/run-supabase-advisors.ts"
      - "docs/audits/kh-production-readiness-phase-1/supabase-advisor-baseline.json"
  workflow_dispatch:
    inputs:
      capture_baseline:
        description: "Capture and upload a fresh advisor baseline JSON artefact"
        required: false
        type: boolean
        default: false

concurrency:
  group: supabase-advisors-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Advisor lint (security + performance)
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run advisor lint
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: rovrymhhffssilaftdwd
          CAPTURE_BASELINE:
            ${{ github.event.inputs.capture_baseline || 'false' }}
        run: |
          if [ "$CAPTURE_BASELINE" = "true" ]; then
            bun run scripts/run-supabase-advisors.ts --env=prod --capture-baseline
          else
            bun run scripts/run-supabase-advisors.ts --env=prod
          fi

      - name: Upload captured advisor baseline
        if: github.event.inputs.capture_baseline == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-advisor-baseline
          path: docs/audits/kh-production-readiness-phase-1/supabase-advisor-baseline.json
          retention-days: 7
          if-no-files-found: error
