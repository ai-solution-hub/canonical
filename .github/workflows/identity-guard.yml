# ID-68.15 — identity-guard (PC-37 / Inv 37; PRODUCT Inv 31 + AC-E6).
#
# Required branch-protection status check on `main` from Phase 0 (paid org
# plan ratified S317 — no advisory window). Rejects re-introduction of the
# Inv 31 genuine-client identity set at HEAD:
#
#   1. Identity grep — case-insensitive (per-token flag) `git grep -F` of the
#      FULL TRACKED TREE (not the diff — catches re-introduction via any
#      path) against the PC-31 denylist held in the KH_CLIENT_NAME_DENYLIST
#      repository secret. ZERO token values are hardcoded in this file.
#   2. PC-2 assertion — no LICENSE/LICENCE/COPYING file tracked at the repo
#      root (public means source-visible, not open-source).
#   3. PC-20 assertion — no CONTRIBUTING.md tracked (no external
#      contribution surface).
#   4. PC-26 assertion — the retired bridge-knob name (composed at runtime
#      in the script so this file never carries the literal) must not
#      return outside docs/.
#
# Denylist secret (PC-31, ratified S317 — E1 unified):
#   KH_CLIENT_NAME_DENYLIST holds the FULL canonical denylist JSON
#   (tokens[].{value,class,case_insensitive} + exclusion_patterns[]).
#   The canonical copy lives in the PRIVATE docs-site repo at
#   ops/identity-denylist.json; the secret is synced manually from it on
#   change (one rotation point; the ledger client-name guard consumes the
#   same secret). Never echo or commit token values; this workflow prints
#   class labels, counts, and path:line locations only — match content and
#   pattern text are withheld from logs.
#
# DAY-ONE EXCLUSION SEED + SHRINK PROTOCOL (PLAN record 15):
#   HEAD still carries identity matches until the de-ID records land
#   (records 19/21/22/23/27). The PENDING_DEID exclusion list below is
#   seeded from the record-14 sweep inventory
#   (docs/audits/id68-pc40-sweep-report.md §2 per-file carrier tables,
#   sweep HEAD 02bc7032), so the guard enforces "no NEW identity sites"
#   immediately — a match in any file NOT listed below is a violation.
#   Protocol:
#     - Each de-ID record REMOVES the paths it cleans from PENDING_DEID
#       in the same commit that cleans them (the guard then enforces those
#       paths forever after).
#     - Never ADD a path here to silence a red run — that is the exact
#       re-introduction this guard exists to reject. New entries require an
#       ID-68 spec amendment.
#     - Record 30 verifies at Gate 4 that this list has shrunk to
#       carve-out-only before the visibility flip (AC-E6 / Inv 38 Gate 4).
#   Entries are PATHS only (paths are permitted to appear here; identity
#   token VALUES are not). Two entries are self-exclusions: this workflow
#   (its exclusion entries cite token-bearing file names) and the sweep
#   report (its inventory cites the same).

name: identity-guard

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group:
    identity-guard-${{ github.event_name }}-${{ github.event.pull_request.number
    || github.ref }}
  cancel-in-progress: true

jobs:
  identity-guard:
    name: identity-guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Identity grep + re-introduction assertions
        # Workflow-injection + leak mitigation: the denylist arrives via
        # env (never inline ${{ }} in run:); the script never prints token
        # values, exclusion-pattern text, or matched line content.
        env:
          KH_CLIENT_NAME_DENYLIST: ${{ secrets.KH_CLIENT_NAME_DENYLIST }}
        run: |
          set -euo pipefail

          # ---- 0. Denylist availability — fail loud, never silently pass.
          if [ -z "${KH_CLIENT_NAME_DENYLIST:-}" ]; then
            echo "FATAL: KH_CLIENT_NAME_DENYLIST secret is empty or unavailable."
            echo "The identity guard cannot run without the PC-31 denylist."
            echo "Sync the secret from the canonical copy in the private docs-site repo (ops/identity-denylist.json)."
            exit 1
          fi
          if ! jq -e '(.tokens | type == "array") and (.tokens | length > 0)' >/dev/null 2>&1 <<<"$KH_CLIENT_NAME_DENYLIST"; then
            echo "FATAL: KH_CLIENT_NAME_DENYLIST is not valid denylist JSON (expected a non-empty tokens[] array)."
            exit 1
          fi

          # ---- 1. Pending-de-ID path exclusions (see header for protocol).
          PENDING_DEID=(
            # Self-exclusions (live while these artefacts exist):
            ':(exclude,literal).github/workflows/identity-guard.yml'
            ':(exclude,literal)docs/audits/id68-pc40-sweep-report.md'
            # Post-sweep wave-1 carrier (ID-68.20 codegen output, 0b1ed290 —
            # postdates the record-14 sweep; record 22's untrack shrinks it
            # together with lib/branding/clients/ below):
            ':(exclude,literal)lib/branding/client-branding-map.generated.ts'
            # Record-14 seed (sweep report §2, HEAD 02bc7032) — SHRINK ONLY:
