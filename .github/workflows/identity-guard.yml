          # ---- 2. Identity grep: every denylist token, full tracked tree.
          fail=0
          token_count=$(jq -r '.tokens | length' <<<"$KH_CLIENT_NAME_DENYLIST")
          # Carve-out content patterns (PC-31 exclusion_patterns[]) — held in
          # memory only; never printed. (while-read, not mapfile, so the
          # script also runs under bash 3.2 for local rehearsal.)
          CARVEOUT_PATTERNS=()
          while IFS= read -r _pat; do
            [ -n "$_pat" ] && CARVEOUT_PATTERNS+=("$_pat")
          done < <(jq -r '.exclusion_patterns[]?.pattern' <<<"$KH_CLIENT_NAME_DENYLIST" | tr '[:upper:]' '[:lower:]')

          for ((i = 0; i < token_count; i++)); do
            value=$(jq -r ".tokens[$i].value" <<<"$KH_CLIENT_NAME_DENYLIST")
            ci=$(jq -r ".tokens[$i].case_insensitive" <<<"$KH_CLIENT_NAME_DENYLIST")
            class=$(jq -r ".tokens[$i].class" <<<"$KH_CLIENT_NAME_DENYLIST")
            flags=(-I -n -F)
            if [ "$ci" = "true" ]; then flags+=(-i); fi
            matches=$(git grep "${flags[@]}" -e "$value" -- . "${PENDING_DEID[@]}" || true)

            net=0
            net_sites=""
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              content=${line#*:}
              content=${content#*:}
              lower=$(printf '%s' "$content" | tr '[:upper:]' '[:lower:]')
              excluded=0
              for pat in "${CARVEOUT_PATTERNS[@]+"${CARVEOUT_PATTERNS[@]}"}"; do
                case "$lower" in
                  *"$pat"*)
                    excluded=1
                    break
                    ;;
                esac
              done
              if [ "$excluded" -eq 0 ]; then
                net=$((net + 1))
                net_sites+="  - $(printf '%s' "$line" | cut -d: -f1,2)"$'\n'
              fi
            done <<<"$matches"

            echo "identity class '$class': $net new identity site(s)"
            if [ "$net" -gt 0 ]; then
              fail=1
              echo "VIOLATION (PC-37 / Inv 37) — new identity-set site(s) for the class above (match content withheld):"
              printf '%s' "$net_sites"
            fi
          done

          # ---- 3. PC-2: no OSI licence file at the repo root.
          # (Capture-to-variable, not `grep -q` pipelines: under pipefail,
          # grep -q's early exit can SIGPIPE the producer and silently flip
          # the assertion.)
          lic_files=$(git ls-files | grep -iE '^(LICENSE|LICENCE|COPYING)' || true)
          if [ -n "$lic_files" ]; then
            echo "VIOLATION (PC-2 / Inv 2): a licence file is tracked at the repo root — public means source-visible, NOT open-source:"
            printf '%s\n' "$lic_files"
            fail=1
          else
            echo "PC-2 licence-file assertion: pass"
          fi

          # ---- 4. PC-20: no CONTRIBUTING.md.
          contrib_files=$(git ls-files | grep -iE '^CONTRIBUTING\.md$' || true)
          if [ -n "$contrib_files" ]; then
            echo "VIOLATION (PC-20 / Inv 20): CONTRIBUTING.md is tracked — no external contribution surface."
            fail=1
          else
            echo "PC-20 CONTRIBUTING.md assertion: pass"
          fi

          # ---- 5. PC-26: retired bridge-knob name must not return outside
          # docs/ (composed at runtime so this file never carries it).
          old_knob='KH_DOCS'
          old_knob="${old_knob}_DIR"
          knob_sites=$(git grep -I -n -F "$old_knob" -- . ':(exclude)docs/' || true)
          if [ -n "$knob_sites" ]; then
            echo "VIOLATION (PC-26 / Inv 26): the retired bridge-knob name has returned outside docs/:"
            printf '%s\n' "$knob_sites" | cut -d: -f1,2
            fail=1
          else
            echo "PC-26 retired-knob assertion: pass (zero outside docs/)"
          fi

          if [ "$fail" -ne 0 ]; then
            echo "identity-guard: FAIL"
            exit 1
          fi
          echo "identity-guard: PASS"
