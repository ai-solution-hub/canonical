# Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-ci-res2-staging-live-mirror-spec.md
#
# Staging live-mirror refresh (WP-CI.RES.2). Fortnightly (alternate-Monday)
# pg_dump | psql snapshot of prod into the persistent staging branch
# (turayklvaunphgbgscat), followed by a minimal-PII scrub limited to the
# auth schema (per spec v2 §1.4 minimal-scrub matrix).
#
# pg_dump | psql operates over the postgres protocol using the staging
# branch's postgres credentials directly — the persistent-branch
# write-protection that gates Supabase's `reset_branch` Management API
# does NOT apply at the postgres protocol level (per
# `feedback_protected_branch_reset_noop` clarified scope), so no
# branch-protection toggle is required around the restore.
#
# Pattern source: .github/workflows/migration-replay.yml (S10 ship; same
# env-scope + secret-handling style).
#
# Required Staging-env entries (per docs/runbooks/github-environments.md):
#
# Secrets (provisioned in GH env Staging):
#   - STAGING_SUPABASE_DB_URL          postgres conn string for staging branch
#   - PROD_SUPABASE_DB_URL             postgres conn string for prod project
#   - STAGING_SHARED_PASSWORD_BCRYPT   bcrypt hash injected into auth.users
#                                      via psql --set=staging_bcrypt
#   - SUPABASE_SERVICE_ROLE_KEY        already present; aliased in env block
#                                      to orchestrator-canonical
#                                      STAGING_SUPABASE_SERVICE_ROLE_KEY
#
# Variables (provisioned in GH env Staging):
#   - NEXT_PUBLIC_SUPABASE_URL         already present; aliased in env block
#                                      to orchestrator-canonical
#                                      STAGING_SUPABASE_URL

name: Staging Live Mirror

on:
  schedule:
    # Mondays in week 2 OR week 4 of each month at 03:00 UTC = exactly two
    # dispatches/month (true fortnightly cadence). POSIX-cron NOTE: this
    # restricts only day-of-month with day-of-week kept at Monday, avoiding
    # the cron OR-explosion (`0 3 1-14 * 1` would fire ~21x/month).
    - cron: "0 3 8-14,22-28 * 1"
  workflow_dispatch:
    inputs:
      skip-seed:
        description: "skip TEST_USER_1/2/3 seed step (debug only)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: staging-live-mirror
  cancel-in-progress: false

jobs:
  refresh:
    name: Staging live-mirror refresh
    runs-on: ubuntu-latest
    # Resolves `${{ secrets.X }}` from the Staging environment scope per
    # docs/runbooks/github-environments.md §4.1. Case-sensitive.
    environment: Staging
    timeout-minutes: 30
    permissions:
      contents: read

    # Workflow-injection mitigation (spec §2.6): all `${{ github.* }}` and
    # `${{ secrets.* }}` references arrive via env, never inline `${{ }}` in
    # the run: blocks.
    env:
      STAGING_SUPABASE_DB_URL: ${{ secrets.STAGING_SUPABASE_DB_URL }}
      PROD_SUPABASE_DB_URL: ${{ secrets.PROD_SUPABASE_DB_URL }}
      # STAGING_SUPABASE_SERVICE_ROLE_KEY + STAGING_SUPABASE_URL are
      # orchestrator-canonical names matching scripts/db-row-count-diff.ts
      # cross-env naming convention (lines 17-27). Aliased here from the
      # already-present Staging-env values rather than duplicating Liam-side.
      STAGING_SUPABASE_SERVICE_ROLE_KEY:
        ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STAGING_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      STAGING_SHARED_PASSWORD_BCRYPT:
        ${{ secrets.STAGING_SHARED_PASSWORD_BCRYPT }}
      SKIP_SEED: ${{ github.event.inputs.skip-seed || 'false' }}
      RUN_ID: ${{ github.run_id }}
      EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Install postgresql-17 client
        # CLAUDE.md gotcha: pg_dump version must match server PG major version
        # (Supabase PG 17.6). GHA ubuntu-latest ships postgresql-client-16
        # owning /usr/bin/pg_dump via update-alternatives; we install v17 and
        # prepend its bin dir to GITHUB_PATH so subsequent steps (and the
        # orchestrator's `pg_dump --version` pre-flight) see v17 first.
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run staging live-mirror orchestrator
        # Orchestrator handles steps 7.1-7.6 per spec §2.7. Reads all secrets
        # via process.env (populated from job-level env: above). Never
        # interpolates user-supplied data into shell commands.
        run: bun run scripts/staging-mirror-and-scrub.ts
