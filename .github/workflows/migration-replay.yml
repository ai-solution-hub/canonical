# Spec: docs/audits/kh-production-readiness-phase-1/specs/wp-g4.5-migration-replay-spec.md
#
# Migration replay smoke (WP-G4.5). On PRs (and pushes to main /
# production-readiness) that touch supabase/{migrations,seed.sql,config.toml},
# create an ephemeral Supabase preview branch of prod, replay every migration
# from scratch via `supabase db push --linked`, then delete the branch.
#
# Catches squash-divergence at PR time — the failure mode that hit S4 + S8
# (extensions placed in public schema, patched out-of-band, never captured
# as a migration). See `feedback_out_of_band_psql_must_become_migration`.
#
# Required secrets (Production-scoped, per docs/runbooks/github-environments.md):
#   - SUPABASE_ACCESS_TOKEN (NEW — Liam to provision)
#   - POSTGRES_PASSWORD (existing)

name: Migration Replay

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, production-readiness]

concurrency:
  group:
    migration-replay-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    name: Migration replay smoke
    runs-on: ubuntu-latest
    # Resolves ${{ secrets.X }} from the Production environment scope per
    # docs/runbooks/github-environments.md §4.1. Case-sensitive.
    environment: Production
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**'
              - 'supabase/seed.sql'
              - 'supabase/config.toml'

      - name: Skip notice (no migration-relevant changes)
        if: steps.changes.outputs.migrations \!= 'true'
        run: |
          echo "No changes under supabase/{migrations,seed.sql,config.toml}; skipping replay."

      - name: Checkout
        if: steps.changes.outputs.migrations == 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: steps.changes.outputs.migrations == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        if: steps.changes.outputs.migrations == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Setup Supabase CLI
        if: steps.changes.outputs.migrations == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        if: steps.changes.outputs.migrations == 'true'
        run: bun install --frozen-lockfile

      - name: Run migration replay
        if: steps.changes.outputs.migrations == 'true'
        # Workflow-injection mitigation (spec §4.5): all github context
        # values arrive via env, never inline ${{ }} in the run: block.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PROJECT_REF: rovrymhhffssilaftdwd
          PR_NUMBER:
            ${{ github.event.pull_request.number || github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: bun run scripts/migration-replay-check.ts

      - name: Cleanup leaked branches (always)
        if: always() && steps.changes.outputs.migrations == 'true'
        # Belt + braces vs the script's own try/finally — runs even on
        # workflow cancellation (PR closed mid-run, concurrency
        # superseding). Cleanup failures are warnings, not errors
        # (spec §5.3).
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PROJECT_REF: rovrymhhffssilaftdwd
          PR_NUMBER:
            ${{ github.event.pull_request.number || github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: bun run scripts/migration-replay-check.ts --cleanup-only
