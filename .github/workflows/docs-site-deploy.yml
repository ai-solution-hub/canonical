# docs-site deploy — Astro + Starlight docs site build + access-protected
# Vercel PREVIEW deploy (ID-9 docs-site deploy glue).
#
# Spec: docs/specs/id-9-astro-starlight-docs-foundation/ (PRODUCT.md Inv-2,
#       Inv-19, Inv-21) + OQ-68-2 (docs-site ships as an ACCESS-PROTECTED
#       Vercel PREVIEW, NOT public initially).
# Runbook: docs/runbooks/docs-site-deploy.md
#
# Decision context (Liam ruled): the docs-site is deployed as a Vercel
# PREVIEW deploy with Deployment Protection enabled (Vercel Authentication /
# password) so it is access-protected, NOT public. Production / custom-domain
# promotion is DEFERRED (OQ-68-2). This workflow AUTHORS the deploy glue; Liam
# later creates + links the Vercel project, sets the three secrets in the
# `Docs-Preview` GitHub Environment, and enables Deployment Protection.
#
# Skip-clean when unconfigured: until the Vercel project + secrets exist, the
# deploy step is skipped (not failed) so the workflow stays green. The BUILD
# step ALWAYS runs (proves the site compiles) regardless of deploy config.
#
# Triggers:
#   * workflow_dispatch → manual deploy / build check.
#   * push on main/staging touching docs-site/**, docs/**, or this workflow.
#
# Untrusted-input safety: this workflow consumes only GitHub control-plane
# values (github.ref, github.event_name) — no user-authored issue / PR /
# comment / commit-message text is interpolated into run: steps. Secret
# presence is probed via an env: indirection (no secret value is echoed),
# per https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/.

name: docs-site deploy

on:
  push:
    branches: [main, staging]
    paths:
      - "docs-site/**"
      - "docs/**"
      - ".github/workflows/docs-site-deploy.yml"
  workflow_dispatch:

concurrency:
  group: docs-site-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build + access-protected preview deploy
    runs-on: ubuntu-latest
    # Resolves the three Vercel secrets from the `Docs-Preview` GitHub
    # Environment (case-sensitive — must match the canonical environment
    # name). See docs/runbooks/docs-site-deploy.md §1 + github-environments.md.
    environment: Docs-Preview
    timeout-minutes: 20
    permissions:
      contents: read

    env:
      # Probe-only indirection: routes the secret through an env var so the
      # `configured` gate can test presence without echoing the value. Empty
      # string when the secret is unset (GitHub silent-empty behaviour).
      VERCEL_TOKEN_PRESENT: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine deploy configuration
        id: config
        # Sets configured=true only when VERCEL_TOKEN is present in the
        # `Docs-Preview` environment. Until Liam wires the project, this is
        # empty and the deploy step is skipped (workflow still succeeds).
        run: |
          if [[ -n "$VERCEL_TOKEN_PRESENT" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "docs-site deploy configured — preview deploy will run."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "docs-site deploy not yet configured — skipping."
          fi

      - name: Install dependencies
        working-directory: docs-site
        run: bun install --frozen-lockfile

      - name: Sync content (docs/ -> docs-site/src/content/docs/)
        working-directory: docs-site
        # Supplementary build-time sync (PRODUCT.md Inv-19). Mirrors the
        # tracked docs/ corpus into the Astro content collection so the build
        # reflects current source.
        run: bun scripts/sync-content.ts

      - name: Build docs site (astro -> dist/)
        working-directory: docs-site
        # `bun run build` chains sync + broken-link + token-parity guards +
        # astro check + astro build (see docs-site/package.json). ALWAYS runs —
        # proves the site compiles even when the deploy step is skipped.
        run: bun run build

      - name: Install Vercel CLI
        if: steps.config.outputs.configured == 'true'
        run: bun add --global vercel@latest

      - name: Deploy to Vercel (access-protected PREVIEW)
        id: deploy
        if: steps.config.outputs.configured == 'true'
        working-directory: docs-site
        # PREVIEW deploy (NO --prod) per OQ-68-2. Deployment Protection
        # (Vercel Authentication / password), configured by Liam in the Vercel
        # project settings, makes the preview access-protected/private. The
        # `--prebuilt` flag is intentionally NOT used: we let Vercel build via
        # the project's vercel.json buildCommand so the deployed artefact and
        # the verification build above share the same pipeline.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Pull project settings, then deploy a PREVIEW build. The deployment
          # URL is captured on stdout and emitted to the job summary so the
          # {9.24} Playwright E2E can consume it as DOCS_SITE_URL.
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          DEPLOY_URL=$(vercel deploy --token="$VERCEL_TOKEN")
          echo "deploy-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview deploy URL: $DEPLOY_URL"

      - name: Publish preview URL to job summary
        if:
          steps.config.outputs.configured == 'true' &&
          steps.deploy.outputs.deploy-url != ''
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy-url }}
        run: |
          {
            echo "## docs-site preview deploy"
            echo ""
            echo "Access-protected Vercel PREVIEW deploy (OQ-68-2)."
            echo ""
            echo "**DOCS_SITE_URL:** $DEPLOY_URL"
            echo ""
            echo "Capture the value above as \`DOCS_SITE_URL\` to run the"
            echo "{9.24} Playwright E2E against the deployed preview."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy skipped notice
        if: steps.config.outputs.configured != 'true'
        run: |
          {
            echo "## docs-site deploy skipped"
            echo ""
            echo "docs-site deploy not yet configured — the build above ran"
            echo "(site compiles) but the Vercel preview deploy was skipped."
            echo ""
            echo "To enable: create + link the Vercel project and set"
            echo "\`VERCEL_TOKEN\`, \`VERCEL_ORG_ID\`, \`VERCEL_PROJECT_ID\` in the"
            echo "\`Docs-Preview\` GitHub Environment. See"
            echo "docs/runbooks/docs-site-deploy.md §1."
          } >> "$GITHUB_STEP_SUMMARY"
