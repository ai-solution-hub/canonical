# ID-128.1 — Nightly Playwright lane (full chromium-desktop project).
#
# The PR-blocking `e2e-smoke` job in ci.yml runs only `--project=smoke`
# (~6 @smoke-tagged specs). The other 41 of the 47 e2e/tests/* specs run in
# NO workflow. This lane runs the full `chromium-desktop` project on a daily
# off-peak schedule so those specs execute somewhere automated.
#
# NOT PR-blocking — scheduled + manual only (no `pull_request` trigger). It
# hard-fails (goes red) when any spec fails so breakage is visible; the PR gate
# is unaffected. Mobile (`chromium-mobile`) is deferred to a fast-follow (v1 is
# desktop-only).
#
# ── Topology (id-128 restructure, PLAN.md) ──────────────────────────────────
#   build         — ONE Next.js PRODUCTION build (next start serves precompiled
#                   routes — no `next dev` compile-on-first-hit, which produced
#                   run #9's page.goto-timeout storm under --workers=3; {128.6}).
#                   Ships `.next` as an artifact + runs the staging preflight.
#   e2e-shard     — a 4-way `--shard` matrix (workers=2 each), each downloads the
#                   build artifact, serves it via `next start`, emits a `blob`
#                   report. ~50min single-runner → ~18min wall, no single timeout
#                   ({128.7}). Seed prefix is shard-aware so shards don't collide.
#   merge-reports — stitches the 4 blob reports into ONE aggregated HTML report
#                   (the triage artefact). Lane pass/fail = AND of the shards.
#
# Required secrets / vars (Staging environment scope — per
# docs/runbooks/github-environments.md §2): identical to the `e2e-smoke` job in
# ci.yml (staging Supabase URL/keys + server-boot secrets + TEST_USER_1/2/3/4).
#
# Workflow-injection mitigation: all github context + secret values arrive via
# the step-level `env:` block, never inline ${{ }} in run: steps (mirrors
# e2e-smoke + eval-nightly + staging-reference-refresh).

name: E2E nightly

on:
  schedule:
    # Daily at 04:00 UTC — staggered one hour after the 03:00 UTC eval-nightly
    # and staging-reference-refresh lanes to avoid contention on the shared CI
    # Supabase project.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      specs:
        description:
          "Optional space-separated spec paths to run (default: full
          chromium-desktop project)"
        required: false
        default: ""
      auth_debug:
        description:
          "Set to 1 to enable [E2E_AUTH_DEBUG] fixture redirect-cause
          diagnostics"
        required: false
        default: ""

concurrency:
  # Share the cross-PR serialisation group with e2e-smoke + integration so only
  # one job touches the shared staging Supabase project at a time. Queue (do not
  # cancel) so a manual dispatch never clobbers an in-flight scheduled run.
  group: integration-staging-e2e
  cancel-in-progress: false

# PLATFORM_PROJECT_REF — this repo's own dev/CI Supabase project, the only
# project ref CI targets. Client prod/staging refs are per-client and never
# committed (ID-68 / theme 12). Sourced from a repo secret and exposed to every
# job/step so the scripts/lib/project-refs.ts guards resolve.
env:
  PLATFORM_PROJECT_REF: ${{ secrets.PLATFORM_PROJECT_REF }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # build — ONE production build, shared by every shard ({128.6} + {128.7}).
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build (Next.js prod) + staging preflight
    runs-on: ubuntu-latest
    environment: Staging
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Cache Next.js build cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: .next/cache
          key:
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{
            hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cleanup stale test artifacts (staging preflight)
        # Run ONCE here (not per shard) before the matrix fans out.
        env:
          ALLOW_STALE_TEST_ARTIFACT_CLEANUP: "1"
          TEST_ARTIFACT_CLEANUP_MIN_AGE_MINUTES: "120"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run cleanup:stale-test-artifacts

      - name: Build (Next.js prod)
        # ★ LOAD-BEARING: NEXT_PUBLIC_E2E (and every NEXT_PUBLIC_*) is client-
        # inlined (lib/env-client.ts) and BAKED AT BUILD TIME, not at `next
        # start`. It MUST be set in THIS step's env, or the served bundle lacks
        # E2E test-mode (overlay / third-party suppression) and specs flake.
        # Env block mirrors ci.yml's "Build (Next.js)" step + NEXT_PUBLIC_E2E.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          # Production stores bare names; mirror to NEXT_PUBLIC_* for the client schema.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          # ★ Bakes E2E test mode into the served bundle (see note above).
          NEXT_PUBLIC_E2E: "true"
          # VERCEL_GIT_COMMIT_SHA is Vercel-only; substitute github.sha so the Sentry release tag resolves.
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          CLASSIFICATION_BATCH_SIZE: ${{ vars.CLASSIFICATION_BATCH_SIZE }}
        run: bun run build

      - name: Archive build artifact
        run: tar --exclude='.next/cache' -czf /tmp/e2e-next-build.tar.gz .next

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-next-build
          path: /tmp/e2e-next-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # e2e-shard — 4-way shard matrix against the prebuilt app ({128.7}).
  # ───────────────────────────────────────────────────────────────────────────
  e2e-shard:
    name: E2E shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    needs: [build]
    runs-on: ubuntu-latest
    environment: Staging
    # Generous per-shard cap: a healthy shard runs ~1/4 of the suite in well
    # under this. The Playwright --global-timeout below fails inside the runner
    # first; this is the outer backstop. {128.8} env-drives the fine budgets.
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      # Surface EVERY failing shard — one red shard must not cancel the others.
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (chromium only)
        # chromium-desktop uses Desktop Chrome only (per playwright.config.ts).
        # `--with-deps` installs the Linux system libraries the GH-hosted runner
        # doesn't carry by default.
        run: bunx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: e2e-next-build
          path: .

      - name: Unpack build artifact
        run: tar -xzf e2e-next-build.tar.gz && rm e2e-next-build.tar.gz

      - name:
          Run Playwright (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal
          }})
        # Serves the prebuilt app via `next start` (PLAYWRIGHT_WEB_SERVER_CMD),
        # so routes are precompiled — no compile-on-first-hit ({128.6}). Each
        # shard emits a blob report (PW_BLOB_REPORT) that merge-reports stitches.
        # --max-failures=0 / --global-timeout=1080000 (18m) override the config's
        # smoke-tuned caps; {128.8} moves these to env-driven config.
        env:
          PLAYWRIGHT_WEB_SERVER_CMD: "bun run start"
          PW_BLOB_REPORT: "1"
          # Staging Supabase connection — env scope resolves these from the
          # `Staging` GH environment. `next start` reads the server vars at boot.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
            ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLIENT_ID: ${{ vars.NEXT_PUBLIC_CLIENT_ID }}
          AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIMS: ${{ vars.AI_EMBEDDING_DIMS }}
          # Test-user credentials — pre-seeded into staging by
          # scripts/seed-e2e-users.ts (per docs/runbooks/staging-refresh.md §4).
          TEST_USER_1_EMAIL: ${{ vars.TEST_USER_1_EMAIL }}
          TEST_USER_1_PASSWORD: ${{ secrets.TEST_USER_1_PASSWORD }}
          TEST_USER_2_EMAIL: ${{ vars.TEST_USER_2_EMAIL }}
          TEST_USER_2_PASSWORD: ${{ secrets.TEST_USER_2_PASSWORD }}
          TEST_USER_3_EMAIL: ${{ vars.TEST_USER_3_EMAIL }}
          TEST_USER_3_PASSWORD: ${{ secrets.TEST_USER_3_PASSWORD }}
          # TEST_USER_4 = dedicated sign-out user (S420). The `setup` project
          # authenticates all four users, so each shard needs these or setup
          # fails and every spec in the shard is skipped.
          TEST_USER_4_EMAIL: ${{ vars.TEST_USER_4_EMAIL }}
          TEST_USER_4_PASSWORD: ${{ secrets.TEST_USER_4_PASSWORD }}
          # Targeted re-run + auth diagnostics (workflow_dispatch only; both empty
          # on the scheduled run). SPECS is passed via env and expanded unquoted in
          # run: — NOT inline ${{ }} — per the workflow-injection mitigation. It is
          # a maintainer-supplied dispatch input (space-separated spec paths), not
          # attacker-controlled event data.
          SPECS: ${{ inputs.specs }}
          E2E_AUTH_DEBUG: ${{ inputs.auth_debug }}
          # TEMPORARY (remove when id-130 {130.9} regenerates the api.* views):
          # exclude the bid-* specs (playwright.config.ts honours E2E_EXCLUDE_BID).
          # They all fail on `api.bid_questions`; {128.11} drops this when {130.9}
          # lands (a cross-task coordination note, NOT a subtask dependency).
          E2E_EXCLUDE_BID: "1"
          # Playwright shards on the FullConfig.shard the CLI flag sets below.
          SHARD_INDEX: ${{ matrix.shardIndex }}
          SHARD_TOTAL: ${{ matrix.shardTotal }}
        run:
          bunx playwright test --project=chromium-desktop
          --shard=$SHARD_INDEX/$SHARD_TOTAL --workers=2 --retries=1
          --max-failures=0 --global-timeout=1080000 $SPECS

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup orphaned content_history rows (staging)
        if: always()
        env:
          ALLOW_ORPHAN_CONTENT_HISTORY_CLEANUP: "1"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run cleanup:orphaned-content-history

  # ───────────────────────────────────────────────────────────────────────────
  # merge-reports — stitch the 4 shard blob reports into ONE HTML report.
  # ───────────────────────────────────────────────────────────────────────────
  merge-reports:
    name: Merge shard reports
    needs: [e2e-shard]
    # Always aggregate — even when shards went red, the merged report is the
    # primary triage artefact (run-level pass/fail still reflects the shards).
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.4"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all blob reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge into one HTML report
        run: bunx playwright merge-reports --reporter html ./all-blob-reports
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report

      - name: Upload merged Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-nightly-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore
