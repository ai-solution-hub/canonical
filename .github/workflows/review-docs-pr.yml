name: review-docs-pr — KH docs maintenance
on:
  workflow_dispatch:
    inputs:
      target_pr_number:
        description: "Optional PR number to scope the skill to"
        required: false
      prompt_override:
        description: "Optional bespoke prompt override"
        required: false
  # Trigger override (Inv-35 Phase-2 composability): review docubot-opened +
  # human-authored docs PRs. review-docs-pr has no schedule: cron.
  pull_request_review:
    types: [submitted]

jobs:
  review-docs-pr:
    # Run for manual dispatch, or for docs PRs: head branch docubot/*, OR base
    # main with a title starting "Docs:". Non-docs PRs are skipped.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.pull_request.head.ref, 'docubot/') ||
      (github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.title, 'Docs:'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run skill via Claude Agent SDK
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PR_NUMBER: ${{ inputs.target_pr_number }}
          PROMPT_OVERRIDE: ${{ inputs.prompt_override }}
        run: |
          bun scripts/skills/run-skill.ts \
            --skill review-docs-pr \
            --skill-md .claude/skills/review-docs-pr/SKILL.md
      - name: Upload run artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-docs-pr-run-${{ github.run_id }}
          path: |
            .skills/review-docs-pr/run.log
            .skills/review-docs-pr/output/**
          retention-days: 30
