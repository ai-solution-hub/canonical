# Cloud Native Buildpacks project descriptor — WHITELIST the buildpack build context.
#
# The {66.7} onprem-deploy.yml GH Action builds the cocoindex image with `pack build`
# from a full `actions/checkout`. `pack` does NOT honour `.gcloudignore` (gcloud-only),
# so without this descriptor the buildpack bakes the ENTIRE git checkout — the whole
# Next.js app (app/, components/, lib/, hooks/, contexts/, supabase/, types/), docs/,
# docs-site/, .planning/ (proprietary historical context + client documentation) — into
# a published, soon-to-be-PUBLIC image.
#
# The cocoindex pipeline image needs ONLY the Python pipeline + its deps:
#   - scripts/         the pipeline (scripts/cocoindex_pipeline/**) + the runtime taxonomy
#                      fixture scripts/tests/fixtures/taxonomy_snapshot.json
#   - requirements.txt buildpack detect + pip deps (all PyPI; no editable/local installs)
#
# Verified safe to whitelist: requirements.txt has no `-e .`/local-path installs, and
# scripts/ imports nothing from the TS app dirs. pyproject.toml is pytest-only (no
# [build-system]) → not needed at build or runtime, so it is intentionally NOT shipped.
#
# Result: the published image carries no app source, no docs, no docs-site, no .planning,
# no client documentation. NOTE: the image stays ~6 GB — that is the Docling/ML footprint,
# NOT source; the 5.3 GB image-size warning is benign (warn-only, T-OQ4). See roadmap
# theme 12 (repo-public investigation). Gitignored dirs (.gitnexus index, .cache,
# .cocoindex_code, node_modules, .next) are absent from the checkout and never baked.
[_]
schema-version = "0.2"

[io.buildpacks]
include = [
  "scripts/",
  "requirements.txt",
]
